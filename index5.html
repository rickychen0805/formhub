// ========== ELECTRONIC SIGNATURE PAD ==========
let sigCanvas = null;
let sigCtx = null;
let sigDrawing = false;

function initSignaturePad(canvasId) {
  sigCanvas = document.getElementById(canvasId);
  if (!sigCanvas) return;
  sigCtx = sigCanvas.getContext('2d');
  sigCanvas.width = sigCanvas.parentElement.clientWidth;
  sigCanvas.height = 200;
  sigCtx.strokeStyle = '#1a1a2e';
  sigCtx.lineWidth = 2;
  sigCtx.lineCap = 'round';
  sigCtx.lineJoin = 'round';
  
  const getPos = (e) => {
    const r = sigCanvas.getBoundingClientRect();
    const t = e.touches ? e.touches[0] : e;
    return { x: t.clientX - r.left, y: t.clientY - r.top };
  };
  const start = (e) => { e.preventDefault(); sigDrawing = true; const p = getPos(e); sigCtx.beginPath(); sigCtx.moveTo(p.x, p.y); };
  const move = (e) => { if (!sigDrawing) return; e.preventDefault(); const p = getPos(e); sigCtx.lineTo(p.x, p.y); sigCtx.stroke(); };
  const end = () => { sigDrawing = false; };
  
  sigCanvas.addEventListener('mousedown', start);
  sigCanvas.addEventListener('mousemove', move);
  sigCanvas.addEventListener('mouseup', end);
  sigCanvas.addEventListener('mouseleave', end);
  sigCanvas.addEventListener('touchstart', start, { passive: false });
  sigCanvas.addEventListener('touchmove', move, { passive: false });
  sigCanvas.addEventListener('touchend', end);
}

function clearSignature() {
  if (sigCtx && sigCanvas) sigCtx.clearRect(0, 0, sigCanvas.width, sigCanvas.height);
}

function getSignatureDataURL() {
  return sigCanvas ? sigCanvas.toDataURL('image/png') : null;
}

function saveSignatureToForm(formId) {
  const form = S.forms.find(f => f.id === formId);
  if (!form) return;
  const dataUrl = getSignatureDataURL();
  if (!dataUrl) return;
  form.signature = dataUrl;
  form.signedBy = S.user?.name || '訪客';
  form.signedAt = new Date().toISOString();
  saveData();
  toast('電子簽名已儲存', 'success');
}

// ========== QR CODE GENERATOR ==========
function generateQR(text, size) {
  // Simple QR-like visual (uses a hash-based pattern for demo; production would use qrcode library)
  const s = size || 150;
  const modules = 21;
  const cellSize = Math.floor(s / modules);
  let svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${s}" height="${s}" viewBox="0 0 ${modules} ${modules}">`;
  svg += `<rect width="${modules}" height="${modules}" fill="white"/>`;
  
  // Generate deterministic pattern from text hash
  let hash = 0;
  for (let i = 0; i < text.length; i++) { hash = ((hash << 5) - hash) + text.charCodeAt(i); hash |= 0; }
  const seed = Math.abs(hash);
  
  // Position detection patterns (3 corners)
  const drawFinder = (x, y) => {
    svg += `<rect x="${x}" y="${y}" width="7" height="7" fill="black"/>`;
    svg += `<rect x="${x+1}" y="${y+1}" width="5" height="5" fill="white"/>`;
    svg += `<rect x="${x+2}" y="${y+2}" width="3" height="3" fill="black"/>`;
  };
  drawFinder(0, 0);
  drawFinder(modules - 7, 0);
  drawFinder(0, modules - 7);
  
  // Data modules (pseudo-random from hash)
  let rng = seed;
  for (let y = 0; y < modules; y++) {
    for (let x = 0; x < modules; x++) {
      // Skip finder patterns
      if ((x < 8 && y < 8) || (x >= modules - 8 && y < 8) || (x < 8 && y >= modules - 8)) continue;
      rng = (rng * 16807 + 0) % 2147483647;
      if (rng % 3 === 0) svg += `<rect x="${x}" y="${y}" width="1" height="1" fill="black"/>`;
    }
  }
  svg += '</svg>';
  return svg;
}

function showFormQR(formId) {
  const form = S.forms.find(f => f.id === formId);
  if (!form) return;
  const url = `${location.origin}${location.pathname}?form=${form.id}`;
  openModal('qr-code', { formNo: form.formNo, url, qrSvg: generateQR(url, 210) });
}

// ========== DASHBOARD CHARTS (SVG) ==========
function renderPieChart(data, size) {
  const s = size || 200;
  const cx = s / 2, cy = s / 2, r = s * 0.38;
  const colors = ['#5c6bc0','#43a047','#f9a825','#e53935','#039be5','#7b1fa2','#e65100','#00838f'];
  const total = data.reduce((sum, d) => sum + d.value, 0);
  if (total === 0) return `<svg width="${s}" height="${s}"><text x="${cx}" y="${cy}" text-anchor="middle" fill="var(--text-tertiary)" font-size="12">無資料</text></svg>`;
  
  let svg = `<svg width="${s}" height="${s}" viewBox="0 0 ${s} ${s}">`;
  let startAngle = -Math.PI / 2;
  
  data.forEach((d, i) => {
    const angle = (d.value / total) * Math.PI * 2;
    const endAngle = startAngle + angle;
    const x1 = cx + r * Math.cos(startAngle);
    const y1 = cy + r * Math.sin(startAngle);
    const x2 = cx + r * Math.cos(endAngle);
    const y2 = cy + r * Math.sin(endAngle);
    const large = angle > Math.PI ? 1 : 0;
    svg += `<path d="M${cx},${cy} L${x1},${y1} A${r},${r} 0 ${large},1 ${x2},${y2} Z" fill="${colors[i % colors.length]}" opacity="0.85"/>`;
    
    // Label
    const midAngle = startAngle + angle / 2;
    const lx = cx + (r + 20) * Math.cos(midAngle);
    const ly = cy + (r + 20) * Math.sin(midAngle);
    if (d.value > 0) svg += `<text x="${lx}" y="${ly}" text-anchor="middle" class="pie-label" font-size="10">${d.label} ${Math.round(d.value/total*100)}%</text>`;
    startAngle = endAngle;
  });
  svg += '</svg>';
  return svg;
}

function renderBarChart(data, width, height) {
  const w = width || 400, h = height || 200;
  const margin = { top: 10, right: 10, bottom: 30, left: 40 };
  const iw = w - margin.left - margin.right;
  const ih = h - margin.top - margin.bottom;
  const max = Math.max(...data.map(d => d.value), 1);
  const barW = Math.min(iw / data.length - 4, 30);
  
  let svg = `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">`;
  // Y axis
  for (let i = 0; i <= 4; i++) {
    const y = margin.top + ih - (ih * i / 4);
    svg += `<line x1="${margin.left}" y1="${y}" x2="${w - margin.right}" y2="${y}" stroke="var(--border-color)" stroke-width="0.5"/>`;
    svg += `<text x="${margin.left - 4}" y="${y + 3}" text-anchor="end" font-size="9" fill="var(--text-tertiary)">${Math.round(max * i / 4)}</text>`;
  }
  // Bars
  data.forEach((d, i) => {
    const x = margin.left + (iw / data.length) * i + (iw / data.length - barW) / 2;
    const barH = (d.value / max) * ih;
    const y = margin.top + ih - barH;
    svg += `<rect x="${x}" y="${y}" width="${barW}" height="${barH}" rx="2" fill="${d.color || 'var(--accent)'}" opacity="0.8"/>`;
    svg += `<text x="${x + barW/2}" y="${h - 8}" text-anchor="middle" font-size="9" fill="var(--text-tertiary)">${d.label}</text>`;
  });
  svg += '</svg>';
  return svg;
}

function renderTrendChart(data, width, height) {
  const w = width || 400, h = height || 160;
  const margin = { top: 10, right: 10, bottom: 25, left: 35 };
  const iw = w - margin.left - margin.right;
  const ih = h - margin.top - margin.bottom;
  const max = Math.max(...data.map(d => d.value), 1);
  
  let points = data.map((d, i) => {
    const x = margin.left + (iw / (data.length - 1 || 1)) * i;
    const y = margin.top + ih - (d.value / max) * ih;
    return `${x},${y}`;
  });
  
  let svg = `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">`;
  // Grid
  for (let i = 0; i <= 3; i++) {
    const y = margin.top + ih - (ih * i / 3);
    svg += `<line x1="${margin.left}" y1="${y}" x2="${w-margin.right}" y2="${y}" stroke="var(--border-color)" stroke-width="0.5"/>`;
  }
  // Area
  if (points.length > 0) {
    const firstX = margin.left;
    const lastX = margin.left + iw;
    const bottomY = margin.top + ih;
    svg += `<polygon points="${firstX},${bottomY} ${points.join(' ')} ${lastX},${bottomY}" fill="var(--accent)" opacity="0.1"/>`;
    svg += `<polyline points="${points.join(' ')}" fill="none" stroke="var(--accent)" stroke-width="2"/>`;
    // Dots
    data.forEach((d, i) => {
      const x = margin.left + (iw / (data.length - 1 || 1)) * i;
      const y = margin.top + ih - (d.value / max) * ih;
      svg += `<circle cx="${x}" cy="${y}" r="3" fill="var(--accent)"/>`;
      svg += `<text x="${x}" y="${h - 6}" text-anchor="middle" font-size="8" fill="var(--text-tertiary)">${d.label}</text>`;
    });
  }
  svg += '</svg>';
  return svg;
}

function reportWork(woId) {
  const wo = S.workOrders.find(w => w.id === woId);
  if (!wo) return;
  const completedStr = prompt('完成數量：');
  if (!completedStr) return;
  const completed = parseInt(completedStr) || 0;
  const defectStr = prompt('不良數量（選填，預設0）：') || '0';
  const defect = parseInt(defectStr) || 0;
  
  wo.completedQty = (wo.completedQty || 0) + completed;
  wo.defectQty = (wo.defectQty || 0) + defect;
  if (!wo.reportHistory) wo.reportHistory = [];
  wo.reportHistory.push({
    id: uid(), completed, defect,
    operator: S.user?.name || '訪客',
    timestamp: new Date().toISOString()
  });
  
  // Auto-update status
  if (wo.completedQty >= wo.planQty && wo.status === '生產中') wo.status = '完工';
  if (wo.status === '計畫' || wo.status === '已發放') wo.status = '生產中';
  
  addAuditLog('報工', `工單 ${wo.woNo}: 完成 ${completed}, 不良 ${defect}`);
  saveData();
  renderContent();
  toast(`報工成功：完成 ${completed}, 不良 ${defect}`, 'success');
}

// ========== SUPPLIER EVALUATION ==========
function evaluateSupplier(supplierId) {
  const sup = S.suppliers.find(s => s.id === supplierId);
  if (!sup) return;
  const quality = parseInt(prompt('品質分數 (1-10)：') || '0');
  const delivery = parseInt(prompt('交期分數 (1-10)：') || '0');
  const price = parseInt(prompt('價格分數 (1-10)：') || '0');
  const service = parseInt(prompt('服務分數 (1-10)：') || '0');
  
  if (quality < 1 || delivery < 1 || price < 1 || service < 1) { toast('請輸入 1-10 的分數', 'error'); return; }
  
  const total = Math.round((quality * 0.3 + delivery * 0.3 + price * 0.2 + service * 0.2) * 10);
  sup.evalScore = total;
  sup.evalDate = new Date().toISOString();
  sup.grade = total >= 80 ? 'A' : total >= 60 ? 'B' : 'C';
  
  if (!sup.evalHistory) sup.evalHistory = [];
  sup.evalHistory.push({ quality, delivery, price, service, total, date: new Date().toISOString(), evaluator: S.user?.name });
  
  addAuditLog('評鑑', `供應商 ${sup.company} 評鑑分數: ${total}, 等級: ${sup.grade}`);
  saveData(); renderContent();
  toast(`評鑑完成：${total} 分 (${sup.grade} 級)`, 'success');
}

// ========== RATE LIMITING ==========
const rateLimits = {};
function checkRateLimit(key, maxPerMinute) {
  const now = Date.now();
  if (!rateLimits[key]) rateLimits[key] = [];
  rateLimits[key] = rateLimits[key].filter(t => now - t < 60000);
  if (rateLimits[key].length >= maxPerMinute) {
    toast('操作過於頻繁，請稍後再試', 'warning');
    return false;
  }
  rateLimits[key].push(now);
  return true;
}

// ========== IMAGE COMPRESSION & UPLOAD ==========
function compressImage(file, maxWidth, quality) {
  return new Promise((resolve, reject) => {
    const mw = maxWidth || 800;
    const q = quality || 0.75;
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        let w = img.width, h = img.height;
        if (w > mw) { h = Math.round(h * mw / w); w = mw; }
        canvas.width = w;
        canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        canvas.toBlob(blob => resolve(blob), 'image/jpeg', q);
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// File upload security check
function validateFileUpload(file) {
  const allowedTypes = ['image/jpeg', 'image/png', 'image/gif', 'image/webp', 'application/pdf', 'application/msword', 'application/vnd.openxmlformats-officedocument.wordprocessingml.document', 'application/vnd.ms-excel', 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'];
  const maxSize = 10 * 1024 * 1024; // 10MB
  
  if (!allowedTypes.includes(file.type)) {
    toast('不支援的檔案類型：' + file.type, 'error');
    return false;
  }
  if (file.size > maxSize) {
    toast('檔案過大（上限 10MB）', 'error');
    return false;
  }
  return true;
}

// Clipboard paste handler for screenshots
function initClipboardPaste() {
  document.addEventListener('paste', async (e) => {
    if (S.currentPage !== 'form-edit') return;
    const items = e.clipboardData?.items;
    if (!items) return;
    for (const item of items) {
      if (item.type.startsWith('image/')) {
        e.preventDefault();
        const file = item.getAsFile();
        if (!file) continue;
        const compressed = await compressImage(file);
        const reader = new FileReader();
        reader.onload = (ev) => {
          const formId = S.modalData?.formId;
          const form = S.forms.find(f => f.id === formId);
          if (form) {
            if (!form.attachments) form.attachments = [];
            form.attachments.push({
              name: '截圖_' + new Date().toLocaleTimeString('zh-TW'),
              type: 'image',
              dataUrl: ev.target.result,
              createdAt: new Date().toISOString()
            });
            saveData();
            toast('截圖已貼上', 'success');
          }
        };
        reader.readAsDataURL(compressed);
        break;
      }
    }
  });
}

// ========== BATCH OPERATIONS (批次操作) ==========
function batchApprove() {
  const checked = [...document.querySelectorAll('.form-checkbox:checked')].map(cb => cb.dataset.id);
  if (checked.length === 0) { toast('請先勾選表單', 'warning'); return; }
  if (!confirm(`確定批次核准 ${checked.length} 張表單？`)) return;
  checked.forEach(id => {
    const form = S.forms.find(f => f.id === id);
    if (form && form.status === 'pending') {
      form.status = 'approved';
      form.approvalHistory = form.approvalHistory || [];
      form.approvalHistory.push({ step: 0, action: 'approved', uid: S.user?.uid, name: S.user?.name || '批次', timestamp: new Date().toISOString(), note: '批次核准' });
      form.updatedAt = new Date().toISOString();
    }
  });
  addAuditLog('批次核准', `批次核准 ${checked.length} 張表單`);
  saveData(); renderContent(); toast(`已批次核准 ${checked.length} 張表單`, 'success');
}

function batchReject() {
  const checked = [...document.querySelectorAll('.form-checkbox:checked')].map(cb => cb.dataset.id);
  if (checked.length === 0) { toast('請先勾選表單', 'warning'); return; }
  const reason = prompt('退回原因：');
  if (!reason) return;
  checked.forEach(id => {
    const form = S.forms.find(f => f.id === id);
    if (form && form.status === 'pending') {
      form.status = 'rejected';
      form.approvalHistory = form.approvalHistory || [];
      form.approvalHistory.push({ step: 0, action: 'rejected', uid: S.user?.uid, name: S.user?.name || '批次', timestamp: new Date().toISOString(), note: reason });
    }
  });
  saveData(); renderContent(); toast(`已批次退回 ${checked.length} 張表單`, 'success');
}

function batchDeleteDrafts() {
  const checked = [...document.querySelectorAll('.form-checkbox:checked')].map(cb => cb.dataset.id);

  if (!confirm(`確定刪除 ${checked.length} 張草稿？此操作不可復原。`)) return;

  addAuditLog('批次刪除', `批次刪除 ${checked.length} 張草稿`);
  saveData(); renderContent(); toast('草稿已刪除', 'success');
}

function pageMindMap() {
  return `<div class="fade-in">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
      <h2 style="font-size:1.3rem;font-weight:700;">心智圖</h2>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-sm btn-primary" onclick="addMindMapNode()">${icon('plus')} 新增節點</button>
        <button class="btn btn-sm btn-secondary" onclick="autoArrangeMindMap()">自動排列</button>
        <button class="btn btn-sm btn-secondary" onclick="exportMindMapImage()">匯出圖片</button>
      </div>
    </div>
    <div id="mindmap-canvas" style="position:relative;width:100%;height:500px;background:var(--bg-tertiary);border-radius:var(--radius-md);overflow:hidden;border:1px solid var(--border-color);">
      <canvas id="mm-lines" style="position:absolute;inset:0;width:100%;height:100%;"></canvas>
      <div id="mm-nodes"></div>
    </div>
  </div>`;
}

function renderMindMapNodes() {
  const container = document.getElementById('mm-nodes');
  const canvas = document.getElementById('mm-lines');
  if (!container || !canvas) return;
  const nodes = S.modalData?.mmNodes || [{ id: 'root', text: '中心主題', x: 350, y: 230, parent: null }];
  S.modalData = S.modalData || {};
  S.modalData.mmNodes = nodes;
  
  container.innerHTML = nodes.map(n => `
    <div class="mm-node ${n.parent ? '' : 'root'}" style="left:${n.x}px;top:${n.y}px;" 
      id="mm-${n.id}" ondblclick="editMindMapNode('${n.id}')" 
      onmousedown="startDragMM(event,'${n.id}')">${esc(n.text)}</div>
  `).join('');
  
  // Draw lines
  const ctx = canvas.getContext('2d');
  canvas.width = canvas.parentElement.clientWidth;
  canvas.height = canvas.parentElement.clientHeight;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim() || '#5c6bc0';
  ctx.lineWidth = 2;
  nodes.forEach(n => {
    if (!n.parent) return;
    const parent = nodes.find(p => p.id === n.parent);
    if (!parent) return;
    ctx.beginPath();
    ctx.moveTo(parent.x + 50, parent.y + 16);
    ctx.bezierCurveTo(parent.x + 100, parent.y + 16, n.x - 50, n.y + 16, n.x + 5, n.y + 16);
    ctx.stroke();
  });
}

function addMindMapNode(parentId) {
  const text = prompt('節點文字：');
  if (!text) return;
  const nodes = S.modalData?.mmNodes || [];
  const parent = parentId ? nodes.find(n => n.id === parentId) : nodes.find(n => !n.parent);
  nodes.push({
    id: uid(), text, parent: parent?.id || null,
    x: (parent?.x || 300) + 150 + Math.random() * 50,
    y: (parent?.y || 200) + (nodes.length * 50 - 100)
  });
  S.modalData = S.modalData || {};
  S.modalData.mmNodes = nodes;
  renderMindMapNodes();
}

function editMindMapNode(nodeId) {
  const nodes = S.modalData?.mmNodes || [];
  const node = nodes.find(n => n.id === nodeId);
  if (!node) return;
  const text = prompt('編輯節點：', node.text);
  if (text !== null) { node.text = text; renderMindMapNodes(); }
}

function autoArrangeMindMap() {
  const nodes = S.modalData?.mmNodes || [];
  const root = nodes.find(n => !n.parent);
  if (!root) return;
  root.x = 50; root.y = 220;
  const children = nodes.filter(n => n.parent === root.id);
  children.forEach((c, i) => { c.x = 250; c.y = 60 + i * 80; });
  // Level 2
  children.forEach(c => {
    const gc = nodes.filter(n => n.parent === c.id);
    gc.forEach((g, i) => { g.x = 450; g.y = c.y - 30 + i * 50; });
  });
  renderMindMapNodes();
}

let mmDragging = null;
function startDragMM(e, nodeId) {
  mmDragging = { id: nodeId, startX: e.clientX, startY: e.clientY };
  const nodes = S.modalData?.mmNodes || [];
  const node = nodes.find(n => n.id === nodeId);
  if (!node) return;
  mmDragging.nodeX = node.x;
  mmDragging.nodeY = node.y;
  
  const onMove = (ev) => {
    if (!mmDragging) return;
    node.x = mmDragging.nodeX + (ev.clientX - mmDragging.startX);
    node.y = mmDragging.nodeY + (ev.clientY - mmDragging.startY);
    renderMindMapNodes();
  };
  const onUp = () => { mmDragging = null; document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onUp); };
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
}

function exportMindMapImage() {
  const canvas = document.getElementById('mm-lines');
  if (!canvas) return;
  const a = document.createElement('a');
  a.href = canvas.toDataURL('image/png');
  a.download = 'mindmap.png';
  a.click();
  toast('心智圖已匯出', 'success');
}

// ========== REMINDER SYSTEM (提醒系統) ==========
function checkReminders() {
  const now = new Date();
  // Check supplier contract expiry
  S.suppliers.forEach(s => {
    if (s.contractExpiry) {
      const days = Math.floor((new Date(s.contractExpiry) - now) / 86400000);
      if (days === 30 || days === 60) {
        const exists = S.notifications.find(n => n.type === 'reminder' && n.detail === 'sup_' + s.id + '_' + days);
        if (!exists) {
          S.notifications.unshift({ id: uid(), type: 'reminder', title: '供應商合約即將到期', message: `${s.company} 合約將在 ${days} 天後到期`, detail: 'sup_' + s.id + '_' + days, read: false, createdAt: now.toISOString() });
        }
      }
    }
  });
  // Check ISO review dates
  S.isoDocs.forEach(d => {
    if (d.reviewDate) {
      const days = Math.floor((new Date(d.reviewDate) - now) / 86400000);
      if (days >= 0 && days <= 30) {
        const exists = S.notifications.find(n => n.detail === 'iso_' + d.id);
        if (!exists) {
          S.notifications.unshift({ id: uid(), type: 'reminder', title: 'ISO 文件即將到期審查', message: `${d.docNo} ${d.name} 審查日期：${fmtDate(d.reviewDate)}`, detail: 'iso_' + d.id, read: false, createdAt: now.toISOString() });
        }
      }
    }
  });
  // Check CRM 7-day no contact
  S.customers.forEach(c => {
    if (c.lastContact && daysSince(c.lastContact) > 7) {
      const opps = S.opportunities.filter(o => o.customerId === c.id && !['已成交', '已流失'].includes(o.stage));
      if (opps.length > 0) {
        const exists = S.notifications.find(n => n.detail === 'crm_' + c.id && !n.read);
        if (!exists) {
          S.notifications.unshift({ id: uid(), type: 'reminder', title: '客戶超過 7 天未聯繫', message: `${c.company} 有 ${opps.length} 筆進行中商機`, detail: 'crm_' + c.id, read: false, createdAt: now.toISOString() });
        }
      }
    }
  });
  // Check email tracking 3/7/14 days
  S.emailTracking.forEach(e => {
    if (e.replied || e.snoozed) return;
    const days = daysSince(e.sentAt);
    [3, 7, 14].forEach(d => {
      if (days >= d) {
        const exists = S.notifications.find(n => n.detail === 'email_' + e.id + '_' + d);
        if (!exists) {
          S.notifications.unshift({ id: uid(), type: 'reminder', title: `郵件 ${d} 天未回覆`, message: `寄給 ${e.to}: ${e.subject}`, detail: 'email_' + e.id + '_' + d, read: false, createdAt: now.toISOString() });
        }
      }
    });
  });
}

// ========== [FIX] PDF EXPORT ==========
function exportFormPDF(formId) {
  const form = S.forms.find(f => f.id === formId);
  if (!form) { toast('找不到表單', 'error'); return; }
  try {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    doc.setFont('helvetica');
    doc.setFontSize(16);
    doc.text('FormHub - ' + (form.formTypeName || ''), 20, 20);
    doc.setFontSize(10);
    doc.text(form.formNo + ' | ' + getDeptName(form.dept) + ' | v' + (form.version||1), 20, 28);
    doc.text(form.applicant + ' | ' + fmtDate(form.createdAt) + ' | ' + (form.status||''), 20, 34);
    doc.line(20, 37, 190, 37);
    let y = 44;
    (form.fields || []).forEach(f => {
      if (y > 270) { doc.addPage(); y = 20; }
      doc.setFontSize(9);
      doc.setTextColor(100);
      doc.text(f.label + ':', 20, y);
      doc.setTextColor(0);
      doc.setFontSize(10);
      const val = f.sensitive && S.role !== 'admin' ? '***' : (f.value || '-');
      doc.text(String(val), 70, y);
      y += 8;
    });
    if (form.items && form.items.length > 0) {
      y += 5;
      doc.setFontSize(11);
      doc.text('Items:', 20, y); y += 6;
      doc.setFontSize(9);
      form.items.forEach((item, i) => {
        if (y > 270) { doc.addPage(); y = 20; }
        const sub = (parseFloat(item.qty)||0) * (parseFloat(item.price)||0);
        doc.text(`${i+1}. ${item.name||''} x${item.qty||0} ${item.unit||''} @${item.price||0} = ${sub}`, 25, y);
        y += 6;
      });
    }
    if (form.approvalHistory && form.approvalHistory.length > 0) {
      y += 8;
      doc.setFontSize(11);
      doc.text('Approval History:', 20, y); y += 6;
      doc.setFontSize(9);
      form.approvalHistory.forEach(h => {
        if (y > 270) { doc.addPage(); y = 20; }
        doc.text(`${fmtDateTime(h.timestamp)} | ${h.name} | ${h.action} ${h.note ? '- ' + h.note : ''}`, 25, y);
        y += 6;
      });
    }
    if (form.signature) {
      if (y > 230) { doc.addPage(); y = 20; }
      y += 5;
      doc.text('Signature:', 20, y); y += 3;
      try { doc.addImage(form.signature, 'PNG', 20, y, 60, 25); } catch {}
    }
    doc.save(form.formNo + '.pdf');
    toast('PDF 已匯出', 'success');
  } catch (e) {
    console.error('PDF export error', e);
    toast('PDF 匯出失敗（jsPDF 載入中，請稍後重試）', 'error');
  }
}

function batchExportPDF() {

  if (checked.length === 0) { toast('請先勾選表單', 'warning'); return; }

// ========== [FIX] SIGNATURE IMPORT FROM IMAGE ==========
function importSignatureImage(formId) {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*';
  input.onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const form = S.forms.find(f => f.id === formId);
      if (form) {
        form.signature = ev.target.result;
        form.signedBy = S.user?.name || '訪客';
        form.signedAt = new Date().toISOString();
        saveData(); renderContent();
        toast('簽名圖檔已匯入', 'success');
      }
    };
    reader.readAsDataURL(file);
  };
  input.click();
}

// ========== [FIX] TASK DEPENDENCIES ==========
function setTaskDependency(taskId) {
  const task = S.tasks.find(t => t.id === taskId);
  if (!task) return;
  const otherTasks = S.tasks.filter(t => t.id !== taskId);
  if (otherTasks.length === 0) { toast('沒有其他任務可設定依賴', 'warning'); return; }
  const options = otherTasks.map(t => t.title).join('\n');
  const chosen = prompt('選擇依賴的任務名稱（輸入完整名稱）：\n\n' + options);
  if (!chosen) return;
  const dep = otherTasks.find(t => t.title === chosen.trim());
  if (!dep) { toast('找不到該任務', 'error'); return; }
  if (!task.dependencies) task.dependencies = [];
  if (task.dependencies.includes(dep.id)) { toast('已存在此依賴', 'warning'); return; }
  task.dependencies.push(dep.id);
  saveData(); renderContent();
  toast('依賴已設定：' + dep.title, 'success');
}

function getTaskDependencyNames(task) {
  if (!task.dependencies || task.dependencies.length === 0) return '';
  return task.dependencies.map(id => {
    const t = S.tasks.find(x => x.id === id);
    return t ? t.title : '';
  }).filter(Boolean).join(', ');
}

// ========== [FIX] SUBTASK UI ==========
function addSubtask(taskId) {
  const title = prompt('子任務名稱：');
  if (!title) return;
  const task = S.tasks.find(t => t.id === taskId);

function toggleSubtask(taskId, subIdx) {

}

function importSubscribersCsv(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    const lines = e.target.result.split('\n').slice(1);
    const subs = lsGet('newsletter_subscribers') || [];
    let added = 0;
    lines.forEach(line => {
      const parts = line.split(',').map(p => p.replace(/"/g, '').trim());
      if (parts[0] && parts[0].includes('@')) {
        if (!subs.find(s => s.email === parts[0])) {
          subs.push({ email: parts[0], name: parts[1] || '', addedAt: new Date().toISOString() });
          added++;
        }
      }
    });
    lsSet('newsletter_subscribers', subs);
    renderContent();
    toast(`已匯入 ${added} 位訂閱者`, 'success');
  };
  reader.readAsText(file);
}

  callN8nAI('parse-form', { text, formId }, (result) => {

function callN8nAI(action, data, callback) {
  const webhookUrl = lsGet('n8n_webhook') || 'https://lalav.zeabur.app/webhook/formhub-ai';
  fetch(webhookUrl, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ action, ...data, userId: S.user?.uid })
  })
  .then(r => r.json())
  .then(result => { if (callback) callback(result); })
  .catch(e => {
    console.warn('[AI] n8n call failed:', e);
    toast('AI 功能需要 n8n webhook 配合（請在整合設定中配置）', 'warning');
    if (callback) callback(null);
  });
}

// ========== [FIX] CSV IMPORT ==========
function importFormsCsv() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.csv';
  input.onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const lines = ev.target.result.split('\n');
      if (lines.length < 2) { toast('CSV 格式錯誤', 'error'); return; }
      const headers = lines[0].split(',').map(h => h.replace(/"/g, '').trim());
      let imported = 0;
      for (let i = 1; i < lines.length; i++) {
        const values = lines[i].split(',').map(v => v.replace(/"/g, '').trim());
        if (values.length < 3) continue;
        const form = {
          id: uid(), formNo: values[0] || nextSeqNo(S.currentDept),
          dept: S.currentDept, formType: 'imported', formTypeName: 'CSV 匯入',
          title: values[1] || '', applicant: values[2] || S.user?.name,
          createdBy: S.user?.uid || 'guest', createdAt: new Date().toISOString(),
          updatedAt: new Date().toISOString(), status: 'draft', version: 1,
          fields: headers.slice(3).map((h, fi) => ({ key: 'f' + fi, label: h, type: 'text', value: values[fi + 3] || '' })),
          items: [], approvalFlow: [], approvalHistory: [], comments: [], attachments: [], fieldHistory: {}
        };
        S.forms.unshift(form);
        imported++;
      }
      saveData(); renderContent();
      toast(`已匯入 ${imported} 張表單`, 'success');
    };
    reader.readAsText(file);
  };
  input.click();
}

function addSubtableRow(formId, stId) {
  if (!checkPerm('write')) return;
  const form = S.forms.find(f => f.id === formId);
  if (!form) return;
  if (!form.subtables) form.subtables = {};
  if (!form.subtables[stId]) form.subtables[stId] = [];
  form.subtables[stId].push({});
  form.updatedAt = new Date().toISOString();
  saveData(); renderContent();
}

function removeSubtableRow(formId, stId, rowIdx) {
  if (!checkPerm('write')) return;
  const form = S.forms.find(f => f.id === formId);
  if (!form || !form.subtables?.[stId]) return;
  form.subtables[stId].splice(rowIdx, 1);
  form.updatedAt = new Date().toISOString();
  saveData(); renderContent();
}

function updateSubtableCell(formId, stId, rowIdx, key, value) {
  const form = S.forms.find(f => f.id === formId);
  if (!form || !form.subtables?.[stId] || !form.subtables[stId][rowIdx]) return;
  
  const oldVal = form.subtables[stId][rowIdx][key] || '';
  const newVal = value || '';
  
  // ★ Record subtable cell history
  if (oldVal !== newVal) {
    const histKey = `${stId}[${rowIdx}].${key}`;
    if (!form.fieldHistory) form.fieldHistory = {};
    if (!form.fieldHistory[histKey]) form.fieldHistory[histKey] = [];
    form.fieldHistory[histKey].push({
      who: S.user?.name || '訪客',
      when: new Date().toISOString(),
      oldVal: oldVal,
      newVal: newVal,
      reason: ''
    });
  }
  
  form.subtables[stId][rowIdx][key] = value;
  
  // Auto-compute total_amount if this subtable has computed columns
  const stDefs = getSubtableDefs(form.formType);
  const stDef = stDefs.find(s => s.id === stId);
  if (stDef) {
    const computedCol = stDef.columns.find(c => c.type === 'computed');
    if (computedCol) {
      const total = form.subtables[stId].reduce((s, r) => s + (computedCol.formula ? computedCol.formula(r) : 0), 0);
      const amtField = form.fields.find(f => f.key === 'total_amount');
      if (amtField) amtField.value = String(total);
    }
  }
  
  form.version = (form.version || 1) + 1;
  form.updatedAt = new Date().toISOString();
  saveData();
  renderContent();
}

function performAdvancedSearch(filters) {
  const results = S.forms.filter(f => {
    return filters.every(filter => {
      if (!filter.key) return true;
      const field = f.fields?.find(x => x.key === filter.key || x.label === filter.key);
      const val = String(field?.value || '').toLowerCase();
      const q = String(filter.value || '').toLowerCase();
      switch (filter.op) {
        case 'contains': return val.includes(q);
        case 'equals': return val === q;
        case 'gt': return parseFloat(val) > parseFloat(q);
        case 'lt': return parseFloat(val) < parseFloat(q);
        case 'not_empty': return val.length > 0;
        case 'empty': return val.length === 0;
        default: return val.includes(q);
      }
    });
  });
  return results;
}

    sheetAccess: {},

    fieldAccess: {},

function canAccessSheet(deptId, formType) {
  if (S.role === 'admin') return true;
  const key = deptId + ':' + formType;
  const access = S.permissions?.sheetAccess?.[key];
  if (!access) return true; // Default: accessible
  // Check user's groups
  const userGroups = (S.permissions?.groups || []).filter(g => (g.members || []).includes(S.user?.uid));
  for (const g of userGroups) {
    if (access[g.id] && access[g.id] !== 'none') return true;
  }
  return S.role !== 'readonly'; // Fallback to role
}

function canAccessField(fieldKey) {
  if (S.role === 'admin') return true;
  const minRole = S.permissions?.fieldAccess?.[fieldKey];
  if (!minRole) return true;
  const hierarchy = ['admin', 'manager', 'employee', 'auditor', 'readonly'];
  return hierarchy.indexOf(S.role) <= hierarchy.indexOf(minRole);
}

// ========== [RAGIC] 3. CROSS-SHEET LINKING ==========
// Link & Load: 從其他表單帶入資料
function linkAndLoad(formId, sourceFormType, sourceDept, fieldMap) {
  const form = S.forms.find(f => f.id === formId);
  if (!form) return;
  // Find source forms
  const sources = S.forms.filter(f => f.formType === sourceFormType && f.dept === (sourceDept || f.dept) && f.status !== 'draft');
  if (sources.length === 0) { toast('找不到可連結的來源表單', 'warning'); return; }
  
  // Show selection
  const titles = sources.map(s => s.formNo + ' - ' + (s.fields?.find(f => f.key === 'subject')?.value || s.formTypeName));
  const chosen = prompt('選擇來源表單：\n' + titles.map((t, i) => `${i + 1}. ${t}`).join('\n') + '\n\n輸入序號：');
  if (!chosen) return;
  const idx = parseInt(chosen) - 1;
  if (idx < 0 || idx >= sources.length) return;
  
  const source = sources[idx];
  // Auto-fill fields based on mapping
  Object.entries(fieldMap || {}).forEach(([targetKey, sourceKey]) => {
    const targetField = form.fields.find(f => f.key === targetKey);
    const sourceField = source.fields?.find(f => f.key === sourceKey);
    if (targetField && sourceField) {
      targetField.value = sourceField.value;
    }
  });
  
  form.linkedFrom = { formId: source.id, formNo: source.formNo };
  form.updatedAt = new Date().toISOString();
  saveData(); renderContent();
  toast('已從 ' + source.formNo + ' 帶入資料', 'success');
}

// Update value on another sheet
function updateOtherForm(targetFormId, updates) {
  const target = S.forms.find(f => f.id === targetFormId);
  if (!target) return;
  Object.entries(updates).forEach(([key, value]) => {
    const field = target.fields.find(f => f.key === key);
    if (field) field.value = value;
  });
  target.updatedAt = new Date().toISOString();
  saveData();
  addAuditLog('跨表更新', `更新表單 ${target.formNo} 的欄位`);
}

// ========== [RAGIC] 4. GENERATE OFFICE DOCUMENTS ==========
// Excel export (real .xlsx would need SheetJS, using CSV with Excel-friendly format)
function exportFormExcel(formId) {
  const form = S.forms.find(f => f.id === formId);
  if (!form) return;
  const rows = [
    ['FormHub 表單匯出'],
    ['表單編號', form.formNo],
    ['類型', form.formTypeName],
    ['部門', getDeptName(form.dept)],
    ['申請人', form.applicant],
    ['狀態', form.status],
    ['版本', 'v' + (form.version || 1)],
    ['建立時間', form.createdAt],
    [],
    ['欄位', '值'],
  ];
  (form.fields || []).forEach(f => { rows.push([f.label, f.value || '']); });
  
  // Add subtables
  const stDefs = getSubtableDefs(form.formType);
  stDefs.forEach(st => {
    rows.push([]);
    rows.push([st.title]);
    const stRows = form.subtables?.[st.id] || [];
    if (stRows.length > 0) {
      rows.push(st.columns.map(c => c.label));
      stRows.forEach(r => { rows.push(st.columns.map(c => c.type === 'computed' && c.formula ? c.formula(r) : (r[c.key] || ''))); });
    }
  });
  
  const csv = '\ufeff' + rows.map(r => r.map(c => '"' + String(c || '').replace(/"/g, '""') + '"').join(',')).join('\n');
  const blob = new Blob([csv], { type: 'application/vnd.ms-excel;charset=utf-8' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = form.formNo + '.xls';
  a.click();
  toast('Excel 已匯出', 'success');
}

    id: uid(), type: action, title: action === 'approved' ? '表單已核准' : action === 'rejected' ? '表單已退回' : action === 'submitted' ? '表單已送審' : '表單更新',
    message: `${form.formNo} ${form.formTypeName} — ${form.applicant}`,
    formId: form.id, read: false, createdAt: new Date().toISOString()
  });
  
  // Send to n8n for Email/Teams/Push
  sendN8nNotification('form_' + action, {
    formNo: form.formNo, formType: form.formTypeName,
    applicant: form.applicant, dept: getDeptName(form.dept),

}

function scheduleReminder(formId, fieldKey, date, message, cycle) {
  const reminders = lsGet('scheduledReminders') || [];
  reminders.push({
    id: uid(), formId, fieldKey, date, message, cycle: cycle || 'once',
    active: true, createdAt: new Date().toISOString(), createdBy: S.user?.name
  });
  lsSet('scheduledReminders', reminders);
  toast('提醒已排程：' + fmtDate(date), 'success');
}

function processScheduledReminders() {
  const reminders = lsGet('scheduledReminders') || [];
  const now = new Date();
  const today = now.toISOString().split('T')[0];
  
  reminders.forEach(r => {
    if (!r.active) return;
    if (r.date <= today) {
      // Fire reminder
      S.notifications.unshift({
        id: uid(), type: 'reminder', title: '排程提醒',
        message: r.message || '提醒事項已到期', formId: r.formId,
        read: false, createdAt: now.toISOString()
      });
      // Send via n8n
      sendN8nNotification('reminder', { message: r.message, formId: r.formId });
      
      // Handle cycle
      if (r.cycle === 'daily') {
        const next = new Date(r.date); next.setDate(next.getDate() + 1);
        r.date = next.toISOString().split('T')[0];
      } else if (r.cycle === 'weekly') {
        const next = new Date(r.date); next.setDate(next.getDate() + 7);
        r.date = next.toISOString().split('T')[0];
      } else if (r.cycle === 'monthly') {
        const next = new Date(r.date); next.setMonth(next.getMonth() + 1);
        r.date = next.toISOString().split('T')[0];
      } else {
        r.active = false; // one-time
      }
    }
  });
  lsSet('scheduledReminders', reminders);
}

// ========== [RAGIC] CONDITIONAL APPROVAL (條件式簽核) ==========
function getConditionalApprovalFlow(form) {
  const rules = lsGet('approvalRules_' + form.dept) || [];
  for (const rule of rules) {
    const field = form.fields?.find(f => f.key === rule.fieldKey);
    if (!field) continue;
    const val = parseFloat(field.value) || 0;
    let match = false;
    switch (rule.operator) {
      case 'gt': match = val > rule.threshold; break;
      case 'lt': match = val < rule.threshold; break;
      case 'eq': match = field.value === rule.value; break;
      case 'contains': match = (field.value || '').includes(rule.value); break;
    }
    if (match) return rule.flow; // Return the matching approval flow
  }
  return null; // No conditional match, use default
}

                → 使用流程：${(r.flow || []).map(s => s.role).join(' → ')}
              </div>

function addApprovalRule(deptId) {
  const fieldKey = prompt('欄位 key（例：total_amount）：');
  if (!fieldKey) return;
  const operator = prompt('條件（gt/lt/eq/contains）：', 'gt');
  const threshold = prompt('門檻值：');
  if (!threshold) return;
  const flowStr = prompt('簽核流程（格式：角色1,角色2,角色3）：', '部門主管,副總,總經理');
  if (!flowStr) return;
  const flow = flowStr.split(',').map(s => ({ role: s.trim(), name: s.trim() }));
  
  const rules = lsGet('approvalRules_' + deptId) || [];
  rules.push({ fieldKey, operator, threshold: parseFloat(threshold) || threshold, value: threshold, flow });
  lsSet('approvalRules_' + deptId, rules);
  renderContent();
  toast('條件式簽核規則已新增', 'success');
}

function removeApprovalRule(deptId, idx) {
  const rules = lsGet('approvalRules_' + deptId) || [];
  rules.splice(idx, 1);
  lsSet('approvalRules_' + deptId, rules);
  renderContent();
}

// ========== [RAGIC] ADD SIGNER (加簽) ==========
function addExtraApprover(formId, direction) {
  // direction: 'before' = 向前加簽, 'after' = 向後加簽
  const form = S.forms.find(f => f.id === formId);
  if (!form) return;
  if (!canDo('approve')) { toast('您沒有加簽權限', 'error'); return; }
  
  const name = prompt(`${direction === 'before' ? '向前' : '向後'}加簽 — 請輸入簽核人姓名：`);
  if (!name) return;
  const role = prompt('角色名稱（例：副總審核）：', name + '審核');
  
  if (!form.approvalFlow) form.approvalFlow = [];
  const currentStep = form.currentStep || 0;
  const newStep = { role: role || name, name, addedBy: S.user?.name, addedAt: new Date().toISOString(), isExtra: true };
  
  if (direction === 'before') {
    form.approvalFlow.splice(currentStep, 0, newStep);
  } else {
    form.approvalFlow.splice(currentStep + 1, 0, newStep);
  }
  
  addAuditLog('加簽', `${direction === 'before' ? '向前' : '向後'}加簽：${name}（表單 ${form.formNo}）`);
  form.updatedAt = new Date().toISOString();
  saveData(); renderContent();
  toast(`已${direction === 'before' ? '向前' : '向後'}加簽：${name}`, 'success');
}

          ${S.role === 'admin' ? '🔑 系統管理員' : S.role === 'manager' ? '👔 部門主管' : S.role === 'auditor' ? '✅ 審核員' : S.role === 'readonly' ? '👁️ 唯讀' : '👤 一般員工'}
          <span style="font-size:0.72rem;color:var(--text-tertiary);margin-left:8px;">（由管理員設定）</span>
        </div>
      </div>
      <button class="btn btn-primary" style="width:100%;" onclick="saveMyProfile()">儲存</button>
    </div>
    
    <div class="card">
      <div class="card-title" style="margin-bottom:12px;">登入後介面說明</div>
      <div style="font-size:0.82rem;line-height:1.8;color:var(--text-secondary);">
        <div>• <strong>部門 Tab</strong>：只顯示您有權限的部門。您的部門標有 ★。</div>
        <div>• <strong>表單資料</strong>：預設只看到自己部門 + 公用(COM) + 您建立的表單。</div>
        <div>• <strong>行事曆</strong>：可切換「公司行事曆」（全公司）和「部門行事曆」（僅您的部門）。</div>
        <div>• <strong>管理員</strong>：可看到所有部門所有資料。</div>
        <div>• <strong>權限矩陣</strong>：管理員可在「群組權限矩陣」中精細控制跨部門存取。</div>
      </div>
    </div>
  </div>`;
}

function saveMyProfile() {
  const name = document.getElementById('profile-name')?.value?.trim();
  const deptId = document.getElementById('profile-dept')?.value;
  if (!name) { toast('請填寫姓名', 'error'); return; }
  
  saveUserProfile(S.user.uid, { name, deptId });
  S.user.name = name;
  S.user.deptId = deptId;
  S.currentDept = deptId;
  
  addAuditLog('個人設定', `更新個人資料：${name}, 部門 ${deptId}`);
  saveData();
  renderAll();
  toast('個人資料已儲存', 'success');
  navigate('dashboard');
}

// ========== KEYBOARD SHORTCUTS ==========
document.addEventListener('keydown', (e) => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
    e.preventDefault();
    if (S.searchOpen) closeSearch();
    else openSearch();
  }
  if (e.key === 'Escape') {
    if (S.searchOpen) closeSearch();
    else if (S.modalType) closeModal();
  }
});

// ========== AUTO BACKUP ==========
setInterval(() => {
  lsSet('forms', S.forms);
  lsSet('auto_backup_time', new Date().toISOString());
}, 3600000); // Every hour

// ========== BOOT ==========
(async () => {
  // Theme
  const savedTheme = lsGet('theme');
  if (savedTheme) setTheme(savedTheme);
  
  await initFB();
  initAuth();
  
  S.user = S.user || { uid: 'guest_' + uid(), email: '', name: '訪客', deptId: 'COM', role: 'employee' };
  S.loading = true;
  await loadData();
  S.loading = false;
  
  // Show app
  document.getElementById('app').style.display = 'flex';
  document.getElementById('loading-screen').classList.add('hide');
  setTimeout(() => document.getElementById('loading-screen').style.display = 'none', 400);
  
  renderAll();
  initIdleDetection();
  initClipboardPaste();
  initOfflineDetection();
  initWatermarkTimer();
  checkReminders();
  processScheduledReminders();
  initPermissions();
  setInterval(checkReminders, 600000);
  setInterval(processScheduledReminders, 600000);
  console.log('[FormHub] Boot complete. Forms:', S.forms.length, 'Depts:', S.departments.length);
})();
</script>
</body>
</html>
