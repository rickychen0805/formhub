function pgPersonalCalendar() {
  const myForms = S.forms.filter(f => f.applicant === S.currentUser.name);
  const pendingForms = S.forms.filter(f => f.status === 'pending');
  const reminders = Reminder.getAll().filter(r => !r.done);
  const projects = ProjDB.getAll();
  const myTasks = projects.flatMap(p => (p.tasks || []).filter(t => t.assignee === S.currentUser.name).map(t => ({ ...t, projectName: p.name })));

  const now2 = new Date();
  const year = S.calYear || now2.getFullYear();
  const month = S.calMonth !== undefined ? S.calMonth : now2.getMonth();
  const first = new Date(year, month, 1);
  const last = new Date(year, month + 1, 0);
  const startDay = first.getDay();
  const monthNames = ['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
  const dayNames = ['日','一','二','三','四','五','六'];

  const evMap = {};
  const addEv = (d, ev) => { if (!d) return; const key = d.slice(0, 10); if (!evMap[key]) evMap[key] = []; evMap[key].push(ev); };
  myForms.forEach(f => addEv(f.date, { text: f.seq, color: 'var(--blue)', type: 'form' }));
  pendingForms.forEach(f => addEv(f.date, { text: '待審:' + f.seq, color: 'var(--amber)', type: 'pending' }));
  reminders.forEach(r => addEv(r.dueDate, { text: r.title, color: 'var(--red)', type: 'reminder' }));
  myTasks.forEach(t => { addEv(t.endDate, { text: t.name, color: 'var(--purple)', type: 'task' }); });

  let cells = '';
  const total = startDay + last.getDate();
  for (let i = 0; i < Math.ceil(total / 7) * 7; i++) {
    const dayNum = i - startDay + 1;
    const isValid = dayNum >= 1 && dayNum <= last.getDate();
    const dateStr = isValid ? `${year}-${String(month+1).padStart(2,'0')}-${String(dayNum).padStart(2,'0')}` : '';
    const isToday = dateStr === today();
    const evs = evMap[dateStr] || [];
    cells += `<td style="vertical-align:top;padding:3px;border:1px solid var(--border);min-height:72px;background:${isToday?'var(--blue-lt)':isValid?'var(--card)':'var(--bg2)'}">
      <div style="font-size:10px;font-weight:${isToday?'700':'400'};color:${isToday?'var(--blue)':'var(--text3)'};margin-bottom:2px;text-align:right">${isValid?dayNum:''}</div>
      ${evs.slice(0,3).map(ev=>`<div style="font-size:9px;padding:1px 4px;border-radius:2px;margin-bottom:1px;background:${ev.color}22;color:${ev.color};overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${ev.text}</div>`).join('')}
      ${evs.length>3?`<div style="font-size:9px;color:var(--text4)">+${evs.length-3}</div>`:''}
    </td>`;
    if ((i + 1) % 7 === 0) cells += '</tr><tr>';
  }

  return `
  <div class="pg-hdr">
    <div><div class="pg-title">📅 個人行事曆</div><div class="pg-sub">${S.currentUser.name}</div></div>
    <div class="pg-sp"></div>
    <button class="btn sm pri" onclick="S.modal='add-reminder';renderAll()">＋ 新增提醒</button>
  </div>

  <div class="stats">
    <div class="stat" style="border-left:3px solid var(--blue)"><div class="stat-v" style="color:var(--blue)">${myForms.length}</div><div class="stat-l">我的表單</div></div>
    <div class="stat" style="border-left:3px solid var(--amber)"><div class="stat-v" style="color:var(--amber)">${pendingForms.length}</div><div class="stat-l">待我審核</div></div>
    <div class="stat" style="border-left:3px solid var(--purple)"><div class="stat-v" style="color:var(--purple)">${myTasks.length}</div><div class="stat-l">我的任務</div></div>
    <div class="stat" style="border-left:3px solid var(--red)"><div class="stat-v" style="color:var(--red)">${reminders.length}</div><div class="stat-l">提醒事項</div></div>
  </div>

  <div style="display:grid;grid-template-columns:1fr 260px;gap:14px">
    <div style="background:var(--card);border-radius:var(--r2);border:1px solid var(--border);overflow:hidden">
      <div style="display:flex;align-items:center;padding:10px 14px;border-bottom:1px solid var(--border);gap:10px">
        <button class="btn sm ico" onclick="S.calMonth=${month===0?'(S.calYear='+(year-1)+',11)':'month-1'};renderAll()">←</button>
        <span style="font-size:14px;font-weight:600;flex:1;text-align:center">${year} 年 ${monthNames[month]}</span>
        <button class="btn sm ico" onclick="S.calMonth=${month===11?'(S.calYear='+(year+1)+',0)':'month+1'};renderAll()">→</button>
        <button class="btn sm" onclick="S.calYear=${now2.getFullYear()};S.calMonth=${now2.getMonth()};renderAll()">今天</button>
      </div>
      <div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse">
        <thead><tr>${dayNames.map(d=>`<th style="padding:6px;font-size:10px;color:var(--text3);border:1px solid var(--border);text-align:center">${d}</th>`).join('')}</tr></thead>
        <tbody><tr>${cells}</tbody>
      </table></div>
    </div>
    <div>
      <div class="sec">
        <div class="sec-hdr red">⏰ 提醒事項</div>
        <div class="sec-body" style="padding:8px">
          ${reminders.length===0?'<div class="txt-muted txt-xs">無提醒</div>':
            reminders.slice(0,8).map(r=>`
            <div style="display:flex;align-items:flex-start;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)">
              <span style="font-size:12px">${r.periodic?'🔁':'🔔'}</span>
              <div style="flex:1">
                <div style="font-size:12px;font-weight:500">${r.title}</div>
                <div style="font-size:10px;color:${r.dueDate&&r.dueDate<=today()?'var(--red)':'var(--text3)'}">${r.dueDate||''} ${r.periodic?'('+r.period+')':''}</div>
              </div>
              <button class="btn sm" style="padding:2px 6px;font-size:10px" onclick="Reminder.dismiss('${r.id}');renderAll()">✓</button>
            </div>`).join('')}
          <button class="btn sm w-full mt-1" onclick="S.modal='add-reminder';renderAll()">＋ 新增提醒</button>
        </div>
      </div>
      <div class="sec">
        <div class="sec-hdr purple">✅ 我的任務</div>
        <div class="sec-body" style="padding:8px">
          ${myTasks.length===0?'<div class="txt-muted txt-xs">無任務</div>':
            myTasks.slice(0,5).map(t=>`
            <div style="padding:5px 0;border-bottom:1px solid var(--border)">
              <div style="font-size:12px">${t.name}</div>
              <div style="font-size:10px;color:var(--text3)">${t.projectName} · ${t.endDate||'-'}</div>
            </div>`).join('')}
        </div>
      </div>
    </div>
  </div>`;
}

    return v;
  },
  get(id) { return this.getAll().find(x => x.id === id); },
  genPortalToken(vendorId) {
    const token = btoa(vendorId + ':' + Date.now() + ':' + Math.random().toString(36).slice(2));
    const tokens = L.get('vendor_tokens') || {};
    tokens[token] = { vendorId, createdAt: now(), used: 0, expires: new Date(Date.now() + 30*86400000).toISOString().slice(0,10) };
    L.set('vendor_tokens', tokens);
    return token;
  }
};

// 圖片 AI 視覺辨識
// ════════════════════════════════════════════
async function aiVisionFill(imageDataURL, targetForm) {
  const dept = S.depts.find(d => d.id === (targetForm === 'new' ? (S.aiDept || S.deptId) : S.forms.find(f=>f.id===targetForm)?.deptId));
  const fieldList = (dept?.fields || []).map(f => `${f.label}(${f.type})`).join('、');
  const sys = `你是表單辨識助手。分析圖片中的內容，辨識所有文字和數據，自動對應到以下表單欄位：${fieldList}。
同時辨識圖片中的品項表格（品名、數量、單位、單價）。
只回傳JSON：{"fields":{"欄位名稱":"值"},"items":[{"name":"","qty":1,"unit":"個","price":0}],"applicant":"","_summary":"一句話摘要","_ok":true}`;
  toast('🤖 AI 視覺辨識中...', 8000);
  try {
    const r = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514', max_tokens: 1500, system: sys,
        messages: [{ role: 'user', content: [
          { type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: imageDataURL.split(',')[1] || imageDataURL } },
          { type: 'text', text: '請辨識此圖片中的表單資料並填入對應欄位' }
        ]}]
      })
    });
    const data = await r.json();
    const parsed = JSON.parse(data.content?.[0]?.text?.replace(/```json\n?|\n?```/g, '').trim() || '{}');
    // 填入欄位
    if (parsed.fields) {
      Object.entries(parsed.fields).forEach(([label, val]) => {
        const fd = dept?.fields?.find(f => f.label === label);
        if (fd) {
          const prefix = targetForm === 'new' ? 'nf-' : 'ef-';
          const el = document.getElementById(prefix + fd.id);
          if (el) el.value = val;
        }
      });
    }
    if (parsed.applicant) {
      const el = document.getElementById('inp-applicant');
      if (el) el.value = parsed.applicant;
    }
    // 填入品項
    if (parsed.items?.length) {
      S.aiParsed = { ...S.aiParsed, items: parsed.items, _ok: true, _summary: parsed._summary };
      renderAll();
    }
    toast(`✅ AI 辨識完成：${parsed._summary || '已填入欄位'}`);
    return parsed;
  } catch(e) {
    toast('❌ AI 辨識失敗：' + e.message, 4000);
    return null;
  }
}

  for (const it of items) {
    if (it.type.startsWith('image/')) {

function saveReminder() {
  const title = document.getElementById('rem-title')?.value?.trim();
  const dueDate = document.getElementById('rem-date')?.value;
  const period = document.getElementById('rem-period')?.value;
  const note = document.getElementById('rem-note')?.value;
  if (!title || !dueDate) { toast('請填寫標題和日期'); return; }
  Reminder.add({ title, dueDate, periodic: !!period, period, nextDate: dueDate, note });
  S.modal = null; toast('✓ 提醒已新增'); renderAll();
}

function saveProject(deptId) {
  const name = document.getElementById('pj-name')?.value?.trim();
  if (!name) { toast('請填寫專案名稱'); return; }
  const tagsRaw = document.getElementById('pj-tags')?.value || '';
  const proj = {
    id: 'pj_' + Date.now(), deptId: deptId || S.deptId || 'MGT', name,
    desc: document.getElementById('pj-desc')?.value || '',
    assignee: document.getElementById('pj-assignee')?.value || S.currentUser.name,
    priority: document.getElementById('pj-priority')?.value || '中',
    startDate: document.getElementById('pj-start')?.value || today(),
    endDate: document.getElementById('pj-end')?.value || '',
    tags: tagsRaw ? tagsRaw.split(',').map(t => t.trim()) : [],
    status: '待辦', tasks: [], createdAt: now(), createdBy: S.currentUser.name
  };
  ProjDB.save(proj);
  AuditLog.record('create_project', `建立專案：${name}`, proj.id);
  S.modal = null; toast('✓ 專案已建立'); renderAll();
}

function addTask(projId) {
  const name = prompt('任務名稱：'); if (!name?.trim()) return;
  const assignee = prompt('負責人：', S.currentUser.name) || S.currentUser.name;
  const endDate = prompt('截止日 (YYYY-MM-DD)：', '') || '';
  const proj = ProjDB.get(projId); if (!proj) return;
  if (!proj.tasks) proj.tasks = [];
  proj.tasks.push({ id: 't_' + Date.now(), name: name.trim(), assignee, endDate, done: false, progress: 0, status: '待辦' });
  ProjDB.save(proj);
  renderAll();
}

function toggleTask(projId, taskId, done) {
  const proj = ProjDB.get(projId); if (!proj) return;
  const task = (proj.tasks || []).find(t => t.id === taskId);
  if (task) { task.done = done; task.status = done ? '已完成' : '進行中'; ProjDB.save(proj); }
  renderAll();
}

function saveVendor() {
  const name = document.getElementById('v-name')?.value?.trim();
  if (!name) { toast('請填寫公司名稱'); return; }
  const v = {
    id: 'v_' + Date.now(), name,
    taxId: document.getElementById('v-tax')?.value || '',
    contact: document.getElementById('v-contact')?.value || '',
    phone: document.getElementById('v-phone')?.value || '',
    email: document.getElementById('v-email')?.value || '',
    industry: document.getElementById('v-industry')?.value || '',
    contractExpiry: document.getElementById('v-expiry')?.value || '',
    grade: document.getElementById('v-grade')?.value || 'B',
    payment: document.getElementById('v-payment')?.value || '月結30天',
    status: '啟用', createdAt: now()
  };
  VendorDB.save(v);
  AuditLog.record('create_vendor', `新增供應商：${name}`, v.id);
  S.modal = null; toast('✓ 供應商已新增'); renderAll();
}

function pgAuditLog() {
  const logs = AuditLog.getAll().slice(0, 100);
  return `
  <div class="pg-hdr">
    <div><div class="pg-title">📜 操作稽核日誌</div><div class="pg-sub">${logs.length} 筆最近記錄</div></div>
    <div class="pg-sp"></div>
    <button class="btn sm" onclick="exportAuditLog()">📥 匯出</button>
  </div>
  <div class="tbl-wrap">
    <table class="tbl">
      <thead><tr><th>時間</th><th>操作人</th><th>動作</th><th>說明</th><th>相關表單</th></tr></thead>
      <tbody>${logs.length===0?`<tr><td colspan="5" style="text-align:center;padding:30px;color:var(--text4)">尚無記錄</td></tr>`:
        logs.map(l=>`<tr>
          <td class="txt-xs txt-muted">${l.time}</td>
          <td style="font-size:12px">${l.user}</td>
          <td><span class="badge b-blue" style="font-size:10px">${l.action}</span></td>
          <td style="font-size:12px">${l.detail}</td>
          <td class="mono">${l.formId||'-'}</td>
        </tr>`).join('')}
      </tbody>
    </table>
  </div>`;
}

function exportAuditLog() {
  const logs = AuditLog.getAll();
  const rows = [['時間','操作人','動作','說明','相關單號']];
  logs.forEach(l => rows.push([l.time, l.user, l.action, l.detail, l.formId || '']));
  const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g, '""')}"`).join(',')).join('\n');
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = `audit_log_${today()}.csv`; a.click();
  toast('✓ 稽核日誌已匯出');
}
