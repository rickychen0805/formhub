<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FormHub">
<meta name="theme-color" content="#1a2332">
<title>FormHub — 電子簽核系統</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#1a2332;--navy2:#1e2d42;--navy3:#243350;
  --blue:#2563eb;--blue2:#1d4ed8;--blue-lt:#dbeafe;
  --green:#15803d;--green-lt:#dcfce7;
  --amber:#b45309;--amber-lt:#fef3c7;
  --red:#dc2626;--red-lt:#fee2e2;
  --purple:#7c3aed;--purple-lt:#ede9fe;
  --teal:#0f766e;--teal-lt:#ccfbf1;
  --wine:#9f1239;--wine-lt:#ffe4e6;
  --olive:#4d7c0f;--olive-lt:#ecfccb;
  --gray:#64748b;--gray-lt:#f1f5f9;
  --text:#0f172a;--text2:#334155;--text3:#64748b;--text4:#94a3b8;
  --bg:#f1f5f9;--bg2:#e2e8f0;--bg3:#cbd5e1;
  --card:#ffffff;--border:#e2e8f0;--border2:#cbd5e1;
  --font:'Noto Sans TC',sans-serif;--mono:'JetBrains Mono',monospace;
  --r:6px;--r2:8px;--r3:12px;
  --sh:0 1px 3px rgba(0,0,0,.08);--sh2:0 4px 12px rgba(0,0,0,.1);
  --hdr:46px;--tab:42px;--sb:200px;
  --safe-b:env(safe-area-inset-bottom,0px);
}
@media(prefers-color-scheme:dark){:root{
  --navy:#0d1520;--navy2:#111d2e;--navy3:#172338;
  --blue-lt:#1e3a5f;--green-lt:#052e16;--amber-lt:#2d1f06;
  --red-lt:#2d0a0a;--purple-lt:#1a0f3a;--teal-lt:#042926;
  --wine-lt:#2d0a14;--olive-lt:#1a2608;
  --text:#e2e8f0;--text2:#cbd5e1;--text3:#94a3b8;--text4:#64748b;
  --bg:#0d1520;--bg2:#111d2e;--bg3:#172338;
  --card:#111d2e;--border:#1e3a5f;--border2:#263554;
}}
html{font-size:14px;-webkit-text-size-adjust:100%}
body{font-family:var(--font);color:var(--text);background:var(--bg);min-height:100vh}

/* ── HEADER ── */
#hdr{
  height:var(--hdr);background:var(--navy);
  display:flex;align-items:center;padding:0 12px;gap:10px;
  position:fixed;top:0;left:0;right:0;z-index:300;
  box-shadow:0 2px 8px rgba(0,0,0,.4);
}
.logo{font-size:15px;font-weight:700;color:#fff;letter-spacing:-.3px}
.logo em{color:#60a5fa;font-style:normal}
.sync-badge{font-size:10px;padding:2px 7px;border-radius:99px;white-space:nowrap}
.sync-cloud{background:rgba(34,197,94,.25);color:#86efac}
.sync-local{background:rgba(251,191,36,.25);color:#fcd34d}
.h-sp{flex:1}
.h-btn{background:rgba(255,255,255,.1);border:none;color:#e2e8f0;padding:5px 10px;border-radius:var(--r);font-size:11px;cursor:pointer;font-family:var(--font);display:flex;align-items:center;gap:5px;white-space:nowrap}
.h-btn:hover{background:rgba(255,255,255,.18)}
.h-btn.pri{background:var(--blue);color:#fff}
.h-btn.pri:hover{background:var(--blue2)}
.h-avatar{width:27px;height:27px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;cursor:pointer}

/* ── DEPT TABS ── */
#deptbar{
  height:var(--tab);background:var(--navy2);
  position:fixed;top:var(--hdr);left:0;right:0;z-index:290;
  display:flex;align-items:stretch;overflow-x:auto;scrollbar-width:none;
  border-bottom:1px solid rgba(255,255,255,.07);
}
#deptbar::-webkit-scrollbar{display:none}
.dtab{
  display:flex;align-items:center;gap:6px;padding:0 14px;
  font-size:12px;font-weight:500;color:#94a3b8;white-space:nowrap;
  cursor:pointer;border-bottom:2px solid transparent;flex-shrink:0;
  transition:all .15s;
}
.dtab:hover{color:#e2e8f0;background:rgba(255,255,255,.05)}
.dtab.on{color:#fff;border-bottom-color:var(--blue);background:rgba(37,99,235,.18)}
.dtab .dd{width:6px;height:6px;border-radius:50%}
.dtab .dc{font-size:9px;padding:1px 5px;border-radius:99px;background:rgba(255,255,255,.12)}
.dtab.on .dc{background:var(--blue);color:#fff}

/* ── LAYOUT ── */
#app{display:flex;margin-top:calc(var(--hdr)+var(--tab));min-height:calc(100vh - var(--hdr) - var(--tab))}

/* ── LEFT SIDEBAR ── */
#sb{
  width:var(--sb);flex-shrink:0;background:var(--card);
  border-right:1px solid var(--border);
  position:sticky;top:calc(var(--hdr)+var(--tab));
  height:calc(100vh - var(--hdr) - var(--tab));overflow-y:auto;
  transition:transform .25s;
}
#sb::-webkit-scrollbar{width:4px}
#sb::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.sb-sec{padding:10px 0 4px}
.sb-lbl{font-size:10px;font-weight:600;color:var(--text4);text-transform:uppercase;letter-spacing:.7px;padding:4px 14px 6px}
.sb-item{
  display:flex;align-items:center;gap:8px;padding:7px 14px;
  font-size:12.5px;color:var(--text3);cursor:pointer;
  border-left:2px solid transparent;transition:all .12s;
  position:relative;
}
.sb-item:hover{background:var(--bg);color:var(--text2)}
.sb-item.on{background:var(--blue-lt);color:var(--blue);border-left-color:var(--blue);font-weight:500}
.sb-item .si{font-size:14px;width:18px;text-align:center;flex-shrink:0}
.sb-badge{margin-left:auto;font-size:10px;padding:1px 6px;border-radius:99px;background:var(--red);color:#fff;font-weight:600}
.sb-badge.amber{background:var(--amber)}
.sb-badge.gray{background:var(--bg3);color:var(--text3)}
.sb-divider{height:1px;background:var(--border);margin:6px 14px}

/* ── MAIN CONTENT ── */
#main{flex:1;padding:18px;min-width:0;overflow-x:hidden}

/* ── PAGE TITLE BAR ── */
.pg-hdr{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.pg-title{font-size:18px;font-weight:700;color:var(--text)}
.pg-sub{font-size:12px;color:var(--text3)}
.pg-back{font-size:12px;color:var(--text3);cursor:pointer;display:flex;align-items:center;gap:4px}
.pg-back:hover{color:var(--blue)}
.pg-sp{flex:1}
.pg-acts{display:flex;gap:8px;flex-wrap:wrap}

/* ── BUTTONS ── */
.btn{
  display:inline-flex;align-items:center;gap:5px;
  padding:7px 14px;border-radius:var(--r);font-size:12px;font-weight:500;
  border:1px solid var(--border2);background:var(--card);color:var(--text2);
  cursor:pointer;transition:all .12s;white-space:nowrap;font-family:var(--font);
}
.btn:hover{background:var(--bg);border-color:var(--border2)}
.btn:active{transform:scale(.98)}
.btn.pri{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn.pri:hover{background:var(--blue2)}
.btn.suc{background:var(--green);color:#fff;border-color:var(--green)}
.btn.dan{background:var(--red-lt);color:var(--red);border-color:var(--red-lt)}
.btn.warn{background:var(--amber-lt);color:var(--amber);border-color:var(--amber-lt)}
.btn.sm{padding:4px 10px;font-size:11px}
.btn.lg{padding:9px 18px;font-size:13px}
.btn.ico{padding:6px;aspect-ratio:1}
.btn:disabled{opacity:.5;cursor:not-allowed}

/* ── STAT CARDS ── */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:16px}
.stat{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:14px 16px}
.stat-v{font-size:26px;font-weight:700;line-height:1;margin-bottom:4px}
.stat-l{font-size:11px;color:var(--text3)}

/* ── SECTION BLOCKS (Ragic style) ── */
.sec{margin-bottom:14px;border-radius:var(--r2);overflow:hidden;border:1px solid var(--border);background:var(--card)}
.sec-hdr{
  padding:8px 14px;font-size:12px;font-weight:600;letter-spacing:.3px;
  color:#fff;display:flex;align-items:center;gap:8px;
}
.sec-hdr.wine{background:var(--wine)}
.sec-hdr.navy{background:var(--navy)}
.sec-hdr.olive{background:var(--olive)}
.sec-hdr.teal{background:var(--teal)}
.sec-hdr.gold{background:var(--amber)}
.sec-hdr.purple{background:var(--purple)}
.sec-hdr.blue{background:var(--blue)}
.sec-hdr.gray{background:var(--gray)}
.sec-hdr.green{background:var(--green)}
.sec-body{padding:14px}

/* ── FORM GRID ── */
.fg{display:grid;grid-template-columns:120px 1fr;gap:8px 12px;align-items:start}
.fg.w2{grid-template-columns:120px 1fr 120px 1fr}
@media(max-width:600px){.fg,.fg.w2{grid-template-columns:1fr}}
.fl{font-size:12px;color:var(--text3);padding-top:8px;display:flex;align-items:center;gap:3px}
.fl.req::after{content:'*';color:var(--red);margin-left:2px}
input[type=text],input[type=number],input[type=date],input[type=email],
input[type=tel],select,textarea{
  width:100%;padding:7px 10px;font-size:13px;font-family:var(--font);
  border:1px solid var(--border2);border-radius:var(--r);
  background:var(--card);color:var(--text);transition:border .15s,box-shadow .15s;
}
input:focus,select:focus,textarea:focus{
  outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.12);
}
textarea{resize:vertical;min-height:68px;line-height:1.55}
.fhint{font-size:11px;color:var(--text4);margin-top:3px}
.seq-tag{
  font-family:var(--mono);font-size:13px;font-weight:600;
  background:var(--blue-lt);color:var(--blue);
  padding:5px 12px;border-radius:var(--r);display:inline-block;letter-spacing:.5px;
}

/* ── SUB TABLE ── */
.sub-wrap{overflow-x:auto}
.sub{width:100%;border-collapse:collapse;font-size:12px}
.sub th{
  padding:7px 10px;background:var(--bg2);color:var(--text3);
  font-weight:600;text-align:left;white-space:nowrap;
  border-bottom:1px solid var(--border);
}
.sub td{padding:6px 8px;border-bottom:1px solid var(--border)}
.sub tr:last-child td{border-bottom:none}
.sub td input,.sub td select{padding:5px 7px;font-size:12px}
.sub tfoot td{background:var(--bg2);font-weight:700;padding:8px 10px}

/* ── TABLE ── */
.tbl-wrap{border:1px solid var(--border);border-radius:var(--r2);overflow:hidden}
.tbl{width:100%;border-collapse:collapse;background:var(--card)}
.tbl th{
  padding:9px 12px;background:var(--bg2);font-size:11px;
  font-weight:600;color:var(--text3);text-align:left;
  white-space:nowrap;border-bottom:1px solid var(--border);
}
.tbl td{padding:10px 12px;font-size:12.5px;border-bottom:1px solid var(--border)}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:var(--bg);cursor:pointer}
.tbl .mono{font-family:var(--mono);font-size:11px;color:var(--blue);font-weight:600}

/* ── BADGES ── */
.badge{display:inline-block;padding:2px 8px;border-radius:99px;font-size:10px;font-weight:600;white-space:nowrap}
.b-draft{background:var(--gray-lt);color:var(--gray)}
.b-pending{background:var(--amber-lt);color:var(--amber)}
.b-approved{background:var(--green-lt);color:var(--green)}
.b-rejected{background:var(--red-lt);color:var(--red)}
.b-blue{background:var(--blue-lt);color:var(--blue2)}
.b-purple{background:var(--purple-lt);color:var(--purple)}
.b-teal{background:var(--teal-lt);color:var(--teal)}

/* ── APPROVAL STEPS ── */
.ap-steps{display:flex;flex-direction:column;gap:0}
.ap-step{display:flex;gap:12px;padding:12px 0;position:relative}
.ap-step:not(:last-child)::before{
  content:'';position:absolute;left:15px;top:38px;bottom:-12px;
  width:1px;background:var(--border2);
}
.ap-circle{
  width:31px;height:31px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;border:1.5px solid var(--border2);
  background:var(--bg2);color:var(--text4);
}
.ap-circle.done{background:var(--green-lt);color:var(--green);border-color:var(--green)}
.ap-circle.act{background:var(--amber-lt);color:var(--amber);border-color:var(--amber)}
.ap-circle.rej{background:var(--red-lt);color:var(--red);border-color:var(--red)}
.ap-info{flex:1;padding-top:3px}
.ap-role{font-size:13px;font-weight:600}
.ap-meta{font-size:11px;color:var(--text3);margin-top:2px}
.ap-comment{font-size:11px;color:var(--text2);background:var(--bg2);border-radius:var(--r);padding:5px 9px;margin-top:6px}

/* ── REVISION HISTORY ── */
.rev-item{padding:12px 0;border-bottom:1px solid var(--border)}
.rev-item:last-child{border-bottom:none}
.rev-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:6px}
.rev-ver{font-size:11px;font-weight:600;padding:2px 8px;background:var(--blue-lt);color:var(--blue);border-radius:99px}
.rev-who{font-size:11px;color:var(--text3)}
.rev-body{background:var(--bg2);border-radius:var(--r);padding:8px 12px;font-size:12px}
.rev-reason{font-size:11px;color:var(--text3);font-style:italic;margin-top:5px}
.rev-chg{margin-bottom:3px}
.chg-old{color:var(--red);text-decoration:line-through}
.chg-new{color:var(--green)}

/* ── MODAL ── */
.moverlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:400;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:var(--card);border-radius:var(--r3);border:1px solid var(--border);padding:20px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;box-shadow:var(--sh2)}
.modal h3{font-size:15px;font-weight:700;margin-bottom:16px}
.modal-ft{display:flex;justify-content:flex-end;gap:8px;margin-top:16px;padding-top:12px;border-top:1px solid var(--border)}

/* ── TOOLBAR ── */
.toolbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:10px 0;margin-bottom:12px}
.toolbar .sp{flex:1}
.srch{position:relative}
.srch input{padding-left:28px;width:180px}
.srch-ic{position:absolute;left:8px;top:50%;transform:translateY(-50%);color:var(--text4);font-size:13px;pointer-events:none}

/* ── EMPTY STATE ── */
.empty{text-align:center;padding:52px 16px;color:var(--text4)}
.empty-ic{font-size:38px;margin-bottom:10px;opacity:.4}

/* ── TOAST ── */
#toast{
  position:fixed;bottom:calc(70px + var(--safe-b));left:50%;
  transform:translateX(-50%) translateY(12px);
  background:var(--navy);color:#fff;padding:9px 18px;
  border-radius:99px;font-size:12px;z-index:999;opacity:0;
  transition:opacity .2s,transform .2s;pointer-events:none;white-space:nowrap;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(min-width:769px){#toast{bottom:20px}}

/* ── LINE IMPORT CARD ── */
.line-card{
  background:linear-gradient(135deg,var(--blue-lt) 0%,var(--card) 60%);
  border:1.5px solid var(--blue);border-radius:var(--r2);
  padding:14px 16px;margin-bottom:14px;
}
.line-card-hdr{display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:13px;font-weight:600;color:var(--blue)}
.ai-badge{font-size:10px;background:var(--blue);color:#fff;padding:1px 7px;border-radius:99px}

/* ── VOICE BTN ── */
.voice-btn{
  width:32px;height:32px;border-radius:50%;border:none;
  background:var(--blue-lt);color:var(--blue);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:14px;flex-shrink:0;transition:all .15s;
}
.voice-btn.listening{background:var(--red);color:#fff;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}

/* ── QR ── */
.qr-wrap{display:flex;flex-direction:column;align-items:center;gap:8px;padding:12px}
.qr-canvas{border:3px solid var(--border2);border-radius:var(--r2);padding:8px;background:#fff}

/* ── FIELD BUILDER ── */
.fb-item{
  display:grid;grid-template-columns:1fr 130px auto auto auto;
  gap:8px;align-items:center;
  background:var(--bg2);border-radius:var(--r);padding:9px 12px;
  border:1px solid var(--border);margin-bottom:6px;
}
@media(max-width:600px){.fb-item{grid-template-columns:1fr 1fr auto}}

/* ── FLOW BUILDER ── */
.flow-item{
  display:grid;grid-template-columns:1fr 1fr auto;gap:8px;align-items:center;
  background:var(--bg2);border-radius:var(--r);padding:8px 12px;
  border:1px solid var(--border);margin-bottom:6px;
}

/* ── MOBILE NAV ── */
#mnav{
  display:none;position:fixed;bottom:0;left:0;right:0;
  background:var(--card);border-top:1px solid var(--border);
  padding:6px 0 calc(6px + var(--safe-b));z-index:200;
}
.mn-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;font-size:9px;color:var(--text4);cursor:pointer;padding:3px 0}
.mn-item.on{color:var(--blue)}
.mn-ic{font-size:20px;line-height:1}
.mn-add{width:44px;height:44px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center;font-size:22px;color:#fff;cursor:pointer;margin-top:-10px;box-shadow:0 4px 12px rgba(37,99,235,.4)}
@media(max-width:768px){
  #mnav{display:flex}
  #sb{display:none}
  #main{padding:12px 10px calc(80px + var(--safe-b))}
  .fg.w2{grid-template-columns:1fr 1fr}
  .stats{grid-template-columns:repeat(2,1fr)}
}

/* ── MISC ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:16px;margin-bottom:12px}
.divider{border:none;border-top:1px solid var(--border);margin:12px 0}
.txt-sm{font-size:12px}.txt-xs{font-size:11px}.txt-muted{color:var(--text3)}
.flex{display:flex}.items-c{align-items:center}.gap-2{gap:8px}.gap-1{gap:5px}
.mt-1{margin-top:8px}.mt-2{margin-top:14px}.mb-1{margin-bottom:8px}.mb-2{margin-bottom:14px}
.w-full{width:100%}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{animation:spin .8s linear infinite;display:inline-block}
</style>
</head>
<body>
<div id="hdr"></div>
<div id="deptbar"></div>
<div id="app">
  <div id="sb"></div>
  <div id="main"></div>
</div>
<nav id="mnav"></nav>
<div id="toast"></div>
<div id="modal-root"></div>

<script>
// ════════════════════════════════════════════════
// FORMHUB v2 — 電子簽核系統
// Firebase + Anthropic AI + 純前端架構
// ════════════════════════════════════════════════

const FB_CFG = {
  apiKey:"AIzaSyAhf5pLLAAEwicxBp-sFvn5YIRf_CeZzl4",
  authDomain:"esuse-45350.firebaseapp.com",
  projectId:"esuse-45350",
  storageBucket:"esuse-45350.firebasestorage.app",
  messagingSenderId:"848737933353",
  appId:"1:848737933353:web:47f296cc873259fe27a438"
};

// ── Firebase SDK ──
let db,fsCol,fsDoc,fsGet,fsGetDoc,fsSet,fsAdd,fsUpdate,fsOnSnap,fsQuery,fsOrderBy,fsTx,fsRunTx;
let fbReady=false;

async function initFB(){
  try{
    const{initializeApp}=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js');
    const fs=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
    const app=initializeApp(FB_CFG);
    db=fs.getFirestore(app);
    fsCol=fs.collection;fsDoc=fs.doc;fsGet=fs.getDocs;fsGetDoc=fs.getDoc;
    fsSet=fs.setDoc;fsAdd=fs.addDoc;fsUpdate=fs.updateDoc;
    fsOnSnap=fs.onSnapshot;fsQuery=fs.query;fsOrderBy=fs.orderBy;
    fsTx=fs.runTransaction;
    fbReady=true;
    console.log('✅ Firebase connected');
  }catch(e){console.warn('Firebase offline, using local mode',e)}
}

// ── Local Storage ──
const L={
  get:k=>{try{return JSON.parse(localStorage.getItem('fh2_'+k))}catch{return null}},
  set:(k,v)=>localStorage.setItem('fh2_'+k,JSON.stringify(v)),
  del:k=>localStorage.removeItem('fh2_'+k)
};

// ── Cloud Layer ──
const DB={
  async getForms(){
    if(!fbReady)return L.get('forms')||[];
    try{
      const s=await fsGet(fsQuery(fsCol(db,'forms'),fsOrderBy('date','desc')));
      const r=s.docs.map(d=>({id:d.id,...d.data()}));
      L.set('forms',r);return r;
    }catch{return L.get('forms')||[]}
  },
  async saveForm(f){
    const{id,...data}=f;
    // update local cache
    const arr=L.get('forms')||[];
    const i=arr.findIndex(x=>x.id===id);
    if(i>=0)arr[i]=f;else arr.unshift(f);
    L.set('forms',arr);
    if(!fbReady)return f;
    try{
      if(id&&!id.startsWith('loc_')){
        await fsSet(fsDoc(db,'forms',id),data);return f;
      }else{
        const ref=await fsAdd(fsCol(db,'forms'),data);
        return{...f,id:ref.id};
      }
    }catch(e){console.error(e);return f}
  },
  async getCfg(k){
    if(!fbReady)return L.get(k);
    try{
      const s=await fsGetDoc(fsDoc(db,'cfg',k));
      return s.exists()?s.data():L.get(k);
    }catch{return L.get(k)}
  },
  async setCfg(k,v){
    L.set(k,v);
    if(!fbReady)return;
    try{await fsSet(fsDoc(db,'cfg',k),typeof v==='object'&&!Array.isArray(v)?v:{_v:v})}
    catch(e){console.error(e)}
  },
  async getDepts(){
    if(!fbReady)return L.get('depts')||defDepts();
    try{
      const s=await fsGetDoc(fsDoc(db,'cfg','depts'));
      if(s.exists()){const d=s.data();const l=Array.isArray(d.list)?d.list:null;if(l){L.set('depts',l);return l}}
    }catch{}
    return L.get('depts')||defDepts();
  },
  async saveDepts(d){L.set('depts',d);if(!fbReady)return;try{await fsSet(fsDoc(db,'cfg','depts'),{list:d})}catch(e){console.error(e)}},
  async getFlows(){
    if(!fbReady)return L.get('flows')||defFlows();
    try{
      const s=await fsGetDoc(fsDoc(db,'cfg','flows'));
      if(s.exists()){const d=s.data();if(d&&typeof d==='object'&&!d._v){L.set('flows',d);return d}}
    }catch{}
    return L.get('flows')||defFlows();
  },
  async saveFlows(f){L.set('flows',f);if(!fbReady)return;try{await fsSet(fsDoc(db,'cfg','flows'),f)}catch(e){console.error(e)}},
  async getCtrs(){
    if(!fbReady)return L.get('ctrs')||{};
    try{
      const s=await fsGetDoc(fsDoc(db,'cfg','ctrs'));
      if(s.exists()){const d=s.data();if(d&&!d._v){L.set('ctrs',d);return d}}
    }catch{}
    return L.get('ctrs')||{};
  },
  async saveCtrs(c){L.set('ctrs',c);if(!fbReady)return;try{await fsSet(fsDoc(db,'cfg','ctrs'),c)}catch(e){console.error(e)}},
  async getWebhooks(){return L.get('webhooks')||[]},
  async saveWebhooks(w){L.set('webhooks',w);if(!fbReady)return;try{await fsSet(fsDoc(db,'cfg','webhooks'),{list:w})}catch{}}
};

// ── Sequence Generator (atomic) ──
async function genSeq(deptId){
  const dept=S.depts.find(d=>d.id===deptId);
  const pre=dept?.prefix||deptId;
  const yr=new Date().getFullYear();
  if(fbReady){
    try{
      let seq;
      await fsTx(db,async tx=>{
        const ref=fsDoc(db,'cfg','ctrs');
        const snap=await tx.get(ref);
        const c=snap.exists()?snap.data():{};
        const n=(c[deptId]||1);
        seq=`${pre}-${yr}-${String(n).padStart(3,'0')}`;
        tx.set(ref,{...c,[deptId]:n+1});
      });
      const c=L.get('ctrs')||{};c[deptId]=(c[deptId]||1)+1;L.set('ctrs',c);
      return seq;
    }catch(e){console.warn('TX failed',e)}
  }
  const c=L.get('ctrs')||{};
  const n=c[deptId]||1;c[deptId]=n+1;L.set('ctrs',c);
  return`${pre}-${yr}-${String(n).padStart(3,'0')}`;
}

function toast(msg,dur=2500){
  const el=document.getElementById('toast');if(!el)return;
  el.textContent=msg;el.classList.add('show');
  clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),dur);
}

  return`<div class="empty" style="padding-top:80px;">
    <div style="font-size:36px;" class="spin">⟳</div>
    <div style="margin-top:12px;font-size:13px;color:var(--text3);">連接雲端資料庫中...</div>
  </div>`;
}

function renderPage(){
  switch(S.page){
    case 'dashboard':   return pgDashboard();
    case 'list':        return pgList();
    case 'pending':     return pgList({statusFilter:'pending',title:'等待我處理'});
    case 'sent':        return pgList({myOnly:true,title:'我送出的簽核'});
    case 'drafts':      return pgList({statusFilter:'draft',myOnly:true,title:'草稿匣'});
    case 'approved-list':return pgList({statusFilter:'approved',title:'簽核記錄'});
    case 'archive':     return pgList({statusFilter:'approved',title:'歸檔匣'});
    case 'all-forms':   return pgList({title:'系統所有進行中文件'});
    case 'overdue':     return pgList({overdue:true,title:'逾期統計'});
    case 'view':        return pgView();
    case 'new-form':    return pgNew();
    case 'edit-form':   return pgEdit();
    case 'approve':     return pgApprove();
    case 'settings':    return pgSettings();
    case 'api-mgr':     return pgApiMgr();
    default:            return pgDashboard();
  }
}

function pgList(opts={}){
  let forms=S.forms;
  const title=opts.title||(S.deptId?deptOf(S.deptId).name+'表單':'全部表單');
  if(S.deptId&&!opts.statusFilter)forms=forms.filter(f=>f.deptId===S.deptId);
  if(opts.statusFilter)forms=forms.filter(f=>f.status===opts.statusFilter);
  if(opts.myOnly)forms=forms.filter(f=>f.applicant===S.currentUser.name);
  if(opts.overdue)forms=forms.filter(f=>f.status==='pending'&&f.date&&(new Date()-new Date(f.date))>7*86400000);
  if(S.statusFilter)forms=forms.filter(f=>f.status===S.statusFilter);
  if(S.searchQ){const q=S.searchQ.toLowerCase();forms=forms.filter(f=>f.seq?.toLowerCase().includes(q)||f.applicant?.includes(q)||f.formType?.includes(q)||Object.values(f.fields||{}).some(v=>String(v).toLowerCase().includes(q)))}
  if(S.formTypeFilter)forms=forms.filter(f=>f.formType===S.formTypeFilter);

  const dept=S.deptId?deptOf(S.deptId):null;
  const formTypes=dept?dept.forms||[]:[];

  return`
  <div class="pg-hdr">
    <div>
      <div class="pg-title" style="${dept?'color:'+dept.color:''}">${title}</div>
      <div class="pg-sub">${forms.length} 筆記錄</div>
    </div>
    <div class="pg-sp"></div>
    <button class="btn pri" onclick="go('new-form')">＋ 新增</button>
  </div>
  <div class="toolbar">
    <div class="srch"><span class="srch-ic">🔍</span>
      <input type="text" placeholder="搜尋序號、申請人..." value="${S.searchQ}" oninput="S.searchQ=this.value;renderAll()" style="padding-left:28px;width:170px">
    </div>
    <select onchange="S.statusFilter=this.value;renderAll()" style="font-size:12px">
      <option value="">全部狀態</option>
      <option value="draft"${S.statusFilter==='draft'?' selected':''}>草稿</option>
      <option value="pending"${S.statusFilter==='pending'?' selected':''}>審核中</option>
      <option value="approved"${S.statusFilter==='approved'?' selected':''}>已核准</option>
      <option value="rejected"${S.statusFilter==='rejected'?' selected':''}>已退回</option>
    </select>
    ${formTypes.length?`<select onchange="S.formTypeFilter=this.value||null;renderAll()" style="font-size:12px">
      <option value="">全部表單類型</option>
      ${formTypes.map(t=>`<option value="${t}"${S.formTypeFilter===t?' selected':''}>${t}</option>`).join('')}
    </select>`:''}
    ${!S.deptId?`<select onchange="S.deptId=this.value||null;S.page='list';renderAll()" style="font-size:12px">
      <option value="">全部部門</option>
      ${S.depts.map(d=>`<option value="${d.id}"${S.deptId===d.id?' selected':''}>${d.name}</option>`).join('')}
    </select>`:''}
  </div>
  ${forms.length===0?`<div class="empty"><div class="empty-ic">📭</div>沒有符合的表單</div>`:`
  <div class="tbl-wrap">
    <table class="tbl">
      <thead><tr><th>序號</th><th>v</th><th>表單類型</th><th>申請人</th><th>部門</th><th>狀態</th><th>日期</th><th></th></tr></thead>
      <tbody>${forms.map(f=>`<tr onclick="goView('${f.id}')">
        <td class="mono">${f.seq}</td>
        <td><span class="badge b-draft">v${f.ver||1}</span></td>
        <td style="font-size:12px">${f.formType||'-'}</td>
        <td>${f.applicant}</td>
        <td><span class="badge" style="background:${deptOf(f.deptId).color+'22'};color:${deptOf(f.deptId).color}">${deptOf(f.deptId).name}</span></td>
        <td><span class="badge ${statusCls(f.status)}">${statusLabel(f.status)}</span></td>
        <td class="txt-xs txt-muted">${fmtDate(f.date)}</td>
        <td><button class="btn sm" onclick="event.stopPropagation();goView('${f.id}')">查看</button></td>
      </tr>`).join('')}</tbody>
    </table>
  </div>`}`;
}

function pgView(){
  const f=S.forms.find(x=>x.id===S.formId);
  if(!f)return`<div class="empty">找不到表單</div>`;
  const dept=deptOf(f.deptId);
  const flowDef=S.flows[f.deptId]||[];
  const canEdit=f.status==='draft'||f.status==='rejected';
  const canApprove=f.status==='pending';
  return`
  <div class="pg-hdr">
    <span class="pg-back" onclick="history.back?history.back():go('dashboard')">← 返回</span>
    <div>
      <div class="pg-title" style="font-family:var(--mono);font-size:15px">${f.seq}</div>
      <div class="pg-sub">${f.formType||''} · ${dept.name}</div>
    </div>

      ${canEdit?`<button class="btn" onclick="goEdit('${f.id}')">✏️ 編輯修訂</button>`:''}
      ${f.status==='draft'?`<button class="btn suc" onclick="doSubmit('${f.id}')">📤 送出審核</button>`:''}

  </div>

  <div class="sec">
    <div class="sec-hdr wine">📄 基本資料</div>

      <div class="fg w2">
        <span class="fl">序號</span><div><span class="seq-tag">${f.seq}</span></div>

        <span class="fl">表單類型</span><span>${f.formType||'-'}</span>

          <span class="fl">${fd.label}</span>
          <span>${f.fields?.[fd.id]||'<span class="txt-muted">—</span>'}</span>`).join('')}
      </div>
    </div>
  </div>

  ${(f.items&&f.items.length>0)?`
  <div class="sec">
    <div class="sec-hdr olive">📦 品項明細</div>
    <div class="sec-body" style="padding:0">
      <div class="sub-wrap">
        <table class="sub">
          <thead><tr><th>品名</th><th>數量</th><th>單位</th><th>單價</th><th>小計</th></tr></thead>
          <tbody>${f.items.map(it=>`<tr>
            <td>${it.name}</td><td>${it.qty}</td><td>${it.unit}</td>
            <td>${fmtMoney(it.price)}</td><td>${fmtMoney(it.qty*it.price)}</td>
          </tr>`).join('')}</tbody>
          <tfoot><tr>
            <td colspan="4" style="text-align:right">合計</td>
            <td style="color:var(--blue)">${fmtMoney(calcTotal(f.items))}</td>
          </tr></tfoot>
        </table>
      </div>
    </div>
  </div>`:''}

  ${(f.photos&&f.photos.length)?`
  <div class="sec">
    <div class="sec-hdr teal">📷 附件照片</div>
    <div class="sec-body">
      <div style="display:flex;flex-wrap:wrap;gap:10px">
        ${f.photos.map(p=>`<img src="${p}" style="width:120px;height:90px;object-fit:cover;border-radius:var(--r);border:1px solid var(--border);cursor:pointer" onclick="window.open('${p}','_blank')">`).join('')}
      </div>
    </div>
  </div>`:''}

  <div class="sec">
    <div class="sec-hdr gold">✍️ 簽核流程</div>
    <div class="sec-body">
      ${flowDef.length===0?'<div class="txt-muted txt-sm">此部門尚未設定簽核流程</div>':`
      <div class="ap-steps">
        ${flowDef.map((step,i)=>{
          const ap=(f.approvals||[]).find(a=>a.step===i);
          const doneCount=(f.approvals||[]).filter(a=>a.status==='approved').length;
          const cls=ap?.status==='approved'?'done':ap?.status==='rejected'?'rej':
            (f.status==='pending'&&doneCount===i)?'act':'';
          return`<div class="ap-step">
            <div class="ap-circle ${cls}">${ap?.status==='approved'?'✓':ap?.status==='rejected'?'✗':i+1}</div>
            <div class="ap-info">
              <div class="ap-role">${step.role}</div>
              <div class="ap-meta">${ap?.name?ap.name+' · '+ap.time:'等待審核'}</div>
              ${ap?.comment?`<div class="ap-comment">${ap.comment}</div>`:''}
            </div>
          </div>`;
        }).join('')}
      </div>`}
    </div>
  </div>

  <div class="sec">
    <div class="sec-hdr gray">📜 修訂紀錄</div>
    <div class="sec-body">
      ${[...(f.history||[])].reverse().map(h=>`

          <span class="rev-who">${h.who} · ${h.time}</span>
        </div>
        <div class="rev-body">
          ${h.changes.length===0?'<span class="txt-muted txt-xs">初次建立</span>':
            h.changes.map(c=>`<div class="rev-chg">
              <strong>${c.field}：</strong>
              <span class="chg-old">${c.old}</span> → <span class="chg-new">${c.new}</span>
            </div>`).join('')}
        </div>
        <div class="rev-reason">原因：${h.reason}</div>
      </div>`).join('')}
    </div>
  </div>`;
}

function fieldInput(id,fd,val=''){
  switch(fd.type){
    case'number':  return`<input type="number" id="${id}" value="${val}" placeholder="0">`;
    case'date':    return`<input type="date" id="${id}" value="${val}">`;
    case'tel':     return`<input type="tel" id="${id}" value="${val}" placeholder="電話號碼">`;
    case'textarea':return`<textarea id="${id}" placeholder="${fd.label}...">${val}</textarea>`;
    case'select':{
      const opts=(fd.opts||'').split(',').map(o=>o.trim()).filter(Boolean);
      return`<select id="${id}"><option value="">請選擇...</option>${opts.map(o=>`<option${o===val?' selected':''}>${o}</option>`).join('')}</select>`;
    }
    default: return`<input type="text" id="${id}" value="${val}" placeholder="${fd.label}">`;
  }
}

let rowN=1;
function addRow(){
  rowN++;
  const tb=document.getElementById('sub-body');if(!tb)return;
  const tr=document.createElement('tr');tr.id='sr-'+rowN;
  tr.innerHTML=`<td><input type="text" placeholder="品名"></td>
    <td><input type="number" value="1" min="1" oninput="subUpd(this)"></td>
    <td><input type="text" value="個"></td>
    <td><input type="number" value="0" min="0" oninput="subUpd(this)"></td>
    <td id="ss-${rowN}" class="txt-xs txt-muted">NT$ 0</td>
    <td><button class="btn sm dan ico" onclick="rmRow(this)">✕</button></td>`;
  tb.appendChild(tr);
}
function rmRow(btn){btn.closest('tr').remove();reTot()}
function subUpd(inp){
  const r=inp.closest('tr'),ins=r.querySelectorAll('input[type=number]');
  const s=(+ins[0]?.value||0)*(+ins[1]?.value||0);
  const c=r.querySelector('td:nth-child(5)');if(c)c.textContent=fmtMoney(s);
  reTot();
}
function reTot(){
  let t=0;document.querySelectorAll('#sub-body tr').forEach(tr=>{
    const ins=tr.querySelectorAll('input[type=number]');
    if(ins.length>=2)t+=(+ins[0].value||0)*(+ins[1].value||0);
  });
  const el=document.getElementById('sub-total');if(el)el.textContent=fmtMoney(t);
}
function collectRows(){
  const items=[];
  document.querySelectorAll('#sub-body tr').forEach((tr,i)=>{
    const ins=tr.querySelectorAll('input');
    if(ins.length>=4&&ins[0].value.trim())
      items.push({id:'i'+(i+1),name:ins[0].value.trim(),qty:+ins[1].value||1,unit:ins[2].value||'個',price:+ins[3].value||0});
  });
  return items;
}

// PHOTO UPLOAD
// ════════════════════════════════════════════
const photoBuf=[];
async function handlePhotoUpload(inp){
  for(const file of inp.files){
    const url=await fileToDataURL(file);
    photoBuf.push(url);
    addPhotoPreview(url);
  }
}
function fileToDataURL(file){
  return new Promise(res=>{const r=new FileReader();r.onload=e=>res(e.target.result);r.readAsDataURL(file)});
}
function addPhotoPreview(url){
  const div=document.getElementById('photo-preview');if(!div)return;
  const img=document.createElement('img');

async function doAIParse(){
  const text=document.getElementById('line-ta')?.value?.trim()||S.lineText?.trim();
  if(!text){toast('請先輸入或貼上文字');return}
  const btn=document.getElementById('ai-btn');
  const st=document.getElementById('ai-status');
  if(btn){btn.disabled=true;btn.textContent='⟳ 解析中...'}
  if(st)st.textContent='AI 分析中...';

  const deptDesc=S.depts.map(d=>`${d.name}(${d.id})：欄位有 ${(d.fields||[]).map(f=>f.label).join('、')}`).join('\n');
  const sys=`你是表單解析助手。把用戶的自然語言/LINE對話解析成JSON。只回傳JSON，不要其他文字。
部門清單：
${deptDesc}
JSON格式：
{"deptId":"最匹配部門代碼","formType":"最匹配的表單類型","applicant":"申請人姓名","fields":{"欄位名稱":"值"},"items":[{"name":"品名","qty":數量,"unit":"單位","price":單價}],"_summary":"一句話摘要","_ok":true}
比對規則：採購/購買/訂購→PUR；報價/客戶/業務→SAL；研發/設變/ECN→RD；生產/工單→MFG；品管/檢驗/8D→QC；倉庫/入出庫→WH；請假/加班→COM；資材→MAT；管理/行政/會議→MGT`;

  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:sys,messages:[{role:'user',content:text}]})
    });
    const data=await r.json();
    const raw=data.content?.[0]?.text||'';
    const clean=raw.replace(/```json\n?|\n?```/g,'').trim();
    const parsed=JSON.parse(clean);
    S.aiParsed=parsed;S.aiDept=parsed.deptId;S.lineText=text;
    renderAll();
    const ta=document.getElementById('line-ta');if(ta)ta.value=text;
    toast('✨ AI 解析完成！請確認填入內容');
  }catch(e){
    console.error(e);
    if(btn){btn.disabled=false;btn.textContent='✨ AI 解析'}
    if(st)st.textContent='';
    toast('解析失敗，請重試',3000);
  }
}

  const dept=S.depts.find(d=>d.id===f.deptId)||{};

    }

async function doApprove(id){
  const who=document.getElementById('ap-who')?.value?.trim();
  const dec=document.getElementById('ap-dec')?.value;
  const comment=document.getElementById('ap-comment')?.value?.trim();
  if(!who){toast('請填寫審核人');return}
  const f={...S.forms.find(x=>x.id===id)};f.approvals=[...(f.approvals||[])];
  const idx=f.approvals.findIndex(a=>a.status==='pending');
  if(idx>=0)f.approvals[idx]={...f.approvals[idx],status:dec,name:who,time:now(),comment:comment||''};
  const allOk=f.approvals.every(a=>a.status==='approved');
  const hasRej=f.approvals.some(a=>a.status==='rejected');
  if(hasRej){
    f.status='rejected';
    f.history=[...(f.history||[]),{ver:'v'+(f.ver||1),who,time:now(),reason:comment||'退回',changes:[{field:'狀態',old:'審核中',new:'已退回'}]}];
  }else if(allOk){
    f.status='approved';
    f.history=[...(f.history||[]),{ver:'v'+(f.ver||1),who,time:now(),reason:'全部核准',changes:[{field:'狀態',old:'審核中',new:'已核准'}]}];
  }else{
    const nx=f.approvals.find(a=>a.status==='waiting');if(nx)nx.status='pending';
  }
  await DB.saveForm(f);S.forms=await DB.getForms();
  const ev=dec==='approved'?(allOk?'on_approve':'on_submit'):'on_reject';
  await triggerWebhooks(ev,f);
  toast(dec==='approved'?'✅ 已核准':'❌ 已退回');goView(id);
}

// QR CODE (pure JS, no lib)
// ════════════════════════════════════════════
function drawQR(formId){
  const f=S.forms.find(x=>x.id===formId);if(!f)return;
  const canvas=document.getElementById('qr-canvas');if(!canvas)return;
  const ctx=canvas.getContext('2d');
  // Simple QR placeholder — encode URL as text pattern
  const url=window.location.href.split('?')[0]+'?form='+encodeURIComponent(f.seq);
  ctx.fillStyle='#ffffff';ctx.fillRect(0,0,200,200);
  ctx.fillStyle='#000000';
  // Draw a simple visual representation (actual QR would need a library)
  // Using a pattern that visually suggests a QR code
  const s=200,b=20,cell=6;
  // border finders
  [[0,0],[0,s-b*1.2],[s-b*1.2,0]].forEach(([x,y])=>{
    ctx.fillRect(b+x/10,b+y/10,b*0.8,b*0.8);
    ctx.fillStyle='#ffffff';ctx.fillRect(b+x/10+3,b+y/10+3,b*0.8-6,b*0.8-6);
    ctx.fillStyle='#000000';ctx.fillRect(b+x/10+6,b+y/10+6,b*0.8-12,b*0.8-12);
    ctx.fillStyle='#000000';
  });
  // data cells from string hash
  const hash=url.split('').reduce((h,c)=>((h<<5)-h+c.charCodeAt(0))|0,0);
  for(let r=0;r<20;r++)for(let c=0;c<20;c++){
    if((r<5&&c<5)||(r<5&&c>14)||(r>14&&c<5))continue;
    const bit=(hash^(r*31+c*17)^(r^c)*(r+c+1))&1;
    if(bit){ctx.fillRect(b/2+c*cell,b/2+r*cell,cell-1,cell-1)}
  }
  // center text
  ctx.fillStyle='rgba(255,255,255,0.9)';ctx.fillRect(70,88,60,24);
  ctx.fillStyle='#000';ctx.font='bold 9px monospace';ctx.textAlign='center';
  ctx.fillText(f.seq,100,104);
}
function printQR(){
  const canvas=document.getElementById('qr-canvas');if(!canvas)return;

          <table class="sub">
            <thead><tr>${step.cols.map(c=>`<th>${c}</th>`).join('')}<th width="32"></th></tr></thead>

              ${(d8[step.key]||[{c:['','','']}]).map((row,i)=>`<tr>

      `:`

          ${(step.fields||[]).map(fd=>`
            <label class="fl${fd.req?' req':''}">${fd.label}</label>
            ${field8D('d8-'+step.key+'-'+fd.id,fd,d8[step.key]?.[fd.id]||'')}
          `).join('')}

      `}
    </div>
  </div>`).join('')}
  <div style="display:flex;gap:10px;justify-content:flex-end;flex-wrap:wrap;margin-top:8px">
    <button class="btn" onclick="save8D('draft','${f?.id||''}')">💾 儲存草稿</button>
    <button class="btn pri" onclick="save8D('pending','${f?.id||''}')">📤 送出審核</button>
  </div>`;
}

function field8D(id,fd,val=''){
  switch(fd.type){
    case'textarea':return`<textarea id="${id}" style="min-height:80px">${val}</textarea>`;
    case'date':return`<input type="date" id="${id}" value="${val}">`;
    case'select':{
      const opts=(fd.opts||'').split(',').map(o=>o.trim());
      return`<select id="${id}"><option value="">請選擇</option>${opts.map(o=>`<option${o===val?' selected':''}>${o}</option>`).join('')}</select>`;
    }
    default:return`<input type="text" id="${id}" value="${val}" placeholder="${fd.label}">`;
  }
}

function add8DRow(key,cols){
  const tb=document.getElementById(`d8-${key}-body`);if(!tb)return;
  const tr=document.createElement('tr');
  tr.innerHTML=Array(cols).fill('<td><input type="text"></td>').join('')+
    '<td><button class="btn sm dan ico" onclick="this.closest(\'tr\').remove()">✕</button></td>';
  tb.appendChild(tr);
}

async function save8D(status,existingId){
  const d8={};
  const stepKeys=['d0','d1','d2','d3','d4','d5','d6','d7','d8'];
  const stepFields={
    d0:['problem','date','reporter','urgent'],
    d2:['what','when','where','who','why','how','howmuch'],
    d4:['fishbone','whywhy','rootcause'],
    d6:['verify','result','verifydate'],
    d7:['std','docs','training'],
    d8:['closedate','approver','feedback','lesson']
  };
  const subKeys=['d1','d3','d5'];
  for(const k of stepKeys){
    if(subKeys.includes(k)){
      const rows=[];
      document.querySelectorAll(`#d8-${k}-body tr`).forEach(tr=>{
        const vals=Array.from(tr.querySelectorAll('input')).map(i=>i.value);
        if(vals.some(v=>v.trim()))rows.push({c:vals});
      });
      d8[k]=rows;
    } else {
      d8[k]={};
      for(const fid of stepFields[k]||[]){
        const el=document.getElementById(`d8-${k}-${fid}`);
        if(el)d8[k][fid]=el.value;
      }
    }
  }
  const deptId='QC';
  const flowDef=S.flows[deptId]||[];
  const seq=existingId?S.forms.find(x=>x.id===existingId)?.seq:await genSeq(deptId);
  const form={
    id:existingId||'loc_'+Date.now(),
    deptId,formType:'8D報告',seq,ver:1,
    applicant:d8.d0?.reporter||S.currentUser.name,
    date:d8.d0?.date||today(),status,
    fields:{f1:d8.d2?.what||'',f2:'',f3:d8.d0?.date||today(),f4:'',f5:'不合格',f6:d8.d0?.problem||''},
    items:[],photos:[],d8,
    approvals:status==='pending'?flowDef.map((s,i)=>({step:i,role:s.role,uid:s.uid,name:'',status:i===0?'pending':'waiting',time:null,comment:''})):[],
    history:[{ver:'v1',who:d8.d0?.reporter||S.currentUser.name,time:now(),reason:'8D初次建立',changes:[]}]
  };
  toast('儲存中...',5000);
  const saved=await DB.saveForm(form);
  S.forms=await DB.getForms();
  toast('✓ 8D 報告已儲存');
  goView(saved.id);
}

async function handleFileSelect(inp){
  const file=inp.files[0];if(!file)return;
  await processImportFile(file);
}
function handleFileDrop(e){
  e.preventDefault();
  document.getElementById('drop-zone').style.borderColor='';
  document.getElementById('drop-zone').style.background='';
  const file=e.dataTransfer.files[0];if(!file)return;
  processImportFile(file);
}

async function processImportFile(file){
  const res=document.getElementById('file-result');
  if(res)res.innerHTML=`<div style="display:flex;align-items:center;gap:10px;padding:12px;background:var(--bg2);border-radius:var(--r)">
    <span class="spin" style="font-size:20px">⟳</span>
    <span>AI 分析中：${file.name}...</span>
  </div>`;

  const isImage=file.type.startsWith('image/');
  const dataURL=await fileToDataURL(file);
  const base64=dataURL.split(',')[1];

  const deptDesc=S.depts.map(d=>`${d.name}(${d.id})：${(d.fields||[]).map(f=>f.label).join('、')}`).join('\n');
  const sys=`你是表單識別助手。分析上傳的檔案/圖片，識別其中的表單欄位和資料，回傳JSON。只回傳JSON。
部門清單：\n${deptDesc}
JSON格式：{"deptId":"部門代碼","formType":"表單類型","applicant":"申請人","fields":{"欄位名稱":"值"},"items":[{"name":"","qty":1,"unit":"個","price":0}],"_summary":"摘要","_ok":true}`;

  try{
    const msgs=[{role:'user',content:isImage?[
      {type:'image',source:{type:'base64',media_type:file.type,data:base64}},
      {type:'text',text:'請分析這張截圖中的表單欄位和資料，回傳 JSON'}
    ]:[
      {type:'text',text:`檔案名稱：${file.name}，請根據檔名判斷表單類型，並回傳 JSON 格式的表單資料`}
    ]}];

    const r=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1500,system:sys,messages:msgs})
    });
    const data=await r.json();
    const raw=data.content?.[0]?.text||'';
    const parsed=JSON.parse(raw.replace(/```json\n?|\n?```/g,'').trim());
    S.aiParsed=parsed;S.aiDept=parsed.deptId;
    if(res)res.innerHTML=`<div style="padding:10px 12px;background:var(--green-lt);border-radius:var(--r);border:1px solid var(--green);font-size:12px;color:var(--green)">
      ✓ 解析完成：${parsed._summary}<br>
      <button class="btn sm pri mt-1" onclick="go('new-form')">→ 填入新增表單</button>
    </div>`;
    toast('✓ 檔案解析完成，請前往新增表單確認');
  }catch(e){
    if(res)res.innerHTML=`<div style="padding:10px;background:var(--red-lt);border-radius:var(--r);color:var(--red);font-size:12px">解析失敗：${e.message}</div>`;
  }
}

  window.addEventListener('beforeinstallprompt',e=>{
    e.preventDefault();deferredPrompt=e;
    if(!localStorage.getItem('pwa-dismissed')){
      showPWABanner();
    }
  });
})();

function showPWABanner(){
  if(document.getElementById('pwa-banner'))return;
  const isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent)&&!window.MSStream;
  const bar=document.createElement('div');
  bar.id='pwa-banner';
  bar.style.cssText='position:fixed;bottom:calc(60px + env(safe-area-inset-bottom,0px));left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:10px 16px;border-radius:var(--r2);font-size:12px;z-index:500;display:flex;align-items:center;gap:10px;box-shadow:var(--sh2);max-width:90vw;white-space:nowrap';
  bar.innerHTML=isIOS
    ?`<span>點 Safari「分享」→「加入主畫面」安裝 App</span><button onclick="this.parentNode.remove();localStorage.setItem('pwa-dismissed',1)" style="background:rgba(255,255,255,.2);border:none;color:#fff;padding:3px 8px;border-radius:var(--r);cursor:pointer;font-size:11px">✕</button>`
    :`<span>📱 可加入主畫面，像 App 使用</span><button onclick="this.parentNode.remove();localStorage.setItem('pwa-dismissed',1)" style="background:rgba(255,255,255,.2);border:none;color:#fff;padding:3px 8px;border-radius:var(--r);cursor:pointer;font-size:11px">✕</button>`;
  document.body.appendChild(bar);
  setTimeout(()=>{if(bar.parentNode)bar.remove()},8000);
}

// ════════════════════════════════════════════
// RESPONSIVE: handle window resize
// ════════════════════════════════════════════
window.addEventListener('resize',()=>{
  if(window.innerWidth>768)S.sidebarOpen=false;
  renderAll();
});

// ════════════════════════════════════════════
// URL ROUTING: support ?form= deep link for QR
// ════════════════════════════════════════════
(function handleDeepLink(){
  const params=new URLSearchParams(window.location.search);
  const seq=params.get('form');
  if(seq){
    // wait for data load then navigate
    const check=()=>{
      const f=S.forms.find(x=>x.seq===seq);
      if(f){goView(f.id)}
      else if(!S.loading)toast('找不到表單：'+seq);
      else setTimeout(check,500);
    };
    setTimeout(check,1500);
  }
})();
