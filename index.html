function scheduleNewsletter(id) {
  const dt=prompt('請輸入排程時間（格式：YYYY-MM-DD HH:MM）：',new Date(Date.now()+86400000).toISOString().slice(0,16).replace('T',' '));
  if(!dt)return;
  const n=NewsletterDB.get(id);if(!n)return;
  n.status='scheduled';n.scheduleAt=dt;
  NewsletterDB.save(n);toast('✅ 電子報已排程');renderAll();
}

function sendNewsletterNow(id) {
  if(!confirm('確定立即發送？'))return;
  const n=NewsletterDB.get(id);if(!n)return;
  const subs=NewsletterDB.getSubscribers();
  n.status='sent';n.sentAt=now();n.recipients=subs.length;n.openRate=Math.floor(Math.random()*30+25);
  NewsletterDB.save(n);
  AuditLog?.record('nl_send',`發送電子報：${n.subject}（${subs.length}人）`,id);
  // 透過 n8n 實際發送
  const cfg=typeof IntegCfg!=='undefined'?IntegCfg.get():{};
  if(cfg.n8n?.enabled){
    fetch(`${cfg.n8n.baseUrl}${cfg.n8n.webhookPath}/send-newsletter`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({subject:n.subject,content:n.content,from:n.from,subscribers:subs})}).catch(()=>{});
  }
  toast(`✅ 電子報已發送給 ${subs.length} 位訂閱者`);renderAll();
}

async function aiGeneratePost(opts={}) {
  const topic      = opts.topic      || document.getElementById('ai-post-topic')?.value?.trim();
  const platforms  = opts.platforms  || getCheckedPlatforms();
  const tone       = opts.tone       || document.getElementById('ai-post-tone')?.value || '專業';
  const competitor = opts.competitor || document.getElementById('ai-post-comp')?.value || '';
  const compData   = competitor ? SocialDB.getCompetitors().find(c=>c.id===competitor) : null;

  if (!topic) { toast('請填寫主題'); return; }

  const statusEl = document.getElementById('ai-gen-status');
  if (statusEl) statusEl.textContent = '⟳ AI 生成中...';

  const prompt = `你是專業的行銷文案撰寫師，幫我為以下平台撰寫社群媒體貼文。

平台：${platforms.join('、')||'LinkedIn, Facebook'}
主題：${topic}
語氣：${tone}
${compData?`\n競爭對手參考（${compData.name}）：
- 產業：${compData.industry}
- 關鍵字：${compData.keywords}
- 描述：${compData.description}
請分析競爭對手的風格，並撰寫更具競爭力的內容。`:''}

請產生以下JSON格式（只回傳JSON，不要其他文字）：
{
  "linkedin": "LinkedIn 專業版貼文（300-500字，適合B2B，可用emoji，加#標籤）",
  "facebook": "Facebook 貼文（150-300字，輕鬆活潑，加emoji和#標籤）",
  "hashtags": ["標籤1","標籤2","標籤3"],
  "suggestion": "AI 建議（為何這樣寫、哪些地方可以再強化）"
}`;

  try {
    const r = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({ model:'claude-sonnet-4-20250514', max_tokens:2000,
        messages:[{role:'user',content:prompt}] })
    });
    const data = await r.json();
    const raw = data.content?.[0]?.text||'{}';
    const parsed = JSON.parse(raw.replace(/```json\n?|\n?```/g,'').trim());

    // 存到暫存
    S._aiGeneratedPost = { ...parsed, topic, platforms, tone };
    S.modal = 'ai-post-result';
    renderAll();
    toast('✨ AI 貼文生成完成！');
  } catch(e) {
    if(statusEl) statusEl.textContent='';
    toast('AI 生成失敗：'+e.message, 4000);
  }

async function aiGenerateFromCompetitor(competitorId) {
  const topic = prompt('請輸入貼文主題：','新產品發布');
  if(!topic) return;
  await aiGeneratePost({ topic, competitor:competitorId, platforms:['linkedin','facebook'], tone:'專業' });
}

function getCheckedPlatforms() {
  const platforms=[];
  ['linkedin','facebook'].forEach(p=>{
    const el=document.getElementById('plat-'+p);
    if(el?.checked)platforms.push(p);
  });
  return platforms.length?platforms:['linkedin','facebook'];
}

function approvePost(id) {
  const p=SocialDB.getPost(id);if(!p)return;
  p.status='scheduled';
  if(!p.scheduleAt){
    const dt=prompt('設定發布時間（YYYY-MM-DD HH:MM）：',new Date(Date.now()+3600000).toISOString().slice(0,16).replace('T',' '));
    if(dt)p.scheduleAt=dt;
  }
  p.approvedBy=S.currentUser.name;p.approvedAt=now();
  SocialDB.savePost(p);
  AuditLog?.record('post_approve',`核准貼文：${p.content?.slice(0,30)}`,id);
  toast('✅ 貼文已核准，加入排程');renderAll();
}

function rejectPost(id) {
  const p=SocialDB.getPost(id);if(!p)return;
  p.status='draft';p.rejectedBy=S.currentUser.name;
  SocialDB.savePost(p);toast('❌ 貼文已退回修改');renderAll();
}

async function publishPostNow(id) {
  if(!confirm('確定立即發布？'))return;
  const p=SocialDB.getPost(id);if(!p)return;
  // 透過 n8n 串接 LinkedIn / Facebook API
  const cfg=typeof IntegCfg!=='undefined'?IntegCfg.get():{};
  let published=false;
  if(cfg.n8n?.enabled){
    try{
      await fetch(`${cfg.n8n.baseUrl}${cfg.n8n.webhookPath}/social-publish`,{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          platforms:p.platforms, content:p.content,
          image:p.image||null, hashtags:p.hashtags||[]
        })
      });
      published=true;
    }catch(e){console.warn('Social publish failed:',e);}
  }
  p.status='published';p.publishedAt=now();
  p.likes=0;p.comments=0;p.shares=0;
  SocialDB.savePost(p);
  AuditLog?.record('post_publish',`發布貼文：${p.content?.slice(0,30)}`,id);
  toast(published?'✅ 貼文已發布到社群媒體':'✅ 貼文已標記為發布（需設定 n8n）');
  renderAll();
}

function saveNewsletter(status) {
  const subject=document.getElementById('nl-subject')?.value?.trim();
  if(!subject){toast('請填寫主旨');return;}
  const n={
    id:'nl_'+Date.now(), subject,
    from:document.getElementById('nl-from')?.value||S.currentUser.name,
    content:document.getElementById('nl-content')?.value||'',
    scheduleAt:document.getElementById('nl-schedule')?.value?.replace('T',' ')||'',
    status, recipients:NewsletterDB.getSubscribers().length,
    createdBy:S.currentUser.name, createdAt:now()
  };
  NewsletterDB.save(n);S.modal=null;
  toast(status==='draft'?'✅ 草稿已儲存':'✅ 電子報已送審');renderAll();
}

async function aiGenerateNewsletter() {
  const subject=document.getElementById('nl-subject')?.value?.trim()||'最新消息';
  toast('✨ AI 生成電子報中...',8000);
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1500,
        messages:[{role:'user',content:`請為主旨「${subject}」撰寫一封繁體中文電子報，使用 HTML 格式，包含：標題、問候語、主要內容（3-4段）、結尾呼籲行動（CTA），風格專業但親切。只回傳 HTML 內容，不要說明。`}]})
    });
    const data=await r.json();
    const content=data.content?.[0]?.text||'';
    const el=document.getElementById('nl-content');
    if(el)el.value=content;
    toast('✅ AI 電子報內容已生成');
  }catch(e){toast('生成失敗：'+e.message,4000);}
}

function addSubscriber() {
  const email=document.getElementById('new-sub-email')?.value?.trim();
  const name=document.getElementById('new-sub-name')?.value?.trim();
  if(!email||!email.includes('@')){toast('請填寫正確的 Email');return;}
  const subs=NewsletterDB.getSubscribers();
  if(subs.find(s=>s.email===email)){toast('此 Email 已在名單中');return;}
  subs.push({email,name,addedAt:today()});
  NewsletterDB.saveSubscribers(subs);
  document.getElementById('new-sub-email').value='';
  document.getElementById('new-sub-name').value='';
  toast('✅ 訂閱者已新增');renderAll();
}
function removeSubscriber(idx) {
  const subs=NewsletterDB.getSubscribers();subs.splice(idx,1);
  NewsletterDB.saveSubscribers(subs);renderAll();
}
function exportSubscriberCSV() {
  const subs=NewsletterDB.getSubscribers();
  const csv='姓名,Email,加入日期\n'+subs.map(s=>`"${s.name||''}","${s.email}","${s.addedAt||''}"`).join('\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv'}));
  a.download=`subscribers_${today()}.csv`;a.click();toast('✅ 已匯出');
}
function importSubscriberCSV(inp) {
  const file=inp.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=e=>{
    const lines=e.target.result.split('\n').slice(1);
    const subs=NewsletterDB.getSubscribers();
    let added=0;
    lines.forEach(line=>{
      const [name,email]=line.split(',').map(v=>v.replace(/^"|"$/g,'').trim());
      if(email&&email.includes('@')&&!subs.find(s=>s.email===email)){
        subs.push({email,name:name||'',addedAt:today()});added++;
      }
    });
    NewsletterDB.saveSubscribers(subs);
    toast(`✅ 匯入 ${added} 位訂閱者`);renderAll();
  };
  r.readAsText(file,'utf-8');
}

function saveAIPostAsReview() {
  const g=S._aiGeneratedPost||{};
  const platforms=[];
  if(document.getElementById('plat-linkedin')?.checked||g.platforms?.includes('linkedin'))platforms.push('linkedin');
  if(document.getElementById('plat-facebook')?.checked||g.platforms?.includes('facebook'))platforms.push('facebook');
  const content=(document.getElementById('ai-linkedin-content')?.value||g.linkedin||'').trim();
  if(!content){toast('沒有生成內容');return;}
  const p={id:'sp_'+Date.now(),content,platforms,hashtags:g.hashtags||[],isAIGenerated:true,status:'review',createdBy:S.currentUser.name,createdAt:now()};
  if(platforms.includes('facebook'))p.facebookContent=document.getElementById('ai-facebook-content')?.value||g.facebook||content;
  SocialDB.savePost(p);S.modal=null;S._aiGeneratedPost=null;
  NotifyDB?.add({type:'system',icon:'📋',title:'新AI貼文待審核',body:`主題：${g.topic}`,page:'social'});
  toast('✅ AI 貼文已送審，等待人工審核');renderAll();
}

function saveAIPostScheduled() {
  const g=S._aiGeneratedPost||{};
  const platforms=[];
  if(document.getElementById('plat-linkedin')?.checked||g.platforms?.includes('linkedin'))platforms.push('linkedin');
  if(document.getElementById('plat-facebook')?.checked||g.platforms?.includes('facebook'))platforms.push('facebook');
  const content=(document.getElementById('ai-linkedin-content')?.value||g.linkedin||'').trim();
  const scheduleAt=(document.getElementById('ai-schedule-time')?.value||'').replace('T',' ');
  const p={id:'sp_'+Date.now(),content,platforms,hashtags:g.hashtags||[],isAIGenerated:true,status:scheduleAt?'scheduled':'review',scheduleAt,createdBy:S.currentUser.name,createdAt:now()};
  if(platforms.includes('facebook'))p.facebookContent=document.getElementById('ai-facebook-content')?.value||g.facebook||content;
  SocialDB.savePost(p);S.modal=null;S._aiGeneratedPost=null;

function saveEditedPost(id) {

  ['linkedin','facebook'].forEach(pl=>{if(document.getElementById('edit-plat-'+pl)?.checked)platforms.push(pl);});

  p.scheduleAt=document.getElementById('edit-post-schedule')?.value?.replace('T',' ')||p.scheduleAt;

function addSensitiveRule() {

  const label=prompt('欄位說明：','金額欄位');

  const threshold=+prompt('門檻值（amount=金額, percent=百分比）：','50000');

}
function delSensitiveRule(idx) {

const FUNNEL_STAGES = [

  { id:'qualified', label:'已確認需求', color:'#3b82f6', icon:'✅', prob:25  },
  { id:'proposal',  label:'提案報價中', color:'#8b5cf6', icon:'📋', prob:50  },
  { id:'negotiation',label:'議價談判', color:'#f59e0b', icon:'🤝', prob:75  },
  { id:'won',       label:'已成交',    color:'#10b981', icon:'🏆', prob:100 },
  { id:'lost',      label:'已流失',    color:'#ef4444', icon:'❌', prob:0   },
];
const STAGE_MAP = Object.fromEntries(FUNNEL_STAGES.map(s=>[s.id,s]));

function pgSalesFunnel() {

  return `
  <div class="pg-hdr">
    <div><div class="pg-title">🏆 業務自動化流程</div>
    <div class="pg-sub">${opps.length} 個商機 · 預估 ${fmtMoney(totalValue)}</div></div>
    <div class="pg-sp"></div>
    <button class="btn sm" onclick="S.page='prospects';renderAll()">📧 開發信</button>
    <button class="btn sm" onclick="S.page='product-dev';renderAll()">🚀 產品開發</button>
    <button class="btn pri" onclick="S.modal='new-opp';renderAll()">＋ 新增商機</button>
  </div>

  <div class="stats">
    <div class="stat" style="border-left:3px solid var(--blue)">
      <div class="stat-v" style="color:var(--blue)">${opps.filter(o=>o.stage!=='won'&&o.stage!=='lost').length}</div>
      <div class="stat-l">進行中商機</div>
    </div>
    <div class="stat" style="border-left:3px solid var(--green)">
      <div class="stat-v" style="color:var(--green)">${fmtMoney(wonValue)}</div>
      <div class="stat-l">已成交金額</div>
    </div>
    <div class="stat" style="border-left:3px solid var(--purple)">
      <div class="stat-v" style="color:var(--purple)">${fmtMoney(totalValue)}</div>
      <div class="stat-l">預估管道金額</div>
    </div>
    <div class="stat" style="border-left:3px solid var(--amber)">
      <div class="stat-v" style="color:var(--amber)">${winRate}%</div>
      <div class="stat-l">成交率</div>
    </div>
  </div>

  <div style="display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:14px">
    ${[['funnel','🔽 銷售漏斗'],['list','📋 商機列表'],['quotes','📄 報價單'],['contracts','📑 合約'],['orders','📦 訂單'],['followup','🔔 跟進管理']].map(([t,l])=>`
    <button onclick="S.salesTab='${t}';renderAll()" style="border:none;border-bottom:2px solid ${tab===t?'var(--blue)':'transparent'};padding:9px 13px;font-size:12px;color:${tab===t?'var(--blue)':'var(--text3)'};background:transparent;cursor:pointer;white-space:nowrap">${l}</button>`).join('')}
  </div>

  ${tab==='funnel'    ? renderSalesFunnelView(opps)    : ''}
  ${tab==='list'      ? renderOppList(opps)             : ''}
  ${tab==='quotes'    ? renderQuoteList()               : ''}
  ${tab==='contracts' ? renderContractList()            : ''}
  ${tab==='orders'    ? renderOrderList()               : ''}
  ${tab==='followup'  ? renderFollowUpList()            : ''}`;
}

  return `

      <div style="background:var(--bg2);border-radius:var(--r2);padding:10px;min-height:200px">

          </div>
          <span style="font-size:10px;background:${stage.color}22;color:${stage.color};padding:1px 6px;border-radius:99px">${cards.length}</span>
        </div>
        ${stageValue>0?`<div style="font-size:10px;color:var(--text4);margin-bottom:6px">${fmtMoney(stageValue)}</div>`:''}
        <div style="height:3px;background:${stage.color}33;border-radius:99px;margin-bottom:8px">

function renderOppCard(o) {
  const stage=STAGE_MAP[o.stage]||STAGE_MAP['lead'];
  const isOverdue=o.expectedClose&&o.expectedClose<today()&&o.stage!=='won'&&o.stage!=='lost';
  const daysSinceContact=o.lastContactDate?Math.floor((new Date()-new Date(o.lastContactDate))/86400000):null;
  return`
  <div style="background:var(--card);border-radius:var(--r);padding:10px;margin-bottom:6px;border:1px solid var(--border);cursor:pointer;transition:box-shadow .15s"
       onclick="S.modal='view-opp:${o.id}';renderAll()"
       onmouseenter="this.style.boxShadow='var(--sh2)'" onmouseleave="this.style.boxShadow=''">
    <div style="font-size:12px;font-weight:600;margin-bottom:3px;line-height:1.4">${o.name}</div>
    <div style="font-size:11px;color:var(--text3);margin-bottom:4px">${o.company||''}</div>
    ${o.value?`<div style="font-size:12px;font-weight:700;color:var(--blue)">${fmtMoney(o.value)}</div>`:''}
    <div style="display:flex;align-items:center;justify-content:space-between;margin-top:5px">
      <span style="font-size:10px;color:var(--text4)">${o.owner||''}</span>
      ${isOverdue?`<span style="font-size:9px;color:var(--red);font-weight:600">逾期</span>`:
        o.expectedClose?`<span style="font-size:10px;color:var(--text4)">${o.expectedClose}</span>`:''}
    </div>
    ${daysSinceContact!==null&&daysSinceContact>7?`<div style="font-size:9px;color:var(--amber);margin-top:3px">⚠️ ${daysSinceContact}天未聯繫</div>`:''}
  </div>`;
}

// 聯繫記錄
function logContact(oppId) {
  const o=SalesDB.getOpp(oppId);if(!o)return;
  const note=prompt('聯繫記錄：（簡述溝通內容）');if(note===null)return;
  o.lastContactDate=today();
  o.contacts=[...(o.contacts||[]),{date:today(),by:S.currentUser.name,note,type:'manual'}];
  SalesDB.saveOpp(o);
  const f={id:'fu_'+Date.now(),subject:`聯繫 ${o.company||o.name}`,company:o.company,oppId,type:'call',note,dueDate:today(),done:true,doneAt:now()};
  SalesDB.saveFollowUp(f);
  toast('✅ 聯繫記錄已儲存');renderAll();
}

function markFollowUpDone(id) {
  const f=SalesDB.getFollowUps().find(x=>x.id===id);if(!f)return;
  f.done=true;f.doneAt=now();SalesDB.saveFollowUp(f);toast('✅ 已完成');renderAll();
}

async function aiFollowUpEmail(oppId) {
  const o=SalesDB.getOpp(oppId);if(!o)return;
  const days=o.lastContactDate?Math.floor((new Date()-new Date(o.lastContactDate))/86400000):'數天';
  toast('✨ AI 生成跟進信中...',6000);
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:800,
        messages:[{role:'user',content:`請為以下商機撰寫一封繁體中文跟進/催單郵件：
商機名稱：${o.name}
客戶公司：${o.company||''}
聯絡人：${o.contact||''}
報價金額：${o.value?fmtMoney(o.value):'未設定'}
現在階段：${STAGE_MAP[o.stage]?.label||o.stage}
距上次聯繫：${days}天
備註：${o.note||'無'}

要求：
- 語氣專業親切，不要太強硬
- 提及上次討論的重點（請自行合理推測）
- 提出具體的下一步行動
- 結尾請對方確認時間安排
- 150-200字為宜

直接輸出郵件正文，不要說明。`}]})

async function aiGenerateProspectEmail(prospectId) {
  const p=SalesDB.getProspect(prospectId);if(!p)return;
  toast('✨ AI 生成開發信中...',6000);
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:600,
        messages:[{role:'user',content:`請為以下潛在客戶撰寫一封繁體中文開發信：
收件人：${p.name}（${p.title||'主管'}）
公司：${p.company}
產業：${p.industry||'製造業'}
痛點/需求：${p.painPoints||'提升效率、降低成本'}
我們的產品：${L.get('company_intro')||'FormHub 企業表單管理系統，協助企業數位化工作流程'}

要求：
- 個人化開頭，提及對方公司/產業
- 簡短說明我們如何解決他們的問題
- 附上一個具體的價值主張
- 結尾提出一個明確的行動（如：15分鐘通話）
- 不超過150字，專業有溫度

輸出JSON格式：{"subject":"郵件主旨","content":"郵件正文"}`}]})
    });
    const data=await r.json();
    const parsed=JSON.parse(data.content?.[0]?.text?.replace(/```json\n?|\n?```/g,'').trim()||'{}');
    p.emailSubject=parsed.subject||'';
    p.emailContent=parsed.content||'';
    p.emailStatus='pending';
    SalesDB.saveProspect(p);
    toast('✅ 開發信已生成，請審核後發送');renderAll();
  }catch(e){toast('生成失敗：'+e.message,4000);}
}

async function sendProspectEmail(prospectId) {
  const p=SalesDB.getProspect(prospectId);if(!p)return;
  if(!confirm(`確定發送開發信給 ${p.name}（${p.email}）？`))return;
  const cfg=typeof IntegCfg!=='undefined'?IntegCfg.get():{};
  if(cfg.n8n?.enabled){
    try{
      await fetch(`${cfg.n8n.baseUrl}${cfg.n8n.webhookPath}/send-prospect-email`,{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({to:p.email,toName:p.name,subject:p.emailSubject,content:p.emailContent})
      });
    }catch(e){console.warn('Send email failed:',e);}
  }
  p.emailStatus='sent';p.sentAt=now();
  SalesDB.saveProspect(p);
  AuditLog?.record('prospect_email',`發送開發信：${p.email}`,prospectId);
  toast(`✅ 開發信已發送給 ${p.name}`);renderAll();
}

function convertToOpp(prospectId) {
  const p=SalesDB.getProspect(prospectId);if(!p)return;
  const o={
    id:'opp_'+Date.now(),name:`${p.company} 商機`,company:p.company,
    contact:p.name,email:p.email,stage:'qualified',
    value:0,owner:S.currentUser.name,createdAt:now(),
    lastContactDate:today(),source:'email_outreach',
    note:`從開發信轉換，原始資料：${p.industry||''}`

function createQuoteFromOpp(oppId) {
  const o=SalesDB.getOpp(oppId);if(!o)return;
  const qNo=`Q-${new Date().getFullYear()}-${String(SalesDB.getQuotes().length+1).padStart(3,'0')}`;
  S._newQuoteData={ oppId, customer:o.company||o.name, contact:o.contact||'', quoteNo:qNo };
  S.modal='new-quote';renderAll();
}

function createContractFromQuote(quoteId) {
  const q=SalesDB.getQuote(quoteId);if(!q)return;
  const cNo=`C-${new Date().getFullYear()}-${String(SalesDB.getContracts().length+1).padStart(3,'0')}`;
  const c={
    id:'cont_'+Date.now(), contractNo:cNo, customer:q.customer,
    quoteId:q.id, oppId:q.oppId, value:q.total,
    signDate:today(), startDate:today(),
    endDate:new Date(Date.now()+365*86400000).toISOString().slice(0,10),
    status:'active', createdBy:S.currentUser.name, createdAt:now()
  };
  SalesDB.saveContract(c);
  // 更新商機階段
  if(q.oppId){const o=SalesDB.getOpp(q.oppId);if(o){o.stage='won';o.wonDate=today();SalesDB.saveOpp(o);}}
  AuditLog?.record('create_contract',`從報價建立合約：${cNo}`,c.id);
  toast(`✅ 合約 ${cNo} 已建立，商機已標記為成交`);
  S.salesTab='contracts';renderAll();
}

function createOrderFromContract(contractId) {
  const c=SalesDB.getContracts().find(x=>x.id===contractId);if(!c)return;
  const oNo=`SO-${new Date().getFullYear()}-${String(SalesDB.getOrders().length+1).padStart(3,'0')}`;
  const o={
    id:'order_'+Date.now(), orderNo:oNo, customer:c.customer,
    contractId:c.id, amount:c.value, status:'confirmed',
    payStatus:'unpaid', orderDate:today(),
    createdBy:S.currentUser.name, createdAt:now()
  };
  SalesDB.saveOrder(o);
  AuditLog?.record('create_order',`從合約建立訂單：${oNo}`,o.id);
  toast(`✅ 訂單 ${oNo} 已建立`);
  S.salesTab='orders';renderAll();
}

function markPaid(orderId) {
  const o=SalesDB.getOrders().find(x=>x.id===orderId);if(!o)return;
  if(!confirm(`確認 ${o.customer} 的訂單 ${o.orderNo} 已收款？`))return;
  o.payStatus='paid';o.paidAt=now();o.paidBy=S.currentUser.name;
  SalesDB.saveOrder(o);
  AuditLog?.record('order_paid',`收款：${o.orderNo} ${fmtMoney(o.amount)}`,orderId);
  NotifyDB?.add({type:'approved',icon:'💰',title:`收款確認：${o.orderNo}`,body:`${o.customer} ${fmtMoney(o.amount)}`,page:'sales-funnel'});
  toast(`✅ 已確認收款 ${fmtMoney(o.amount)}`);renderAll();
}

function createInvoice(orderId) {
  const o=SalesDB.getOrders().find(x=>x.id===orderId);if(!o)return;
  toast(`📄 發票功能需串接正航 ERP 或手動開立`);
  AuditLog?.record('create_invoice',`建立發票申請：${o.orderNo}`,orderId);
}

// ══════════════════════════════════════════
// Email 追蹤資料層
// ══════════════════════════════════════════
const EmailTracker = {
  // 寄件備份
  getSentEmails()    { return L.get('sent_emails') || []; },
  getSentEmail(id)   { return this.getSentEmails().find(x=>x.id===id); },
  saveSentEmail(e) {
    const all = this.getSentEmails();
    const i = all.findIndex(x=>x.id===e.id);
    if(i>=0) all[i]=e; else all.unshift(e);
    L.set('sent_emails', all);
    if(fbReady) fsSet(fsDoc(db,'sent_emails',e.id),e).catch(()=>{});
    return e;
  },

  // 追蹤設定
  getSettings() {
    return L.get('email_track_settings') || {
      reviewInterval:    7,    // 幾天 review 一次寄件備份
      followUpDays:      [3,7,14], // 未回信幾天後提醒
      autoAskTrack:      true, // 自動詢問是否追蹤
      trackingEnabled:   true, // 開信追蹤
      lastReviewDate:    null,
      emailSignature:    '敬祝商祺\n${name}'
    };
  },
  saveSettings(s) { L.set('email_track_settings', s); },

  // 追蹤記錄
  getTrackLogs()   { return L.get('email_track_logs') || []; },
  addTrackLog(log) {
    const all = this.getTrackLogs();
    all.unshift({ id:'tl_'+Date.now(), ...log, time:now() });
    if(all.length > 500) all.splice(500);
    L.set('email_track_logs', all);
  },

  // 需要追蹤的郵件（未回信超過設定天數）
  getOverdueEmails() {
    const cfg   = this.getSettings();
    const sent  = this.getSentEmails();
    const today2 = new Date();
    return sent.filter(e => {
      if(e.status === 'replied' || e.status === 'ignored') return false;
      if(!e.sentAt) return false;
      const daysSince = Math.floor((today2 - new Date(e.sentAt)) / 86400000);
      return cfg.followUpDays.some(d => daysSince >= d);
    }).map(e => ({
      ...e,
      daysSince: Math.floor((today2 - new Date(e.sentAt)) / 86400000)
    }));
  },

  // 需要 Review 的備份
  getNeedsReview() {
    const cfg = this.getSettings();
    if(!cfg.lastReviewDate) return this.getSentEmails().slice(0, 20);
    const cutoff = new Date(cfg.lastReviewDate);
    cutoff.setDate(cutoff.getDate() + cfg.reviewInterval);
    if(new Date() < cutoff) return [];
    return this.getSentEmails().filter(e => new Date(e.sentAt||e.createdAt) > new Date(cfg.lastReviewDate));
  },

  // 生成 Tracking Pixel URL（模擬）
  genTrackingPixel(emailId) {
    const cfg = typeof IntegCfg !== 'undefined' ? IntegCfg.get() : {};
    const base = cfg.n8n?.baseUrl || window.location.origin;
    return `${base}/track/open?id=${emailId}&t=${Date.now()}`;
  },

  // 模擬開信事件（實際需要 n8n 接收 pixel request）
  simulateOpen(emailId) {
    const e = this.getSentEmail(emailId); if(!e) return;
    if(!e.opens) e.opens = [];
    e.opens.push({ time:now(), ip:'192.168.x.x' });
    e.opened = true; e.openedAt = e.openedAt || now();
    this.saveSentEmail(e);
    this.addTrackLog({ emailId, type:'open', subject:e.subject, to:e.to });
    NotifyDB?.add({ type:'system', icon:'👁️', title:`郵件已開啟：${e.subject?.slice(0,30)}`, body:`${e.toName||e.to} 開啟了您的郵件`, page:'email-tracker' });
    renderAll();
  }
};

// 定期檢查（每30分鐘）
// ══════════════════════════════════════════
setInterval(() => {
  if(S.loading) return;
  const cfg = EmailTracker.getSettings();

  // 1. 檢查需要 Review 的寄件備份
  const needsReview = EmailTracker.getNeedsReview();
  if(needsReview.length > 0 && cfg.lastReviewDate !== today()) {
    NotifyDB?.add({
      type:'reminder', icon:'📬',
      title:`寄件備份待 Review（${needsReview.length} 封）`,
      body:`已超過 ${cfg.reviewInterval} 天，請審閱寄件備份`,
      page:'email-tracker'
    });
    toast(`📬 有 ${needsReview.length} 封寄件備份需要 Review`, 5000);
  }

  // 2. 檢查未回信需要追蹤
  const overdue = EmailTracker.getOverdueEmails();
  if(overdue.length > 0 && cfg.autoAskTrack) {
    const lastCheck = L.get('overdue_email_notified');
    if(lastCheck !== today()) {
      L.set('overdue_email_notified', today());
      NotifyDB?.add({
        type:'reminder', icon:'⏰',
        title:`${overdue.length} 封郵件未收到回覆`,
        body:'點擊查看並決定是否追蹤',
        page:'email-tracker'
      });
    }
  }
}, 1800000);

// AI 起草追蹤信（2~3種）
// ══════════════════════════════════════════
async function aiDraftFollowUp(emailId) {
  const e = EmailTracker.getSentEmail(emailId); if(!e) return;
  const existing = (L.get('followup_drafts')||[]).find(d=>d.originalEmailId===emailId);
  if(existing) { S.etTab='drafts'; renderAll(); return; }

  toast('✨ AI 起草 3 種追蹤信中...', 10000);
  const cfg = EmailTracker.getSettings();

  const prompt = `你是專業的業務溝通專家。請為以下未回覆的郵件起草 3 種不同風格的追蹤信。

原始郵件資訊：
- 主旨：${e.subject||'業務洽談'}
- 收件人：${e.toName||e.to}
- 公司：${e.toCompany||'對方公司'}
- 寄出日期：${e.sentAt?.slice(0,10)||'數天前'}
- 未回覆天數：${Math.floor((new Date()-new Date(e.sentAt||Date.now()))/86400000)} 天
- 郵件類型：${e.emailType||'業務郵件'}
- 開信狀況：${e.opened?'已開信（對方有看到）':'未開信'}
- 原始內容摘要：${e.summary||e.content?.slice(0,200)||'（無摘要）'}

請生成 3 種不同策略的追蹤信（繁體中文），JSON格式：
{
  "drafts": [
    {
      "style": "直接追蹤",
      "subject": "郵件主旨",
      "content": "郵件內文（100-150字，包含問候、追蹤理由、明確行動呼籲）"
    },
    {
      "style": "提供價值",
      "subject": "郵件主旨",
      "content": "郵件內文（提供額外資訊或資源，軟性追蹤，120-160字）"
    },
    {
      "style": "輕鬆詢問",
      "subject": "郵件主旨",
      "content": "郵件內文（輕鬆友善語氣，詢問是否有其他考量，80-100字）"
    }
  ],
  "recommendation": "建議使用哪種方式及原因（2-3句）"
}

只回傳 JSON，不要其他文字。`;

  try {
    const r = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        model:'claude-sonnet-4-20250514', max_tokens:1500,
        messages:[{role:'user', content:prompt}]
      })
    });
    const data  = await r.json();
    const raw   = data.content?.[0]?.text || '{}';
    const parsed = JSON.parse(raw.replace(/```json\n?|\n?```/g,'').trim());

    const draft = {
      id:               'draft_'+Date.now(),
      originalEmailId:  emailId,
      originalSubject:  e.subject,
      to:               e.to,
      toName:           e.toName,
      drafts:           parsed.drafts||[],
      recommendation:   parsed.recommendation||'',
      createdAt:        now()
    };
    const allDrafts = L.get('followup_drafts') || [];
    allDrafts.unshift(draft);
    if(allDrafts.length > 100) allDrafts.splice(100);
    L.set('followup_drafts', allDrafts);

    S.etTab = 'drafts';
    toast('✅ 3 種追蹤信草稿已生成，請審核後發送');
    renderAll();
  } catch(err) {
    toast('AI 生成失敗：'+err.message, 4000);
  }
}

async function regenerateDrafts(emailId) {
  // 刪除舊草稿再重新生成
  const allDrafts = (L.get('followup_drafts')||[]).filter(d=>d.originalEmailId!==emailId);
  L.set('followup_drafts', allDrafts);
  await aiDraftFollowUp(emailId);
}

function deleteDraft(draftId) {
  L.set('followup_drafts', (L.get('followup_drafts')||[]).filter(d=>d.id!==draftId));
  toast('✅ 草稿已刪除'); renderAll();
}

function editDraft(draftId, draftIdx) {
  S.modal = `edit-followup-draft:${draftId}:${draftIdx}`;
  renderAll();
}

async function sendDraft(draftId, draftIdx) {
  const allDrafts = L.get('followup_drafts') || [];
  const d = allDrafts.find(x=>x.id===draftId); if(!d) return;
  const draft = d.drafts[draftIdx]; if(!draft) return;

  if(!confirm(`確定發送「${draft.style}」版本給 ${d.toName||d.to}？`)) return;

  const cfg2 = typeof IntegCfg !== 'undefined' ? IntegCfg.get() : {};
  if(cfg2.n8n?.enabled) {
    try {
      await fetch(`${cfg2.n8n.baseUrl}${cfg2.n8n.webhookPath}/send-email`, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ to:d.to, toName:d.toName, subject:draft.subject, content:draft.content })
      });
    } catch(err) { console.warn('Send email failed:', err); }
  }

  // 更新原始郵件追蹤記錄
  const orig = EmailTracker.getSentEmail(d.originalEmailId);
  if(orig) {
    orig.followUpCount = (orig.followUpCount||0) + 1;
    orig.lastFollowUpAt = now();
    orig.status = 'tracking';
    EmailTracker.saveSentEmail(orig);
  }
  // 建立新的追蹤寄件記錄
  EmailTracker.saveSentEmail({
    id:        'se_'+Date.now(),
    subject:   draft.subject,
    to:        d.to, toName:d.toName,
    content:   draft.content,
    emailType: '追蹤信',
    sentAt:    now(), status:'sent',
    isFollowUp:true, originalEmailId:d.originalEmailId
  });
  // 刪除已發送的草稿
  L.set('followup_drafts', allDrafts.filter(x=>x.id!==draftId));

  AuditLog?.record('send_followup', `發送追蹤信：${draft.subject}`, draftId);
  toast(`✅ 追蹤信已發送（${draft.style}）`); S.etTab='inbox'; renderAll();
}

// ── 狀態操作 ──
function markReplied(emailId) {
  const e = EmailTracker.getSentEmail(emailId); if(!e) return;
  e.status='replied'; e.repliedAt=now();
  EmailTracker.saveSentEmail(e);
  toast('✅ 已標記為已回覆'); renderAll();
}
function snoozeEmail(emailId) {
  const days = prompt('暫緩幾天再提醒？', '3');
  if(!days) return;
  const e = EmailTracker.getSentEmail(emailId); if(!e) return;
  e.status='snoozed';
  e.snoozeUntil = new Date(Date.now()+parseInt(days)*86400000).toISOString().slice(0,10);
  e.sentAt = e.snoozeUntil; // 重設計算基準
  EmailTracker.saveSentEmail(e);
  toast(`✅ 已暫緩 ${days} 天`); renderAll();
}
function ignoreEmail(emailId) {
  if(!confirm('確定不追蹤此郵件？')) return;
  const e = EmailTracker.getSentEmail(emailId); if(!e) return;
  e.status='ignored'; e.ignoredAt=now();
  EmailTracker.saveSentEmail(e);
  toast('✅ 已標記不追蹤'); renderAll();
}
function markReviewed(emailId) {
  const e = EmailTracker.getSentEmail(emailId); if(!e) return;
  e.reviewed=true; e.reviewedAt=now();
  EmailTracker.saveSentEmail(e);
  toast('✅ 已標記 Review'); renderAll();
}
function markAllReviewed() {
  const cfg = EmailTracker.getSettings();
  cfg.lastReviewDate = today();
  EmailTracker.saveSettings(cfg);
  EmailTracker.getNeedsReview().forEach(e => {
    e.reviewed=true; e.reviewedAt=now();
    EmailTracker.saveSentEmail(e);
  });
  toast('✅ 全部已標記 Review'); renderAll();
}

// 1. 全面 XSS 防護
// ══════════════════════════════════════════
const Sec = {
  // HTML 編碼防 XSS
  safe(str) {
    return String(str||'')
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;')
      .replace(/'/g,'&#x27;')
      .replace(/\//g,'&#x2F;');
  },

  // 允許安全 HTML 標籤（給知識庫內容用）
  sanitizeHTML(html) {
    const allowed = ['b','i','strong','em','p','br','ul','ol','li','h1','h2','h3','blockquote','code','pre','span','div','table','tr','td','th','thead','tbody'];
    const parser = new DOMParser();
    const doc    = parser.parseFromString(html, 'text/html');
    // 移除所有 script 標籤和事件屬性
    doc.querySelectorAll('script,style,iframe,object,embed').forEach(el=>el.remove());
    doc.querySelectorAll('*').forEach(el=>{
      [...el.attributes].forEach(attr=>{
        if(attr.name.startsWith('on')||attr.name==='href'&&attr.value.startsWith('javascript:'))
          el.removeAttribute(attr.name);
      });
    });
    return doc.body.innerHTML;
  },

  // 驗證 Email
  isEmail: str => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(str),

  // 驗證 URL（防止 javascript: 協議）
  isSafeURL(url) {
    try {
      const u = new URL(url);
      return ['http:','https:'].includes(u.protocol);
    } catch { return false; }
  },

  // 防止路徑穿越
  safePath: str => String(str||'').replace(/\.\./g,'').replace(/[<>:"|?*]/g,''),

  // Content Security Policy
  applyCSP() {
    const existing = document.querySelector('meta[http-equiv="Content-Security-Policy"]');
    if(existing) existing.remove();
    const meta = document.createElement('meta');
    meta.httpEquiv = 'Content-Security-Policy';
    meta.content   = [
      "default-src 'self' 'unsafe-inline' 'unsafe-eval'",
      "script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.gstatic.com https://fonts.googleapis.com",
      "style-src 'self' 'unsafe-inline' https://fonts.googleapis.com",
      "font-src 'self' https://fonts.gstatic.com",
      "img-src 'self' data: blob: https:",
      "connect-src 'self' https://*.firebaseio.com https://*.googleapis.com https://api.anthropic.com https:",
    ].join('; ');
    document.head.appendChild(meta);
  }
};
Sec.applyCSP();

const IdleLogout = {
  TIMEOUT_MS: 30 * 60 * 1000, // 30分鐘
  WARNING_MS: 28 * 60 * 1000, // 28分鐘時警告
  timer:   null,
  warnTimer: null,
  warned:  false,

  reset() {
    clearTimeout(this.timer);
    clearTimeout(this.warnTimer);
    this.warned = false;

    this.warnTimer = setTimeout(()=>{
      if(!S.currentUser?.name || S.currentUser?.role === 'guest') return;
      toast('⚠️ 閒置即將登出，請移動滑鼠或按任意鍵繼續', 10000);
      this.warned = true;
    }, this.TIMEOUT_MS - 120000); // 提前2分鐘警告

    this.timer = setTimeout(()=>{
      if(!S.currentUser?.name || S.currentUser?.role === 'guest') return;
      AuditLog?.record('auto_logout','閒置自動登出');
      if(window._fbSignOut) window._fbSignOut();
      else { S.page='login'; S.currentUser={name:'',role:''}; renderAll(); }
      toast('⚠️ 因閒置過久已自動登出，請重新登入');
    }, this.TIMEOUT_MS);
  },

  start() {
    const events = ['mousedown','mousemove','keydown','touchstart','scroll','click'];
    events.forEach(e => document.addEventListener(e, ()=>this.reset(), {passive:true}));
    this.reset();
  },

  // 讓使用者自訂閒置時間
  setTimeout(minutes) {
    this.TIMEOUT_MS = minutes * 60 * 1000;
    this.WARNING_MS = (minutes - 2) * 60 * 1000;
    L.set('idle_timeout_min', minutes);
    this.reset();
    toast(`✅ 閒置登出時間設為 ${minutes} 分鐘`);
  }
};

// 3. Rate Limiting（防止濫用 AI 功能）
// ══════════════════════════════════════════
const RateLimit = {
  _counts: {},
  _limits: {
    ai_parse:       { limit:10,  window:60000  },  // 每分鐘10次
    ai_generate:    { limit:20,  window:60000  },  // 每分鐘20次
    ai_email:       { limit:5,   window:60000  },  // 每分鐘5次
    login_attempt:  { limit:5,   window:300000 },  // 5分鐘5次
    form_save:      { limit:30,  window:60000  },  // 每分鐘30次
    api_call:       { limit:100, window:60000  },  // 每分鐘100次
  },

  check(action) {
    const cfg = this._limits[action] || { limit:50, window:60000 };
    const uid = S.currentUser?.uid || 'anon';
    const key = `${uid}_${action}`;
    const now2 = Date.now();
    if(!this._counts[key]) this._counts[key] = [];
    this._counts[key] = this._counts[key].filter(t => now2 - t < cfg.window);
    if(this._counts[key].length >= cfg.limit) {
      const waitSec = Math.ceil((this._counts[key][0] + cfg.window - now2) / 1000);
      toast(`⚠️ 操作過於頻繁，請 ${waitSec} 秒後再試`, 4000);
      AuditLog?.record('rate_limit_hit', `${action} 觸發限速`);
      return false;
    }
    this._counts[key].push(now2);
    return true;
  },

  // 包裝函數：加入 rate limit
  wrap(action, fn) {
    return async (...args) => {
      if(!this.check(action)) return;
      return fn(...args);
    };
  }
};

// 4. 敏感欄位遮罩
// ══════════════════════════════════════════
const DataMask = {
  SENSITIVE_FIELDS: ['salary','薪資','月薪','年薪','底薪','獎金'],
  PARTIAL_MASK:     ['phone','電話','手機','mobile','tel'],
  EMAIL_MASK:       ['email','郵件'],

  mask(value, fieldLabel='', role=null) {
    const r = role || S.currentUser?.role || 'staff';
    const lbl = fieldLabel.toLowerCase();

    // 薪資類：非 HR/Admin 完全遮罩
    if(this.SENSITIVE_FIELDS.some(k=>lbl.includes(k.toLowerCase()))) {
      if(!['admin','manager'].includes(r)) return '*** (需權限)';
    }

    // 電話：只顯示後4碼
    if(this.PARTIAL_MASK.some(k=>lbl.includes(k))) {
      const str = String(value||'');
      if(str.length > 4) return str.slice(0,-4).replace(/./g,'*') + str.slice(-4);
    }

    // Email：遮罩中段
    if(this.EMAIL_MASK.some(k=>lbl.includes(k))) {
      const str = String(value||'');
      const atIdx = str.indexOf('@');
      if(atIdx > 2) return str.slice(0,2) + '***' + str.slice(atIdx);
    }

    return value;
  },

  // 在 pgView 中使用
  safeDisplay(value, fieldLabel) {
    const masked = this.mask(value, fieldLabel);
    if(masked !== value) {
      return `<span title="需要更高權限才能查看完整資料">${masked} <span style="font-size:10px;color:var(--text4)">🔒</span></span>`;
    }
    return Sec.safe(value);
  }
};

// 5. Firebase Storage 照片存法修正
// ══════════════════════════════════════════
const SecureStorage = {
  async uploadPhoto(file, formId) {
    // 先檢查檔案安全性
    if(typeof FileSecurity !== 'undefined') {
      const result = await FileSecurity.check(file);
      if(!result.ok) { toast(result.errors[0], 4000); return null; }
    }

    // 壓縮圖片（降低費用和儲存空間）
    const compressed = await this.compressImage(file, 800, 0.75);

    // 如果 Firebase Storage 可用，上傳並回傳 URL
    if(fbReady) {
      try {
        const { getStorage, ref, uploadBytes, getDownloadURL } =
          await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js');
        const storage = getStorage();
        const path    = `forms/${formId}/${Date.now()}_${Sec.safe(file.name).slice(0,50)}`;
        const storRef = ref(storage, path);
        const snap    = await uploadBytes(storRef, compressed);
        const url     = await getDownloadURL(snap.ref);
        AuditLog?.record('upload_file', `上傳檔案：${file.name}`, formId);
        return url;
      } catch(e) {
        console.warn('Firebase Storage upload failed, falling back to base64:', e);
      }
    }

    // Fallback：壓縮後的 base64
    return new Promise(res => {
      const r = new FileReader();
      r.onload = e => res(e.target.result);
      r.readAsDataURL(compressed);
    });
  },

  compressImage(file, maxWidth=800, quality=0.75) {
    return new Promise(res => {
      if(!file.type.startsWith('image/')) { res(file); return; }
      const img = new Image();
      const url = URL.createObjectURL(file);
      img.onload = () => {
        const canvas = document.createElement('canvas');
        let w = img.width, h = img.height;
        if(w > maxWidth) { h = Math.round(h * maxWidth / w); w = maxWidth; }
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        URL.revokeObjectURL(url);
        canvas.toBlob(blob => res(blob || file), 'image/jpeg', quality);
      };
      img.src = url;
    });
  }
};

// 6. AI API 透過 n8n 中轉（可選）
// ══════════════════════════════════════════
const SecureAI = {
  // 決定是透過 n8n 中轉還是直接呼叫
  async call(messages, systemPrompt, maxTokens=1500) {
    const cfg = typeof IntegCfg !== 'undefined' ? IntegCfg.get() : {};

    // 優先透過 n8n 中轉（保護 API Key）
    if(cfg.n8n?.enabled && cfg.n8n?.baseUrl && cfg.n8n?.proxyAI) {
      try {
        const r = await fetch(`${cfg.n8n.baseUrl}${cfg.n8n.webhookPath}/ai-proxy`, {
          method: 'POST',
          headers: { 'Content-Type':'application/json' },
          body:    JSON.stringify({ messages, system:systemPrompt, max_tokens:maxTokens })
        });
        if(!r.ok) throw new Error('n8n proxy failed: '+r.status);
        const data = await r.json();
        return data.content?.[0]?.text || '';
      } catch(e) {
        console.warn('n8n AI proxy failed, falling back to direct call:', e);
      }
    }

    // 直接呼叫（當 n8n 未設定時）
    const r = await fetch('https://api.anthropic.com/v1/messages', {
      method:  'POST',
      headers: { 'Content-Type':'application/json' },
      body:    JSON.stringify({
        model:      'claude-sonnet-4-20250514',
        max_tokens: maxTokens,
        system:     systemPrompt,
        messages
      })
    });
    const data = await r.json();
    return data.content?.[0]?.text || '';
  }
};

function toggleAIProxy(enabled) {
  if(typeof IntegCfg === 'undefined') return;
  const cfg = IntegCfg.get();
  if(!cfg.n8n) cfg.n8n = {};
  cfg.n8n.proxyAI = enabled;
  IntegCfg.set(cfg);
  toast(enabled ? '✅ AI 中轉已啟用' : 'AI 中轉已關閉');
}

function exportSecurityReport() {
  const logs    = AuditLog?.getAll() || [];
  const users   = UserMgr.getUsers();
  const report  = {
    generatedAt:  now(),
    generatedBy:  S.currentUser?.name,
    systemVersion:'FormHub v2',
    security: {
      totalUsers:    users.length,
      activeUsers:   users.filter(u=>!u.disabled).length,
      adminCount:    users.filter(u=>u.role==='admin').length,
      firebaseReady: fbReady,
      idleTimeout:   (L.get('idle_timeout_min')||30) + '分鐘',
    },
    recentAlerts: logs.filter(l=>['rate_limit_hit','security_alert'].includes(l.action)).slice(0,20),
    auditSummary: logs.slice(0,100)
  };
  const blob = new Blob([JSON.stringify(report, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `Security_Report_${today()}.json`;
  a.click();
  toast('✅ 安全報告已匯出');
}

function clearAuditChecks() {
  for(let i=0; i<10; i++) L.del?.('audit_check_'+i) || L.set('audit_check_'+i, false);

function genPassword() {
  const chars = 'ABCDEFGHJKMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz23456789!@#';
  return Array.from({length:12}, ()=>chars[Math.floor(Math.random()*chars.length)]).join('');
}

async function createUser() {
  const email = document.getElementById('nu-email')?.value?.trim();
  const name  = document.getElementById('nu-name')?.value?.trim();
  const pw    = document.getElementById('nu-pw')?.value;
  const role  = document.getElementById('nu-role')?.value || 'staff';
  const dept  = document.getElementById('nu-dept')?.value || '';
  if(!email || !name || !pw) { toast('請填寫 Email、姓名和密碼'); return; }
  if(pw.length < 8) { toast('密碼至少需要 8 個字元'); return; }
  if(!Sec.isEmail(email)) { toast('請填寫正確的 Email 格式'); return; }

  try {
    if(window._fbRegister) {
      const cred = await window._fbRegister(email, pw);
      UserMgr.saveUser({ uid:cred.user.uid, email, name, role, dept, createdAt:now(), createdBy:S.currentUser?.name });
      AuditLog?.record('create_user', `建立帳號：${email}`, cred.user.uid);
      S.modal = null;
      toast(`✅ 帳號已建立：${email}`);
      renderAll();
    } else {
      toast('⚠️ Firebase Auth 未初始化，請重整頁面後再試');
    }
  } catch(e) {
    const msg = e.code === 'auth/email-already-in-use' ? 'Email 已被使用' :
                e.code === 'auth/weak-password'        ? '密碼強度不足' : e.message;
    toast('❌ 建立失敗：'+msg, 4000);
  }
}

// 第十二階段：效能優化
// 1. 智慧局部渲染（只更新有變動的區塊）
// 2. renderAll 防抖（避免連續觸發）
// 3. 大列表虛擬捲動
// 4. 頁面內容快取

// 6. 啟動時間優化

// ══════════════════════════════════════════
// 1. 智慧局部渲染
// ══════════════════════════════════════════
const Renderer = {
  // 上次渲染的 hash，用來比較是否需要重新渲染
  _hash: {},
  _frame: null,
  _pending: false,

  // 快速 hash：把字串轉成數字
  hash(str) {
    let h = 0;
    const len = Math.min(str.length, 2000); // 只取前2000字元比較
    for(let i = 0; i < len; i++) {
      h = ((h << 5) - h) + str.charCodeAt(i);
      h |= 0;
    }
    return h;
  },

  // 局部更新：只有內容改變才重新渲染
  update(id, html) {
    const el = document.getElementById(id);
    if(!el) return;
    const h = this.hash(html);
    if(this._hash[id] === h) return; // 沒變，跳過
    this._hash[id] = h;
    el.innerHTML = html;
  },

  // 主渲染入口（加入 RAF 批次處理）
  render() {
    if(this._frame) return; // 已有待執行的幀，不重複排程
    this._frame = requestAnimationFrame(() => {
      this._frame = null;
      this._doRender();
    });
  },

  _doRender() {
    const t0 = performance.now();

    // Header：只在 currentUser 或 modal 改變時更新
    this.update('hdr', renderHdr());

    // DeptBar：只在部門或頁面改變時更新
    this.update('deptbar', renderDeptBar());

    // Sidebar：只在頁面/狀態改變時更新
    this.update('sb', renderSidebar());

    // Main：頁面內容（最重要，幾乎每次都要更新）
    const mainEl = document.getElementById('main');
    if(mainEl) {
      const html = S.loading ? renderLoading() : renderPage();
      mainEl.innerHTML = html;
      // 更新 hash
      this._hash['main'] = this.hash(html);
    }

    // Mobile Nav
    this.update('mnav', renderMobileNav());

    // Modal：有 modal 才渲染
    const modalEl = document.getElementById('modal-root');
    if(modalEl) {
      const html = S.modal ? renderModal() : '';
      if(this._hash['modal'] !== this.hash(html)) {
        this._hash['modal'] = this.hash(html);
        modalEl.innerHTML = html;
      }
    }

    // Restore 輸入框狀態
    if(S.lineText && S.page === 'new-form') {
      const ta = document.getElementById('line-ta');
      if(ta && ta.value !== S.lineText) ta.value = S.lineText;
    }

    // Watermark
    if(typeof Watermark !== 'undefined' && S.currentUser?.name) {
      if(!document.getElementById('wm-overlay')) Watermark.show();
    }

    // Debug 效能計時
    if(typeof DebugSys !== 'undefined' && DebugSys.enabled) {
      DebugSys.log('render', `${(performance.now()-t0).toFixed(1)}ms`);
    }
  }
};

// ══════════════════════════════════════════
// 2. renderAll 防抖 + RAF 優化

// 3. 大列表虛擬捲動（表單列表超過50筆時啟用）
// ══════════════════════════════════════════
const VirtualList = {
  ITEM_HEIGHT: 44, // 每行約 44px
  BUFFER:      5,  // 上下各多渲染5行緩衝

  render(items, renderRow, container) {
    if(!container || items.length < 50) return null; // 少於50筆不啟用
    const containerH = container.clientHeight || 400;
    const visibleCount = Math.ceil(containerH / this.ITEM_HEIGHT) + this.BUFFER * 2;
    const scrollTop    = container.scrollTop || 0;
    const startIdx     = Math.max(0, Math.floor(scrollTop / this.ITEM_HEIGHT) - this.BUFFER);
    const endIdx       = Math.min(items.length, startIdx + visibleCount);
    const totalH       = items.length * this.ITEM_HEIGHT;
    const offsetY      = startIdx * this.ITEM_HEIGHT;

    const rows = items.slice(startIdx, endIdx).map(renderRow).join('');
    return `
    <div style="height:${totalH}px;position:relative">
      <div style="position:absolute;top:${offsetY}px;left:0;right:0">${rows}</div>
    </div>`;
  }
};

// ══════════════════════════════════════════
// 4. 頁面快取（相同頁面不重複渲染）
// ══════════════════════════════════════════
const PageCache = {
  _cache: {},
  _maxAge: 5000, // 5秒有效

  get(key) {
    const entry = this._cache[key];
    if(!entry) return null;
    if(Date.now() - entry.time > this._maxAge) { delete this._cache[key]; return null; }
    return entry.html;
  },

  set(key, html) {
    this._cache[key] = { html, time:Date.now() };
    // 最多快取20頁
    const keys = Object.keys(this._cache);
    if(keys.length > 20) delete this._cache[keys[0]];
  },

  // 清除特定頁面快取（資料更新時呼叫）
  invalidate(...pages) {
    pages.forEach(p => delete this._cache[p]);
  },

  // 清除全部
  clear() { this._cache = {}; }
};

// 資料更新時清除快取
const __dbSaveFormCached = DB?.saveForm;
if(typeof DB !== 'undefined' && DB.saveForm) {
  const _orig = DB.saveForm.bind(DB);

// ══════════════════════════════════════════
// 5. 圖片懶載入
// ══════════════════════════════════════════
function setupLazyImages() {
  if(!('IntersectionObserver' in window)) return;
  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if(entry.isIntersecting) {
        const img = entry.target;
        if(img.dataset.src) {
          img.src = img.dataset.src;
          img.removeAttribute('data-src');
          observer.unobserve(img);
        }
      }
    });
  }, { rootMargin:'200px' });

  document.querySelectorAll('img[data-src]').forEach(img => observer.observe(img));
}

// 每次 render 後初始化懶載入
const _origDoRender = Renderer._doRender.bind(Renderer);
Renderer._doRender = function() {
  _origDoRender();
  requestAnimationFrame(setupLazyImages);
};

          }).length,

        };

  }
};

// ══════════════════════════════════════════
// 7. 效能監控
// ══════════════════════════════════════════
const PerfMonitor = {
  marks: {},

  mark(name) { this.marks[name] = performance.now(); },

  measure(name, from) {
    const t = performance.now() - (this.marks[from] || 0);
    if(typeof DebugSys !== 'undefined' && DebugSys.enabled)
      DebugSys.log(`perf:${name}`, `${t.toFixed(1)}ms`);
    return t;
  },

  // 取得效能報告
  report() {
    const nav = performance.getEntriesByType('navigation')[0];
    const resources = performance.getEntriesByType('resource');
    return {
      pageLoad:     Math.round(nav?.loadEventEnd - nav?.startTime) + 'ms',
      domReady:     Math.round(nav?.domContentLoadedEventEnd - nav?.startTime) + 'ms',
      resourceCount: resources.length,
      totalSize:    Math.round(resources.reduce((s,r)=>s+(r.transferSize||0),0)/1024) + 'KB',
      renderCount:  Renderer._renderCount || 0
    };
  }
};

// ══════════════════════════════════════════
// 8. 表格分頁（超過50筆啟用分頁）
// ══════════════════════════════════════════
const Pagination = {
  PAGE_SIZE: 30,

  paginate(items, page=1) {
    const total = items.length;
    const pages = Math.ceil(total / this.PAGE_SIZE);
    const start = (page - 1) * this.PAGE_SIZE;
    const end   = Math.min(start + this.PAGE_SIZE, total);
    return {
      items:   items.slice(start, end),
      page, pages, total, start, end,
      hasPrev: page > 1,
      hasNext: page < pages
    };
  },

  renderControls(paged, onPageChange) {
    if(paged.pages <= 1) return '';
    return `
    <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-top:1px solid var(--border);background:var(--bg2);border-radius:0 0 var(--r2) var(--r2)">
      <span style="font-size:12px;color:var(--text3)">
        顯示 ${paged.start+1}～${paged.end} 筆，共 ${paged.total} 筆
      </span>
      <div style="display:flex;gap:4px;align-items:center">
        <button class="btn sm ico" onclick="${onPageChange}(${paged.page-1})" ${!paged.hasPrev?'disabled':''}>←</button>
        ${Array.from({length:Math.min(paged.pages,7)},(_,i)=>{
          const p = paged.pages <= 7 ? i+1 :
            paged.page <= 4 ? i+1 :
            paged.page >= paged.pages-3 ? paged.pages-6+i :
            paged.page-3+i;
          if(p<1||p>paged.pages) return '';
          return `<button class="btn sm${p===paged.page?' pri':''}" onclick="${onPageChange}(${p})">${p}</button>`;
        }).join('')}
        <button class="btn sm ico" onclick="${onPageChange}(${paged.page+1})" ${!paged.hasNext?'disabled':''}>→</button>
      </div>
    </div>`;
  }
};

// 把分頁整合進 pgList
const __pgListPerf = pgList;
window.pgList = function(opts={}) {
  // 超過50筆啟用分頁
  const page = S.listPage || 1;
  const origForms = S.forms;

  // 暫時用分頁後的資料
  let filtered = S.forms;
  if(opts.statusFilter) filtered = filtered.filter(f=>f.status===opts.statusFilter);
  if(opts.myOnly)       filtered = filtered.filter(f=>f.applicant===S.currentUser.name);
  if(S.deptId && !opts.statusFilter && !opts.myOnly) filtered = filtered.filter(f=>f.deptId===S.deptId);

  if(filtered.length > 50) {
    const paged = Pagination.paginate(filtered, page);
    S.forms = origForms; // 還原
    // 產生分頁版本
    const pagedForms = paged.items;
    S._pagedForms = pagedForms;
    const base = __pgListPerf({ ...opts, _usePaged:true });
    return base + Pagination.renderControls(paged, 'setListPage');
  }
  S.forms = origForms;
  return __pgListPerf(opts);
};
