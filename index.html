function initMindMap(mapId) {
  const canvas = document.getElementById('mindmap-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const maps = L.get('mindmaps') || {};
  const map = maps[mapId];
  if (!map) return;

  let nodes = map.nodes || [];
  let selected = null, dragging = null, dragOffX = 0, dragOffY = 0;
  const colors = ['#2563eb','#7c3aed','#0f766e','#9f1239','#b45309','#15803d'];

  function draw() {
    const W = canvas.width, H = canvas.height;
    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--card').trim() || '#fff';
    ctx.fillRect(0, 0, W, H);

    // Draw connections
    function drawConnections(node) {
      (node.children || []).forEach(childId => {
        const child = nodes.find(n => n.id === childId);
        if (!child) return;
        ctx.beginPath();
        ctx.moveTo(node.x, node.y);
        const cpx = (node.x + child.x) / 2;
        ctx.bezierCurveTo(cpx, node.y, cpx, child.y, child.x, child.y);
        ctx.strokeStyle = node.color || '#2563eb';
        ctx.lineWidth = 1.5;
        ctx.globalAlpha = 0.5;
        ctx.stroke();
        ctx.globalAlpha = 1;
        drawConnections(child);
      });
    }
    nodes.forEach(n => drawConnections(n));

    // Draw nodes
    nodes.forEach(n => {
      const isRoot = n.id === 'n0' || n.id === 'root';
      const r = isRoot ? 50 : 40;
      const text = n.text || '節點';
      ctx.font = `${isRoot ? 'bold ' : ''}${isRoot ? 14 : 12}px 'Noto Sans TC', sans-serif`;
      const tw = ctx.measureText(text).width;
      const bw = Math.max(r * 2, tw + 24);

      ctx.beginPath();
      ctx.roundRect(n.x - bw/2, n.y - 18, bw, 36, 8);
      ctx.fillStyle = selected === n.id ? (n.color || colors[0]) : (n.color || colors[0]) + '22';
      ctx.fill();
      ctx.strokeStyle = n.color || colors[0];
      ctx.lineWidth = selected === n.id ? 2.5 : 1.5;
      ctx.stroke();

      ctx.fillStyle = selected === n.id ? '#fff' : (n.color || colors[0]);
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(text.slice(0, 12), n.x, n.y);
    });
  }

  function getNodeAt(x, y) {
    return nodes.find(n => {
      const text = n.text || '節點';
      ctx.font = '12px Noto Sans TC, sans-serif';
      const bw = Math.max(80, ctx.measureText(text).width + 24);
      return Math.abs(x - n.x) < bw/2 && Math.abs(y - n.y) < 18;
    });
  }

  canvas.addEventListener('mousedown', e => {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    const x = (e.clientX - rect.left) * scaleX;
    const y = (e.clientY - rect.top) * scaleY;
    const node = getNodeAt(x, y);
    if (node) {
      selected = node.id;
      dragging = node;
      dragOffX = x - node.x;
      dragOffY = y - node.y;
    } else {
      selected = null;
    }
    draw();
  });

  canvas.addEventListener('mousemove', e => {
    if (!dragging) return;
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    dragging.x = (e.clientX - rect.left) * scaleX - dragOffX;
    dragging.y = (e.clientY - rect.top) * scaleY - dragOffY;
    draw();
  });

  canvas.addEventListener('mouseup', () => {
    if (dragging) {
      const maps2 = L.get('mindmaps') || {};
      if (maps2[mapId]) { maps2[mapId].nodes = nodes; L.set('mindmaps', maps2); }
    }
    dragging = null;
  });

  canvas.addEventListener('dblclick', e => {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    const x = (e.clientX - rect.left) * scaleX;
    const y = (e.clientY - rect.top) * scaleY;
    const node = getNodeAt(x, y);
    if (node) {
      const text = prompt('編輯節點文字：', node.text);
      if (text !== null) {
        node.text = text;
        const maps2 = L.get('mindmaps') || {};
        if (maps2[mapId]) { maps2[mapId].nodes = nodes; L.set('mindmaps', maps2); }
        draw();
      }
    } else {
      const parentNode = selected ? nodes.find(n => n.id === selected) : nodes[0];
      if (parentNode) {
        const text = prompt('新節點文字：', '新節點');
        if (text) {
          const angle = Math.random() * Math.PI * 2;
          const dist = 150 + Math.random() * 80;
          const newNode = { id: 'n' + Date.now(), text, x: parentNode.x + Math.cos(angle) * dist, y: parentNode.y + Math.sin(angle) * dist, color: colors[Math.floor(Math.random() * colors.length)], children: [] };
          nodes.push(newNode);
          if (!parentNode.children) parentNode.children = [];
          parentNode.children.push(newNode.id);
          const maps2 = L.get('mindmaps') || {};
          if (maps2[mapId]) { maps2[mapId].nodes = nodes; L.set('mindmaps', maps2); }
          draw();
        }
      }
    }
  });

  window.mmAddNode = (mid) => {
    const parentNode = selected ? nodes.find(n => n.id === selected) : nodes[0];
    if (!parentNode) return;
    const text = prompt('新節點文字：', '新節點');
    if (!text) return;
    const angle = Math.random() * Math.PI * 2;
    const newNode = { id: 'n' + Date.now(), text, x: parentNode.x + Math.cos(angle) * 140, y: parentNode.y + Math.sin(angle) * 140, color: colors[Math.floor(Math.random() * colors.length)], children: [] };
    nodes.push(newNode);
    if (!parentNode.children) parentNode.children = [];
    parentNode.children.push(newNode.id);
    saveMindMapNodes(mid, nodes);
    draw();
  };

  window.mmAutoLayout = (mid) => {
    const root = nodes.find(n => n.id === 'n0' || n.id === 'root') || nodes[0];
    if (!root) return;
    root.x = canvas.width / 2; root.y = canvas.height / 2;
    function layout(node, angle, dist, spread) {
      (node.children || []).forEach((cid, i) => {
        const child = nodes.find(n => n.id === cid);
        if (!child) return;
        const a = angle - spread/2 + spread * (i + 0.5) / Math.max(1, node.children.length);
        child.x = node.x + Math.cos(a) * dist;
        child.y = node.y + Math.sin(a) * dist;
        layout(child, a, dist * 0.7, spread * 0.6);
      });
    }
    layout(root, 0, 160, Math.PI * 2);
    saveMindMapNodes(mid, nodes);
    draw();
    toast('✓ 自動排列完成');
  };

  function saveMindMapNodes(mid, nodes) {
    const maps2 = L.get('mindmaps') || {};
    if (maps2[mid]) { maps2[mid].nodes = nodes; L.set('mindmaps', maps2); }
  }

  draw();
}

function pgPersonalCalendar() {
  const myForms = S.forms.filter(f => f.applicant === S.currentUser.name);
  const pendingForms = S.forms.filter(f => f.status === 'pending');
  const reminders = Reminder.getAll().filter(r => !r.done);
  const projects = ProjDB.getAll();
  const myTasks = projects.flatMap(p => (p.tasks || []).filter(t => t.assignee === S.currentUser.name).map(t => ({ ...t, projectName: p.name })));

  const now2 = new Date();
  const year = S.calYear || now2.getFullYear();
  const month = S.calMonth !== undefined ? S.calMonth : now2.getMonth();
  const first = new Date(year, month, 1);
  const last = new Date(year, month + 1, 0);
  const startDay = first.getDay();
  const monthNames = ['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
  const dayNames = ['日','一','二','三','四','五','六'];

  const evMap = {};
  const addEv = (d, ev) => { if (!d) return; const key = d.slice(0, 10); if (!evMap[key]) evMap[key] = []; evMap[key].push(ev); };
  myForms.forEach(f => addEv(f.date, { text: f.seq, color: 'var(--blue)', type: 'form' }));
  pendingForms.forEach(f => addEv(f.date, { text: '待審:' + f.seq, color: 'var(--amber)', type: 'pending' }));
  reminders.forEach(r => addEv(r.dueDate, { text: r.title, color: 'var(--red)', type: 'reminder' }));
  myTasks.forEach(t => { addEv(t.endDate, { text: t.name, color: 'var(--purple)', type: 'task' }); });

  let cells = '';
  const total = startDay + last.getDate();
  for (let i = 0; i < Math.ceil(total / 7) * 7; i++) {
    const dayNum = i - startDay + 1;
    const isValid = dayNum >= 1 && dayNum <= last.getDate();
    const dateStr = isValid ? `${year}-${String(month+1).padStart(2,'0')}-${String(dayNum).padStart(2,'0')}` : '';
    const isToday = dateStr === today();
    const evs = evMap[dateStr] || [];
    cells += `<td style="vertical-align:top;padding:3px;border:1px solid var(--border);min-height:72px;background:${isToday?'var(--blue-lt)':isValid?'var(--card)':'var(--bg2)'}">
      <div style="font-size:10px;font-weight:${isToday?'700':'400'};color:${isToday?'var(--blue)':'var(--text3)'};margin-bottom:2px;text-align:right">${isValid?dayNum:''}</div>
      ${evs.slice(0,3).map(ev=>`<div style="font-size:9px;padding:1px 4px;border-radius:2px;margin-bottom:1px;background:${ev.color}22;color:${ev.color};overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${ev.text}</div>`).join('')}
      ${evs.length>3?`<div style="font-size:9px;color:var(--text4)">+${evs.length-3}</div>`:''}
    </td>`;
    if ((i + 1) % 7 === 0) cells += '</tr><tr>';
  }

  return `
  <div class="pg-hdr">
    <div><div class="pg-title">📅 個人行事曆</div><div class="pg-sub">${S.currentUser.name}</div></div>
    <div class="pg-sp"></div>
    <button class="btn sm pri" onclick="S.modal='add-reminder';renderAll()">＋ 新增提醒</button>
  </div>

  <div class="stats">
    <div class="stat" style="border-left:3px solid var(--blue)"><div class="stat-v" style="color:var(--blue)">${myForms.length}</div><div class="stat-l">我的表單</div></div>
    <div class="stat" style="border-left:3px solid var(--amber)"><div class="stat-v" style="color:var(--amber)">${pendingForms.length}</div><div class="stat-l">待我審核</div></div>
    <div class="stat" style="border-left:3px solid var(--purple)"><div class="stat-v" style="color:var(--purple)">${myTasks.length}</div><div class="stat-l">我的任務</div></div>
    <div class="stat" style="border-left:3px solid var(--red)"><div class="stat-v" style="color:var(--red)">${reminders.length}</div><div class="stat-l">提醒事項</div></div>
  </div>

  <div style="display:grid;grid-template-columns:1fr 260px;gap:14px">
    <div style="background:var(--card);border-radius:var(--r2);border:1px solid var(--border);overflow:hidden">
      <div style="display:flex;align-items:center;padding:10px 14px;border-bottom:1px solid var(--border);gap:10px">
        <button class="btn sm ico" onclick="S.calMonth=${month===0?'(S.calYear='+(year-1)+',11)':'month-1'};renderAll()">←</button>
        <span style="font-size:14px;font-weight:600;flex:1;text-align:center">${year} 年 ${monthNames[month]}</span>
        <button class="btn sm ico" onclick="S.calMonth=${month===11?'(S.calYear='+(year+1)+',0)':'month+1'};renderAll()">→</button>
        <button class="btn sm" onclick="S.calYear=${now2.getFullYear()};S.calMonth=${now2.getMonth()};renderAll()">今天</button>

const VendorDB = {
  getAll() { return L.get('vendors') || []; },
  save(v) {
    const all = this.getAll();
    const i = all.findIndex(x => x.id === v.id);
    if (i >= 0) all[i] = v; else all.unshift(v);
    L.set('vendors', all);
    if (fbReady) fsSet(fsDoc(db, 'vendors', v.id), v).catch(() => {});
    return v;
  },
  get(id) { return this.getAll().find(x => x.id === id); },
  genPortalToken(vendorId) {
    const token = btoa(vendorId + ':' + Date.now() + ':' + Math.random().toString(36).slice(2));
    const tokens = L.get('vendor_tokens') || {};
    tokens[token] = { vendorId, createdAt: now(), used: 0, expires: new Date(Date.now() + 30*86400000).toISOString().slice(0,10) };
    L.set('vendor_tokens', tokens);
    return token;
  }
};

// 圖片 AI 視覺辨識
// ════════════════════════════════════════════
async function aiVisionFill(imageDataURL, targetForm) {
  const dept = S.depts.find(d => d.id === (targetForm === 'new' ? (S.aiDept || S.deptId) : S.forms.find(f=>f.id===targetForm)?.deptId));
  const fieldList = (dept?.fields || []).map(f => `${f.label}(${f.type})`).join('、');
  const sys = `你是表單辨識助手。分析圖片中的內容，辨識所有文字和數據，自動對應到以下表單欄位：${fieldList}。
同時辨識圖片中的品項表格（品名、數量、單位、單價）。
只回傳JSON：{"fields":{"欄位名稱":"值"},"items":[{"name":"","qty":1,"unit":"個","price":0}],"applicant":"","_summary":"一句話摘要","_ok":true}`;
  toast('🤖 AI 視覺辨識中...', 8000);
  try {
    const r = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514', max_tokens: 1500, system: sys,
        messages: [{ role: 'user', content: [
          { type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: imageDataURL.split(',')[1] || imageDataURL } },
          { type: 'text', text: '請辨識此圖片中的表單資料並填入對應欄位' }
        ]}]
      })
    });
    const data = await r.json();
    const parsed = JSON.parse(data.content?.[0]?.text?.replace(/```json\n?|\n?```/g, '').trim() || '{}');
    // 填入欄位
    if (parsed.fields) {
      Object.entries(parsed.fields).forEach(([label, val]) => {
        const fd = dept?.fields?.find(f => f.label === label);
        if (fd) {
          const prefix = targetForm === 'new' ? 'nf-' : 'ef-';
          const el = document.getElementById(prefix + fd.id);
          if (el) el.value = val;
        }
      });
    }
    if (parsed.applicant) {
      const el = document.getElementById('inp-applicant');
      if (el) el.value = parsed.applicant;
    }
    // 填入品項
    if (parsed.items?.length) {
      S.aiParsed = { ...S.aiParsed, items: parsed.items, _ok: true, _summary: parsed._summary };
      renderAll();
    }
    toast(`✅ AI 辨識完成：${parsed._summary || '已填入欄位'}`);
    return parsed;
  } catch(e) {
    toast('❌ AI 辨識失敗：' + e.message, 4000);
    return null;
  }
}

function saveReminder() {
  const title = document.getElementById('rem-title')?.value?.trim();
  const dueDate = document.getElementById('rem-date')?.value;
  const period = document.getElementById('rem-period')?.value;
  const note = document.getElementById('rem-note')?.value;
  if (!title || !dueDate) { toast('請填寫標題和日期'); return; }
  Reminder.add({ title, dueDate, periodic: !!period, period, nextDate: dueDate, note });
  S.modal = null; toast('✓ 提醒已新增'); renderAll();
}

function saveProject(deptId) {
  const name = document.getElementById('pj-name')?.value?.trim();
  if (!name) { toast('請填寫專案名稱'); return; }
  const tagsRaw = document.getElementById('pj-tags')?.value || '';
  const proj = {
    id: 'pj_' + Date.now(), deptId: deptId || S.deptId || 'MGT', name,
    desc: document.getElementById('pj-desc')?.value || '',
    assignee: document.getElementById('pj-assignee')?.value || S.currentUser.name,
    priority: document.getElementById('pj-priority')?.value || '中',
    startDate: document.getElementById('pj-start')?.value || today(),
    endDate: document.getElementById('pj-end')?.value || '',
    tags: tagsRaw ? tagsRaw.split(',').map(t => t.trim()) : [],
    status: '待辦', tasks: [], createdAt: now(), createdBy: S.currentUser.name
  };
  ProjDB.save(proj);
  AuditLog.record('create_project', `建立專案：${name}`, proj.id);
  S.modal = null; toast('✓ 專案已建立'); renderAll();
}

function addTask(projId) {
  const name = prompt('任務名稱：'); if (!name?.trim()) return;
  const assignee = prompt('負責人：', S.currentUser.name) || S.currentUser.name;
  const endDate = prompt('截止日 (YYYY-MM-DD)：', '') || '';
  const proj = ProjDB.get(projId); if (!proj) return;
  if (!proj.tasks) proj.tasks = [];
  proj.tasks.push({ id: 't_' + Date.now(), name: name.trim(), assignee, endDate, done: false, progress: 0, status: '待辦' });
  ProjDB.save(proj);
  renderAll();
}

function toggleTask(projId, taskId, done) {
  const proj = ProjDB.get(projId); if (!proj) return;
  const task = (proj.tasks || []).find(t => t.id === taskId);
  if (task) { task.done = done; task.status = done ? '已完成' : '進行中'; ProjDB.save(proj); }
  renderAll();
}

function saveVendor() {
  const name = document.getElementById('v-name')?.value?.trim();
  if (!name) { toast('請填寫公司名稱'); return; }
  const v = {
    id: 'v_' + Date.now(), name,
    taxId: document.getElementById('v-tax')?.value || '',
    contact: document.getElementById('v-contact')?.value || '',
    phone: document.getElementById('v-phone')?.value || '',
    email: document.getElementById('v-email')?.value || '',
    industry: document.getElementById('v-industry')?.value || '',
    contractExpiry: document.getElementById('v-expiry')?.value || '',
    grade: document.getElementById('v-grade')?.value || 'B',
    payment: document.getElementById('v-payment')?.value || '月結30天',
    status: '啟用', createdAt: now()
  };
  VendorDB.save(v);
  AuditLog.record('create_vendor', `新增供應商：${name}`, v.id);
  S.modal = null; toast('✓ 供應商已新增'); renderAll();
}

function exportAuditLog() {
  const logs = AuditLog.getAll();
  const rows = [['時間','操作人','動作','說明','相關單號']];
  logs.forEach(l => rows.push([l.time, l.user, l.action, l.detail, l.formId || '']));
  const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g, '""')}"`).join(',')).join('\n');
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = `audit_log_${today()}.csv`; a.click();
  toast('✓ 稽核日誌已匯出');
}

// ── 安全性設定 ──
(function setupSecurity() {
  // XSS 防護：sanitize HTML
  window.sanitize = str => String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#x27;');

  // CSP meta tag
  if (!document.querySelector('meta[http-equiv="Content-Security-Policy"]')) {
    const csp = document.createElement('meta');
    csp.httpEquiv = 'Content-Security-Policy';
    csp.content = "default-src 'self' 'unsafe-inline' 'unsafe-eval' https: data: blob:;";
    document.head.appendChild(csp);
  }

  // 防止 DevTools 偵測截圖浮水印消除
  window.addEventListener('keydown', e => {
    if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && ['I','J','C'].includes(e.key))) {
      if (!Roles?.can('admin')) {
        e.preventDefault();
        AuditLog?.record('security_alert', '嘗試開啟開發者工具');
        toast('⚠️ 此操作已被記錄', 3000);
      }
    }
  });

  // 防止右鍵（可選）

  toggle(on) { on ? this.show() : this.hide(); }
};

// ── 防毒：檔案安全檢查 ──
const FileSecurity = {
  ALLOWED_EXTENSIONS: ['jpg','jpeg','png','gif','webp','pdf','docx','xlsx','xls','doc','csv','txt'],
  BLOCKED_EXTENSIONS: ['exe','bat','cmd','sh','js','vbs','ps1','msi','dll','com','scr'],
  MAX_SIZE_MB: 10,

  check(file) {
    const ext = file.name.split('.').pop().toLowerCase();
    const sizeMB = file.size / 1024 / 1024;
    const errors = [];

    if (this.BLOCKED_EXTENSIONS.includes(ext))
      errors.push(`❌ 不允許上傳 .${ext} 檔案（安全限制）`);
    if (!this.ALLOWED_EXTENSIONS.includes(ext))
      errors.push(`⚠️ 不建議上傳 .${ext} 檔案`);
    if (sizeMB > this.MAX_SIZE_MB)
      errors.push(`❌ 檔案過大 (${sizeMB.toFixed(1)}MB，上限 ${this.MAX_SIZE_MB}MB)`);

    // Magic bytes check (basic)
    return new Promise(res => {
      const reader = new FileReader();
      reader.onload = e => {
        const arr = new Uint8Array(e.target.result).slice(0, 4);
        const hex = Array.from(arr).map(b => b.toString(16).padStart(2,'0')).join('');
        // Check for EXE magic bytes
        if (hex.startsWith('4d5a')) errors.push('❌ 偵測到可執行檔特徵（MZ header）');
        // Check for ZIP bomb (very small zip with huge uncompressed)
        AuditLog?.record('file_scan', `掃描: ${file.name} (${sizeMB.toFixed(2)}MB) ${errors.length?'⚠️ '+errors.join(', '):'✅ 通過'}`);
        res({ ok: errors.length === 0, errors, file });
      };
      reader.readAsArrayBuffer(file.slice(0, 8));
    });
  },

  // 覆寫 handlePhotoUpload 加入安全檢查
  async safeUpload(files, onSuccess) {
    for (const file of files) {
      const result = await this.check(file);
      if (!result.ok) {
        toast(result.errors[0], 5000);
        continue;
      }
      await onSuccess(file);
    }
  }
};

// ── 遠端登入（Azure AD SSO） ──
const RemoteAuth = {
  async loginWithMicrosoft() {
    const cfg = IntegCfg?.get() || {};
    const tenantId = cfg.azureTenantId || prompt('請輸入 Azure Tenant ID：');
    const clientId = cfg.azureClientId || prompt('請輸入 Azure Client ID：');
    if (!tenantId || !clientId) return;
    // OAuth2 PKCE flow
    const state = btoa(Math.random().toString(36));
    const codeVerifier = btoa(Math.random().toString(36) + Math.random().toString(36)).replace(/[^a-zA-Z0-9]/g,'').slice(0,64);
    sessionStorage.setItem('oauth_state', state);
    sessionStorage.setItem('code_verifier', codeVerifier);
    const redirectUri = encodeURIComponent(window.location.origin + window.location.pathname);
    const scope = encodeURIComponent('openid profile email User.Read');
    const url = `https://login.microsoftonline.com/${tenantId}/oauth2/v2.0/authorize?client_id=${clientId}&response_type=code&redirect_uri=${redirectUri}&scope=${scope}&state=${state}&code_challenge_method=plain&code_challenge=${codeVerifier}`;
    window.location.href = url;
  },

  checkCallback() {
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    const state = params.get('state');
    if (code && state === sessionStorage.getItem('oauth_state')) {
      toast('✅ Microsoft 登入成功（需後端交換 token）');
      // 清除 URL 參數
      window.history.replaceState({}, '', window.location.pathname);
      return true;
    }
    return false;
  }
};
RemoteAuth.checkCallback();

    </div>`:''}
  </div>`;
}

function addToLunchOrder(sessionId, itemName, itemPrice) {
  const s = LunchDB.get(sessionId); if (!s) return;
  if (!s.orders) s.orders = [];
  let myOrder = s.orders.find(o => o.user === S.currentUser.name);
  if (!myOrder) {
    myOrder = { user: S.currentUser.name, items: [], note: '', orderedAt: now() };
    s.orders.push(myOrder);
  }
  const existing = myOrder.items.find(i => i.name === itemName);
  if (existing) existing.qty = (existing.qty || 1) + 1;
  else myOrder.items.push({ name: itemName, price: itemPrice, qty: 1 });
  LunchDB.save(s);
  toast(`✓ 已加入：${itemName} NT$${itemPrice}`);
  renderAll();
}

function cancelLunchOrder(sessionId) {
  const s = LunchDB.get(sessionId); if (!s) return;
  s.orders = (s.orders || []).filter(o => o.user !== S.currentUser.name);
  LunchDB.save(s);
  toast('✓ 已取消訂單');
  renderAll();
}

function summarizeLunch(sessionId) {
  const s = LunchDB.get(sessionId); if (!s) return;
  const summary = {};
  (s.orders || []).forEach(o => {
    (o.items || []).forEach(i => {
      summary[i.name] = (summary[i.name] || 0) + (i.qty || 1);
    });
  });
  const text = `【${s.restaurant} 訂單匯總 ${s.date}】\n` +
    Object.entries(summary).map(([name, qty]) => `${name} × ${qty}`).join('\n') +
    `\n\n共 ${(s.orders||[]).length} 人，合計 NT$ ${(s.orders||[]).reduce((sum,o)=>sum+(o.items||[]).reduce((s2,i)=>s2+(+i.price||0),0),0).toLocaleString()}`;
  navigator.clipboard?.writeText(text).then(() => toast('✅ 訂單匯總已複製，可傳給店家'));
  S.modal = `lunch-summary:${sessionId}`;
  renderAll();
}

function closeLunch(sessionId) {
  const s = LunchDB.get(sessionId); if (!s) return;
  s.status = 'closed'; s.closedAt = now();
  LunchDB.save(s);
  toast('✅ 訂餐已結束');
  renderAll();
}

const VoteDB = {
  getAll() { return L.get('vote_sessions') || []; },
  save(v) {
    const all = this.getAll();
    const i = all.findIndex(x => x.id === v.id);
    if (i >= 0) all[i] = v; else all.unshift(v);
    L.set('vote_sessions', all);
    if (fbReady) fsSet(fsDoc(db, 'vote_sessions', v.id), v).catch(() => {});
    return v;
  },
  get(id) { return this.getAll().find(x => x.id === id); }
};

function pgVote() {
  const sessions = VoteDB.getAll();
  const active = sessions.filter(s => s.status === 'active' && (!s.endDate || s.endDate >= today()));
  const closed = sessions.filter(s => s.status !== 'active' || (s.endDate && s.endDate < today()));

  return `
  <div class="pg-hdr">
    <div><div class="pg-title">🗳️ 投票系統</div>
    <div class="pg-sub">${active.length} 個進行中</div></div>
    <div class="pg-sp"></div>
    <button class="btn pri" onclick="S.modal='new-vote';renderAll()">＋ 建立投票</button>
  </div>

  ${active.length ? `
  <div class="sec">
    <div class="sec-hdr blue">🗳️ 進行中的投票 (${active.length})</div>
    <div class="sec-body">
      ${active.map(s => renderVoteCard(s)).join('')}
    </div>
  </div>` : `
  <div class="card" style="text-align:center;padding:32px">
    <div style="font-size:48px;margin-bottom:12px">🗳️</div>
    <div style="font-size:14px;font-weight:500;margin-bottom:8px">目前沒有進行中的投票</div>
    <button class="btn pri" onclick="S.modal='new-vote';renderAll()">建立投票</button>
  </div>`}

  ${closed.length ? `
  <div class="sec">
    <div class="sec-hdr gray">📊 已結束投票</div>
    <div class="sec-body">
      ${closed.slice(0,5).map(s => renderVoteResult(s)).join('')}
    </div>
  </div>` : ''}`;
}

function renderVoteCard(s) {
  const myVote = (s.votes || []).find(v => !s.anonymous && v.user === S.currentUser.name)
    || (s.anonymous && (s.myVote || null));
  const totalVotes = s.anonymous
    ? Object.values(s.voteCounts || {}).reduce((a, b) => a + b, 0)
    : (s.votes || []).length;
  const hasVoted = !!myVote;

  return `
  <div style="background:var(--bg2);border-radius:var(--r2);padding:14px;margin-bottom:10px;border:1px solid var(--border)">
    <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px">
      <div>
        <div style="font-size:14px;font-weight:700">${s.title}</div>
        <div style="font-size:11px;color:var(--text3)">
          ${s.anonymous?'🔒 匿名':'👤 記名'} · 截止：${s.endDate||'無限期'} · ${totalVotes} 票
        </div>
      </div>
      ${s.endDate&&s.endDate<today()?`<span class="badge b-rejected">已截止</span>`:`<span class="badge b-approved">進行中</span>`}
    </div>

    ${s.desc?`<p style="font-size:12px;color:var(--text2);margin-bottom:10px">${s.desc}</p>`:''}

    <!-- 選項 -->
    <div style="display:flex;flex-direction:column;gap:6px">
      ${(s.options||[]).map((opt,i) => {
        const cnt = s.anonymous ? (s.voteCounts?.[i]||0) : (s.votes||[]).filter(v=>v.optionIdx===i).length;
        const pct = totalVotes > 0 ? Math.round(cnt/totalVotes*100) : 0;
        const isMyChoice = myVote?.optionIdx === i;
        return `
        <div style="cursor:${hasVoted?'default':'pointer'};position:relative;background:var(--card);border:1.5px solid ${isMyChoice?'var(--blue)':'var(--border)'};border-radius:var(--r);padding:10px 12px;overflow:hidden;transition:border-color .15s"
             onclick="${!hasVoted?`doVote('${s.id}',${i})`:''}">
          <div style="position:absolute;left:0;top:0;bottom:0;width:${pct}%;background:${isMyChoice?'var(--blue-lt)':'var(--bg2)'};transition:width .5s"></div>
          <div style="position:relative;display:flex;align-items:center;justify-content:space-between">
            <span style="font-size:13px;font-weight:${isMyChoice?'600':'400'}">${opt}</span>
            <div style="font-size:11px;color:var(--text3)">${hasVoted?`${cnt} 票 (${pct}%)`:(hasVoted?'':'點擊投票')}</div>
          </div>
        </div>`;
      }).join('')}
    </div>

    ${hasVoted?`<div style="font-size:12px;color:var(--green);margin-top:8px">✓ 您已投票</div>`:''}

    ${!s.anonymous&&(s.votes||[]).length>0?`
    <div style="margin-top:10px;border-top:1px solid var(--border);padding-top:8px">
      <div style="font-size:11px;color:var(--text3);margin-bottom:4px">投票記錄</div>
      <div style="display:flex;flex-wrap:wrap;gap:4px">
        ${(s.votes||[]).map(v=>`<span style="font-size:11px;background:var(--bg3);padding:2px 7px;border-radius:99px">${v.user}→${s.options[v.optionIdx]}</span>`).join('')}
      </div>
    </div>`:''}

    ${s.organizer===S.currentUser.name?`
    <div style="margin-top:8px">
      <button class="btn sm dan" onclick="closeVote('${s.id}')">結束投票</button>
    </div>`:''}
  </div>`;
}

function renderVoteResult(s) {
  const totalVotes = s.anonymous
    ? Object.values(s.voteCounts || {}).reduce((a, b) => a + b, 0)
    : (s.votes || []).length;
  const winner = (s.options||[]).reduce((best,opt,i)=>{
    const cnt = s.anonymous?(s.voteCounts?.[i]||0):(s.votes||[]).filter(v=>v.optionIdx===i).length;
    return cnt>(best.cnt||0)?{opt,cnt,i}:best;
  },{});

  return `
  <div style="padding:10px 0;border-bottom:1px solid var(--border)">
    <div style="display:flex;align-items:center;gap:8px">
      <span style="font-size:16px">🏆</span>
      <div style="flex:1">
        <div style="font-size:13px;font-weight:500">${s.title}</div>
        <div style="font-size:11px;color:var(--text3)">最高票：${winner.opt||'-'} (${winner.cnt||0}票) · 共${totalVotes}人</div>
      </div>
      <span class="badge b-draft">${s.endDate||''}</span>
    </div>
  </div>`;
}

function doVote(sessionId, optionIdx) {
  const s = LunchDB.get(sessionId) || VoteDB.get(sessionId); // try both
  const vs = VoteDB.get(sessionId);
  if (!vs) return;
  const now2 = now();
  if (vs.anonymous) {
    if (!vs.voteCounts) vs.voteCounts = {};
    vs.voteCounts[optionIdx] = (vs.voteCounts[optionIdx] || 0) + 1;
    vs.myVote = { optionIdx };
  } else {
    if (!vs.votes) vs.votes = [];
    if (vs.votes.find(v => v.user === S.currentUser.name)) { toast('您已投過票'); return; }
    vs.votes.push({ user: S.currentUser.name, optionIdx, time: now2 });
  }
  VoteDB.save(vs);
  AuditLog?.record('vote', `投票：${vs.title} → ${vs.options[optionIdx]}`, sessionId);
  toast(`✅ 投票成功：${vs.options[optionIdx]}`);
  renderAll();
}

function closeVote(sessionId) {
  const s = VoteDB.get(sessionId); if (!s) return;
  s.status = 'closed'; s.closedAt = now();
  VoteDB.save(s);
  toast('✅ 投票已結束');
  renderAll();
}

function saveLunchSession() {
  const restaurant=document.getElementById('l-rest')?.value?.trim();
  const deadline=document.getElementById('l-deadline')?.value||'11:00';
  const contact=document.getElementById('l-contact')?.value||'';
  if(!restaurant){toast('請填寫餐廳名稱');return;}
  const menu=[];
  document.querySelectorAll('#lunch-menu-items .flex').forEach(row=>{
    const inputs=row.querySelectorAll('input');
    if(inputs[0]?.value?.trim()&&inputs[1]?.value)
      menu.push({name:inputs[0].value.trim(),price:+inputs[1].value});
  });
  if(menu.length===0){toast('請至少新增一個菜單品項');return;}
  const s={id:'lunch_'+Date.now(),restaurant,deadline,contact,date:today(),organizer:S.currentUser.name,menu,orders:[],status:'active',createdAt:now()};
  LunchDB.save(s);
  AuditLog?.record('create_lunch','發起訂餐:'+restaurant,s.id);
  S.modal=null;toast('✅ 訂餐活動已建立');renderAll();
}

function addVoteOption() {
  const div=document.getElementById('vote-options');if(!div)return;
  const row=document.createElement('div');row.className='flex gap-2 mb-1';
  row.innerHTML=`<input type="text" placeholder="選項"><button class="btn sm dan ico" onclick="if(document.querySelectorAll('#vote-options .flex').length>2)this.closest('.flex').remove()">✕</button>`;

}

function saveVoteSession() {
  const title=document.getElementById('v-title')?.value?.trim();
  if(!title){toast('請填寫投票標題');return;}
  const options=[];
  document.querySelectorAll('#vote-options .flex input[type=text]').forEach(inp=>{if(inp.value.trim())options.push(inp.value.trim());});
  if(options.length<2){toast('請至少填寫2個選項');return;}
  const anon=document.getElementById('v-anon')?.value==='true';
  const s={id:'vote_'+Date.now(),title,desc:document.getElementById('v-desc')?.value||'',endDate:document.getElementById('v-end')?.value||'',anonymous:anon,options,votes:[],voteCounts:{},organizer:S.currentUser.name,status:'active',createdAt:now()};

  AuditLog?.record('create_vote','建立投票:'+title,s.id);

}

// ── 通知中心資料層 ──
const NotifyDB = {
  getAll()  { return L.get('notifications') || []; },
  unread()  { return this.getAll().filter(n => !n.read); },
  add(n) {
    const all = this.getAll();
    all.unshift({ id:'n_'+Date.now(), ...n, time:now(), read:false });
    if (all.length > 200) all.splice(200);
    L.set('notifications', all);
    if (fbReady) fsAdd(fsCol(db,'notifications'), n).catch(()=>{});
    this._updateBadge();
    return all[0];
  },
  markRead(id) {
    const all = this.getAll().map(n => n.id===id ? {...n,read:true} : n);
    L.set('notifications', all);
    this._updateBadge();
  },
  markAllRead() {
    L.set('notifications', this.getAll().map(n=>({...n,read:true})));
    this._updateBadge();
  },
  _updateBadge() {
    const cnt = this.unread().length;
    const badge = document.getElementById('notify-badge');
    if (badge) { badge.textContent = cnt; badge.style.display = cnt ? '' : 'none'; }
  }
};

// 攔截 doSave / doApprove / doSubmit 自動推送通知
const __doSaveN = doSave;
async function doSave(status) {
  await __doSaveN(status);
  if (status === 'pending')
    NotifyDB.add({ type:'submit', icon:'📤', title:'表單已送出審核', body:`您的申請單已進入簽核流程`, page:'sent' });
}
const __doApproveN = doApprove;
async function doApprove(id) {
  await __doApproveN(id);
  const f = S.forms.find(x=>x.id===id);
  const ev = f?.status==='approved' ? 'approved' : f?.status==='rejected' ? 'rejected' : 'step';
  const icons = {approved:'✅', rejected:'❌', step:'🔔'};
  const labels = {approved:'已核准', rejected:'已退回', step:'通過一關卡'};
  NotifyDB.add({ type:ev, icon:icons[ev], title:`表單 ${f?.seq} ${labels[ev]}`, body:`${f?.formType} · ${f?.applicant}`, formId:id, page:'view' });
}

// 圖表儀表板
// ════════════════════════════════════════════
function pgDashboardCharts() {
  const f = S.forms;

  // 各部門統計
  const deptData = S.depts.map(d => ({
    name: d.name, color: d.color,
    total: f.filter(x=>x.deptId===d.id).length,
    pending: f.filter(x=>x.deptId===d.id&&x.status==='pending').length,
    approved: f.filter(x=>x.deptId===d.id&&x.status==='approved').length,
  })).filter(d=>d.total>0);

  // 狀態分佈
  const statusData = [
    { label:'草稿', cnt:f.filter(x=>x.status==='draft').length, color:'#94a3b8' },
    { label:'審核中', cnt:f.filter(x=>x.status==='pending').length, color:'#b45309' },
    { label:'已核准', cnt:f.filter(x=>x.status==='approved').length, color:'#15803d' },
    { label:'已退回', cnt:f.filter(x=>x.status==='rejected').length, color:'#dc2626' },
  ];

  // 近7天提交趨勢
  const trendData = Array.from({length:7},(_,i)=>{
    const d = new Date(); d.setDate(d.getDate()-6+i);
    const dateStr = d.toISOString().slice(0,10);
    return { date:dateStr.slice(5), cnt:f.filter(x=>x.date===dateStr).length };
  });

  const maxDept = Math.max(1, ...deptData.map(d=>d.total));
  const maxTrend = Math.max(1, ...trendData.map(d=>d.cnt));
  const totalPie = Math.max(1, statusData.reduce((s,d)=>s+d.cnt,0));

  // Pie chart SVG
  let pieStart = 0;
  const pieSlices = statusData.filter(d=>d.cnt>0).map(d=>{
    const pct = d.cnt/totalPie;
    const angle = pct*360;
    const startRad = (pieStart-90)*Math.PI/180;
    const endRad = (pieStart+angle-90)*Math.PI/180;
    const largeArc = angle>180?1:0;
    const x1=50+45*Math.cos(startRad), y1=50+45*Math.sin(startRad);
    const x2=50+45*Math.cos(endRad),   y2=50+45*Math.sin(endRad);
    const path = `M50,50 L${x1.toFixed(1)},${y1.toFixed(1)} A45,45,0,${largeArc},1,${x2.toFixed(1)},${y2.toFixed(1)} Z`;
    pieStart += angle;
    return `<path d="${path}" fill="${d.color}" stroke="var(--card)" stroke-width="1.5"><title>${d.label}: ${d.cnt}</title></path>`;
  }).join('');

  return `
  <div class="pg-hdr">
    <div class="pg-title">📊 數據儀表板</div>
    <div class="pg-sp"></div>
    <button class="btn sm" onclick="go('dashboard')">← 返回總覽</button>
  </div>

  <div class="stats">
    <div class="stat" style="border-left:3px solid var(--blue)"><div class="stat-v" style="color:var(--blue)">${f.length}</div><div class="stat-l">全部單據</div></div>
    <div class="stat" style="border-left:3px solid var(--amber)"><div class="stat-v" style="color:var(--amber)">${f.filter(x=>x.status==='pending').length}</div><div class="stat-l">審核中</div></div>
    <div class="stat" style="border-left:3px solid var(--green)"><div class="stat-v" style="color:var(--green)">${f.filter(x=>x.status==='approved').length}</div><div class="stat-l">已核准</div></div>
    <div class="stat" style="border-left:3px solid var(--purple)">
      <div class="stat-v" style="color:var(--purple)">${f.length>0?Math.round(f.filter(x=>x.status==='approved').length/f.length*100):0}%</div>
      <div class="stat-l">核准率</div>
    </div>
  </div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px">
    <!-- 部門長條圖 -->
    <div class="sec">
      <div class="sec-hdr navy">📊 各部門表單數量</div>
      <div class="sec-body">
        ${deptData.length===0?'<div class="txt-muted txt-sm">尚無資料</div>':
          deptData.map(d=>`
          <div style="margin-bottom:10px">
            <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px">
              <span style="font-weight:500">${d.name}</span>
              <span style="color:var(--text3)">${d.total} 筆 ${d.pending?`(${d.pending}待審)`:''}</span>
            </div>
            <div style="height:10px;background:var(--bg3);border-radius:99px;overflow:hidden">
              <div style="height:100%;border-radius:99px;background:${d.color};width:${Math.round(d.total/maxDept*100)}%;transition:width .5s;position:relative">
                <div style="position:absolute;right:0;top:0;bottom:0;width:${d.total>0?Math.round(d.approved/d.total*100):0}%;background:rgba(255,255,255,.3);border-radius:0 99px 99px 0"></div>
              </div>
            </div>
          </div>`).join('')}
        <div style="font-size:10px;color:var(--text4);margin-top:6px">淺色部分 = 已核准比例</div>
      </div>
    </div>

    <!-- 狀態圓餅圖 -->
    <div class="sec">
      <div class="sec-hdr olive">🥧 狀態分佈</div>
      <div class="sec-body" style="display:flex;align-items:center;gap:20px;flex-wrap:wrap">
        <svg viewBox="0 0 100 100" style="width:120px;height:120px;flex-shrink:0">
          ${totalPie>0?pieSlices:'<circle cx="50" cy="50" r="45" fill="var(--bg3)"/>'}
          <circle cx="50" cy="50" r="28" fill="var(--card)"/>
          <text x="50" y="52" text-anchor="middle" style="font-size:12px;fill:var(--text);font-weight:700">${totalPie}</text>
          <text x="50" y="62" text-anchor="middle" style="font-size:7px;fill:var(--text3)">總計</text>
        </svg>
        <div style="flex:1">
          ${statusData.map(d=>`
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
            <span style="width:10px;height:10px;border-radius:2px;background:${d.color};flex-shrink:0"></span>
            <span style="font-size:12px;flex:1">${d.label}</span>
            <span style="font-size:13px;font-weight:600;color:${d.color}">${d.cnt}</span>
            <span style="font-size:11px;color:var(--text4)">${totalPie>0?Math.round(d.cnt/totalPie*100):0}%</span>
          </div>`).join('')}
        </div>
      </div>
    </div>
  </div>

  <!-- 近7天趨勢 -->
  <div class="sec">
    <div class="sec-hdr teal">📈 近7天提交趨勢</div>
    <div class="sec-body">
      <div style="display:flex;align-items:flex-end;gap:8px;height:120px;padding-bottom:4px">
        ${trendData.map(d=>`
        <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px">
          <span style="font-size:11px;color:var(--text3);font-weight:500">${d.cnt||''}</span>
          <div style="width:100%;background:${d.date===today().slice(5)?'var(--blue)':'var(--blue-lt)'};border-radius:4px 4px 0 0;transition:height .5s;height:${d.cnt>0?Math.max(8,Math.round(d.cnt/maxTrend*90)):4}px"></div>
          <span style="font-size:10px;color:var(--text4)">${d.date}</span>
        </div>`).join('')}
      </div>
    </div>
  </div>

  <!-- 採購金額統計 -->
  <div class="sec">
    <div class="sec-hdr wine">💰 採購部金額統計</div>
    <div class="sec-body">
      ${(()=>{
        const purForms = f.filter(x=>x.deptId==='PUR'&&x.status==='approved');
        const total = purForms.reduce((s,x)=>s+calcTotal(x.items||[]),0);
        const pending = f.filter(x=>x.deptId==='PUR'&&x.status==='pending').reduce((s,x)=>s+calcTotal(x.items||[]),0);
        const vendors = [...new Set(purForms.map(x=>x.fields?.f1).filter(Boolean))];
        return `
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:14px">
          <div style="background:var(--bg2);border-radius:var(--r);padding:12px;text-align:center">
            <div style="font-size:18px;font-weight:700;color:var(--green)">${fmtMoney(total)}</div>
            <div style="font-size:11px;color:var(--text3)">已核准採購金額</div>
          </div>
          <div style="background:var(--bg2);border-radius:var(--r);padding:12px;text-align:center">
            <div style="font-size:18px;font-weight:700;color:var(--amber)">${fmtMoney(pending)}</div>
            <div style="font-size:11px;color:var(--text3)">審核中金額</div>
          </div>
          <div style="background:var(--bg2);border-radius:var(--r);padding:12px;text-align:center">
            <div style="font-size:18px;font-weight:700;color:var(--blue)">${vendors.length}</div>
            <div style="font-size:11px;color:var(--text3)">往來廠商數</div>
          </div>
        </div>`;
      })()}
    </div>
  </div>`;
}

const TemplateDB = {
  getAll() { return L.get('form_templates') || []; },
  save(t) {
    const all = this.getAll();
    const i = all.findIndex(x => x.id === t.id);
    if (i >= 0) all[i] = t; else all.unshift(t);
    L.set('form_templates', all);
    return t;
  },
  del(id) { L.set('form_templates', this.getAll().filter(x=>x.id!==id)); },
  get(id) { return this.getAll().find(x=>x.id===id); }
};

  const deptTemplates = S.depts.map(d=>({
    ...d, tmps: templates.filter(t=>t.deptId===d.id)
  })).filter(d=>d.tmps.length>0);

  return `
  <div class="pg-hdr">

    <div class="pg-sp"></div>
    <button class="btn sm" onclick="saveCurrentAsTemplate()">💾 另存為範本</button>

    <div style="font-size:48px;margin-bottom:12px">📋</div>
    <div style="font-size:14px;font-weight:500;margin-bottom:8px">尚無範本</div>

      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px">
        ${d.tmps.map(t=>`
        <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:14px;cursor:pointer;transition:box-shadow .15s"
             onmouseenter="this.style.boxShadow='var(--sh2)'" onmouseleave="this.style.boxShadow=''">

          <div style="font-size:11px;color:var(--text3);margin-bottom:10px">${t.formType||''} · 使用 ${t.useCount||0} 次</div>

          </div>
        </div>`).join('')}

    </div>
  </div>`).join('')}
  ${templates.filter(t=>!t.deptId||!S.depts.find(d=>d.id===t.deptId)).length?`
  <div class="sec">
    <div class="sec-hdr gray">其他範本</div>
    <div class="sec-body">
      ${templates.filter(t=>!t.deptId||!S.depts.find(d=>d.id===t.deptId)).map(t=>`
      <div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)">
        <span style="font-size:13px;flex:1">${t.name}</span>

function saveCurrentAsTemplate() {
  S.modal = 'save-template'; renderAll();
}

function applyTemplate(id) {
  const t = TemplateDB.get(id); if (!t) return;
  t.useCount = (t.useCount||0)+1; TemplateDB.save(t);
  S.aiParsed = { deptId:t.deptId, formType:t.formType, applicant:S.currentUser.name, fields:{...t.fields}, items:[...(t.items||[])], _ok:true, _summary:`套用範本：${t.name}` };
  S.aiDept = t.deptId;
  go('new-form');
  toast(`✅ 已套用範本：${t.name}`);
}

// 加入 S.selectedForms
if (!S.selectedForms) S.selectedForms = new Set();

function toggleSelectForm(id, checked) {
  if (checked) S.selectedForms.add(id);
  else S.selectedForms.delete(id);
  const bar = document.getElementById('batch-bar');
  if (bar) bar.style.display = S.selectedForms.size > 0 ? 'flex' : 'none';
  const cnt = document.getElementById('batch-cnt');
  if (cnt) cnt.textContent = S.selectedForms.size;
}

function renderBatchBar() {
  return `
  <div id="batch-bar" style="display:${S.selectedForms.size>0?'flex':'none'};position:fixed;bottom:calc(60px + var(--safe-b));left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:10px 16px;border-radius:var(--r2);gap:12px;align-items:center;z-index:500;box-shadow:var(--sh2)">
    <span style="font-size:13px">已選 <strong id="batch-cnt">${S.selectedForms.size}</strong> 筆</span>
    <button class="h-btn" onclick="batchApprove()">✅ 批次核准</button>
    <button class="h-btn" onclick="batchExportCSV()">📥 匯出CSV</button>
    <button class="h-btn" onclick="batchExportPDF()">🖨️ 批次PDF</button>
    <button class="h-btn" style="color:#fca5a5" onclick="batchDelete()">🗑️ 刪除草稿</button>
    <button class="h-btn" onclick="S.selectedForms.clear();renderAll()">✕ 取消</button>
  </div>`;
}

async function batchApprove() {
  if (!S.selectedForms.size) return;
  if (!confirm(`確定批次核准 ${S.selectedForms.size} 張表單？`)) return;
  let cnt = 0;
  for (const id of S.selectedForms) {
    const f = S.forms.find(x=>x.id===id);
    if (!f || f.status !== 'pending') continue;
    const updated = {...f};
    const idx = (updated.approvals||[]).findIndex(a=>a.status==='pending');
    if (idx>=0) updated.approvals[idx] = {...updated.approvals[idx], status:'approved', name:S.currentUser.name, time:now(), comment:'批次核准'};
    const allOk = updated.approvals.every(a=>a.status==='approved');
    if (allOk) updated.status='approved';
    updated.history=[...(updated.history||[]),{ver:'v'+(updated.ver||1),who:S.currentUser.name,time:now(),reason:'批次核准',changes:[]}];
    await DB.saveForm(updated);
    cnt++;
  }
  S.forms = await DB.getForms();
  S.selectedForms.clear();
  toast(`✅ 已批次核准 ${cnt} 張表單`);
  AuditLog?.record('batch_approve',`批次核准 ${cnt} 筆`);
  renderAll();
}

function batchExportCSV() {
  const forms = S.forms.filter(f => S.selectedForms.has(f.id));
  ERP?.exportCSV ? (() => {
    const rows = [['序號','表單類型','申請人','部門','狀態','日期']];
    forms.forEach(f=>rows.push([f.seq,f.formType||'',f.applicant,deptOf(f.deptId).name,statusLabel(f.status),f.date]));
    const csv = rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
    const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv'}));
    a.download=`FormHub_Batch_${today()}.csv`; a.click();
    toast('✅ CSV 已匯出');
  })() : toast('匯出功能載入中');
}

function batchExportPDF() {
  const ids = [...S.selectedForms];
  if (!ids.length) return;

function initSigCanvas() {
  const canvas = document.getElementById('sig-canvas'); if (!canvas) return;
  const ctx = canvas.getContext('2d');
  let drawing = false, lastX=0, lastY=0;
  ctx.strokeStyle = '#1a2332'; ctx.lineWidth = 2; ctx.lineCap = 'round';

  function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width/rect.width, scaleY = canvas.height/rect.height;
    if (e.touches) return [(e.touches[0].clientX-rect.left)*scaleX,(e.touches[0].clientY-rect.top)*scaleY];
    return [(e.clientX-rect.left)*scaleX,(e.clientY-rect.top)*scaleY];
  }
  const start=e=>{drawing=true;[lastX,lastY]=getPos(e)};
  const move=e=>{
    if(!drawing)return; e.preventDefault();
    const [x,y]=getPos(e);
    ctx.beginPath();ctx.moveTo(lastX,lastY);ctx.lineTo(x,y);ctx.stroke();
    [lastX,lastY]=[x,y];
  };
  const end=()=>{drawing=false};
  canvas.addEventListener('mousedown',start);canvas.addEventListener('mousemove',move);
  canvas.addEventListener('mouseup',end);canvas.addEventListener('mouseleave',end);
  canvas.addEventListener('touchstart',start,{passive:false});
  canvas.addEventListener('touchmove',move,{passive:false});
  canvas.addEventListener('touchend',end);
}

window.clearSigCanvas = () => {
  const c=document.getElementById('sig-canvas');if(!c)return;
  c.getContext('2d').clearRect(0,0,c.width,c.height);
};

async function saveSignature(formId) {
  const canvas=document.getElementById('sig-canvas');
  if(!canvas){toast('找不到簽名板');return;}
  // Check if anything was drawn
  const ctx=canvas.getContext('2d');
  const data=ctx.getImageData(0,0,canvas.width,canvas.height);
  const hasContent=data.data.some((_,i)=>i%4===3&&data.data[i]>0);
  if(!hasContent){toast('請先簽名');return;}
  const sig=canvas.toDataURL('image/png');
  const f=S.forms.find(x=>x.id===formId);if(!f)return;
  f.signature=sig; f.signedBy=S.currentUser.name; f.signedAt=now();
  await DB.saveForm(f); S.forms=await DB.getForms();
  AuditLog?.record('sign_form','電子簽名',formId);
  toast('✅ 簽名已儲存');renderAll();
}

function importSignature(inp, formId) {

}

async function clearSignature(formId) {

const WikiDB = {
  getAll()  { return L.get('wiki_pages') || []; },
  get(id)   { return this.getAll().find(p => p.id === id); },
  save(p) {
    const all = this.getAll();
    const i = all.findIndex(x => x.id === p.id);
    if (i >= 0) all[i] = p; else all.unshift(p);
    L.set('wiki_pages', all);
    if (fbReady) fsSet(fsDoc(db,'wiki',p.id), p).catch(()=>{});
    return p;
  },
  del(id) {
    L.set('wiki_pages', this.getAll().filter(p => p.id !== id));
    // 子頁面也移除
    L.set('wiki_pages', this.getAll().filter(p => p.parentId !== id));
  },
  children(parentId) {
    return this.getAll().filter(p => p.parentId === (parentId||null));
  },
  roots() { return this.getAll().filter(p => !p.parentId); },
  search(q) {
    const lq = q.toLowerCase();
    return this.getAll().filter(p =>
      p.title?.toLowerCase().includes(lq) ||
      p.content?.toLowerCase().includes(lq) ||
      p.tags?.some(t => t.toLowerCase().includes(lq))
    );
  }
};

        case 'h3':       return `<h3 style="font-size:17px;font-weight:600;margin:12px 0 4px;color:var(--text)">${b.content||''}</h3>`;
        case 'text':     return `<p style="font-size:14px;line-height:1.8;margin:6px 0;color:var(--text2)">${(b.content||'').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\*(.*?)\*/g,'<em>$1</em>').replace(/`(.*?)`/g,'<code style="background:var(--bg3);padding:1px 5px;border-radius:3px;font-family:var(--mono);font-size:12px">$1</code>')}</p>`;
        case 'bullet':   return `<li style="font-size:14px;line-height:1.8;margin:3px 0 3px 20px;color:var(--text2)">${b.content||''}</li>`;
        case 'numbered': return `<li style="font-size:14px;line-height:1.8;margin:3px 0 3px 20px;color:var(--text2);list-style:decimal">${b.content||''}</li>`;
        case 'check':    return `<div style="display:flex;align-items:center;gap:8px;margin:4px 0"><input type="checkbox" ${b.checked?'checked':''} style="width:16px;height:16px"><span style="font-size:14px;${b.checked?'text-decoration:line-through;color:var(--text4)':'color:var(--text2)'}">${b.content||''}</span></div>`;
        case 'quote':    return `<blockquote style="border-left:3px solid var(--blue);padding:8px 16px;margin:8px 0;background:var(--blue-lt);border-radius:0 var(--r) var(--r) 0;font-size:14px;color:var(--text2);font-style:italic">${b.content||''}</blockquote>`;
        case 'code':     return `<pre style="background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:14px;font-family:var(--mono);font-size:12px;overflow-x:auto;line-height:1.6;margin:8px 0"><code>${b.content||''}</code></pre>`;
        case 'divider':  return `<hr style="border:none;border-top:1.5px solid var(--border);margin:16px 0">`;
        case 'image':    return b.src ? `<div style="margin:10px 0"><img src="${b.src}" style="max-width:100%;border-radius:var(--r);border:1px solid var(--border)">${b.caption?`<div style="font-size:11px;color:var(--text4);text-align:center;margin-top:4px">${b.caption}</div>`:''}</div>` : '';
        case 'callout':  return `<div style="display:flex;gap:10px;padding:12px 16px;background:${b.color||'var(--amber-lt)'};border-radius:var(--r);margin:8px 0;border:1px solid ${b.color?'transparent':'var(--amber)'}"><span style="font-size:20px;flex-shrink:0">${b.icon||'💡'}</span><div style="font-size:14px;line-height:1.6;color:var(--text2)">${b.content||''}</div></div>`;
        case 'toggle':   return `<details style="margin:6px 0"><summary style="cursor:pointer;font-size:14px;font-weight:500;padding:4px 0;color:var(--text)">${b.title||'折疊區塊'}</summary><div style="padding:8px 0 8px 20px;font-size:13px;line-height:1.6;color:var(--text2)">${b.content||''}</div></details>`;
        case 'table': {
          const rows = (b.rows||[]);
          if (!rows.length) return '';
          return `<div style="overflow-x:auto;margin:8px 0"><table style="width:100%;border-collapse:collapse;font-size:13px">
            ${rows.map((row,ri)=>`<tr>${(row||[]).map(cell=>`<${ri===0?'th':'td'} style="padding:7px 10px;border:1px solid var(--border);${ri===0?'background:var(--bg2);font-weight:600':''}">${cell}</td>`).join('')}</tr>`).join('')}
          </table></div>`;
        }
        default: return '';
      }
    }).join('');
  },

  // 解析 Markdown → 區塊
  markdownToBlocks(md) {
    const lines = md.split('\n');
    return lines.map(line => {
      if (line.startsWith('# '))       return { id:'b'+Date.now()+Math.random(), type:'h1', content:line.slice(2) };
      if (line.startsWith('## '))      return { id:'b'+Date.now()+Math.random(), type:'h2', content:line.slice(3) };
      if (line.startsWith('### '))     return { id:'b'+Date.now()+Math.random(), type:'h3', content:line.slice(4) };
      if (line.startsWith('- '))       return { id:'b'+Date.now()+Math.random(), type:'bullet', content:line.slice(2) };
      if (line.startsWith('> '))       return { id:'b'+Date.now()+Math.random(), type:'quote', content:line.slice(2) };
      if (line.startsWith('---'))      return { id:'b'+Date.now()+Math.random(), type:'divider' };
      if (line.startsWith('- [ ] '))   return { id:'b'+Date.now()+Math.random(), type:'check', content:line.slice(6), checked:false };
      if (line.startsWith('- [x] '))   return { id:'b'+Date.now()+Math.random(), type:'check', content:line.slice(6), checked:true };
      if (line.trim()==='')            return null;
      return { id:'b'+Date.now()+Math.random(), type:'text', content:line };
    }).filter(Boolean);
  }
};

      <div style="padding:8px 14px 10px">
        <div style="font-size:15px;font-weight:700;margin-bottom:8px">📖 知識庫</div>

          <input type="text" placeholder="搜尋頁面..." value="${q}"

            <div style="font-weight:500">${p.icon||'📄'} ${p.title}</div>

          </div>`).join('')}

      <div>
        <div style="padding:6px 16px;font-size:10px;font-weight:600;color:var(--text4);text-transform:uppercase;letter-spacing:.5px">頁面</div>

function renderWikiTreeItem(page, depth) {
  const children = WikiDB.children(page.id);
  const isActive = S.wikiPageId === page.id;
  return `
  <div>
    <div style="display:flex;align-items:center;padding:6px 16px 6px ${14+depth*16}px;cursor:pointer;font-size:13px;color:${isActive?'var(--blue)':'var(--text2)'};background:${isActive?'var(--blue-lt)':'transparent'}"
         onclick="S.wikiPageId='${page.id}';renderAll()"
         onmouseenter="this.style.background='${isActive?'var(--blue-lt)':'var(--bg2)'}'" onmouseleave="this.style.background='${isActive?'var(--blue-lt)':'transparent'}'">
      <span style="font-size:14px;margin-right:6px">${page.icon||'📄'}</span>
      <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:${isActive?'600':'400'}">${page.title||'未命名頁面'}</span>
      <button onclick="event.stopPropagation();newWikiPage('${page.id}')" style="background:none;border:none;cursor:pointer;color:var(--text4);font-size:14px;padding:0 2px;opacity:0" onmouseenter="this.style.opacity='1'" onmouseleave="this.style.opacity='0'">+</button>
    </div>
    ${children.map(c=>renderWikiTreeItem(c,depth+1)).join('')}
  </div>`;
}

function renderWikiPage(pageId) {
  const page = WikiDB.get(pageId);

  const children = WikiDB.children(pageId);
  const isEditing = S.wikiEditing === pageId;

  if (isEditing) return renderWikiEditor(page);

  return `
  <div style="max-width:760px;margin:0 auto;padding:40px 24px">
    <!-- 工具列 -->
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:24px;flex-wrap:wrap">
      <button class="btn sm" onclick="S.wikiPageId=null;renderAll()">← 返回</button>
      <div style="flex:1"></div>

      <button class="btn sm" onclick="newWikiPage('${pageId}')">📄 新增子頁面</button>

    </div>

    <div style="margin-bottom:24px">
      <div style="font-size:36px;margin-bottom:8px">${page.icon||'📄'}</div>
      <h1 style="font-size:32px;font-weight:800;line-height:1.2;margin-bottom:8px">${page.title||'未命名頁面'}</h1>
      <div style="font-size:12px;color:var(--text4);display:flex;gap:12px;flex-wrap:wrap">
        <span>✏️ ${page.updatedBy||page.createdBy||'-'}</span>
        <span>📅 ${page.updatedAt?.slice(0,10)||page.createdAt?.slice(0,10)||'-'}</span>
        ${(page.tags||[]).map(t=>`<span style="background:var(--blue-lt);color:var(--blue);padding:1px 8px;border-radius:99px">${t}</span>`).join('')}
      </div>

    <div class="wiki-content">

    <!-- 子頁面 -->
    ${children.length?`
    <div style="margin-top:32px;padding-top:20px;border-top:1px solid var(--border)">
      <div style="font-size:13px;font-weight:600;color:var(--text3);margin-bottom:10px">📂 子頁面</div>

}

function renderBlockEditor(block, idx, pageId) {
  const commonStyle = 'width:100%;border:none;background:transparent;color:var(--text);font-family:var(--font);resize:none;outline:none;padding:4px 0;line-height:1.7';
  switch(block.type) {
    case 'h1': return `<div style="margin:16px 0 4px;display:flex;gap:6px;align-items:center"><input id="wb-${block.id}" value="${block.content||''}" placeholder="大標題" style="${commonStyle};font-size:28px;font-weight:800" oninput="wikiBlockUpdate('${pageId}','${block.id}','content',this.value)"><button onclick="delWikiBlock('${pageId}','${block.id}')" style="background:none;border:none;cursor:pointer;color:var(--text4);opacity:0.3;font-size:14px" onmouseenter="this.style.opacity='1'" onmouseleave="this.style.opacity='.3'">×</button></div>`;
    case 'h2': return `<div style="margin:12px 0 4px;display:flex;gap:6px;align-items:center"><input id="wb-${block.id}" value="${block.content||''}" placeholder="中標題" style="${commonStyle};font-size:22px;font-weight:700" oninput="wikiBlockUpdate('${pageId}','${block.id}','content',this.value)"><button onclick="delWikiBlock('${pageId}','${block.id}')" style="background:none;border:none;cursor:pointer;color:var(--text4);opacity:0.3" onmouseenter="this.style.opacity='1'" onmouseleave="this.style.opacity='.3'">×</button></div>`;
    case 'h3': return `<div style="margin:10px 0 3px;display:flex;gap:6px;align-items:center"><input id="wb-${block.id}" value="${block.content||''}" placeholder="小標題" style="${commonStyle};font-size:17px;font-weight:600" oninput="wikiBlockUpdate('${pageId}','${block.id}','content',this.value)"><button onclick="delWikiBlock('${pageId}','${block.id}')" style="background:none;border:none;cursor:pointer;color:var(--text4);opacity:0.3" onmouseenter="this.style.opacity='1'" onmouseleave="this.style.opacity='.3'">×</button></div>`;
    case 'divider': return `<div style="display:flex;align-items:center;gap:8px;margin:8px 0"><hr style="flex:1;border:none;border-top:1.5px solid var(--border)"><button onclick="delWikiBlock('${pageId}','${block.id}')" style="background:none;border:none;cursor:pointer;color:var(--text4);font-size:12px">×</button></div>`;
    case 'image': return `<div style="margin:8px 0;padding:10px;background:var(--bg2);border-radius:var(--r);border:1px dashed var(--border2)">${block.src?`<img src="${block.src}" style="max-width:100%;border-radius:var(--r)">`:''}<label class="btn sm mt-1" style="cursor:pointer">📁 選擇圖片<input type="file" accept="image/*" style="display:none" onchange="wikiImageUpload(this,'${pageId}','${block.id}')"></label><button onclick="delWikiBlock('${pageId}','${block.id}')" style="background:none;border:none;cursor:pointer;color:var(--text4);margin-left:8px">× 刪除</button></div>`;
    case 'code': return `<div style="margin:6px 0;position:relative"><textarea id="wb-${block.id}" placeholder="// 程式碼..." style="${commonStyle};font-family:var(--mono);font-size:12px;background:var(--bg3);padding:12px;border-radius:var(--r);min-height:80px" oninput="wikiBlockUpdate('${pageId}','${block.id}','content',this.value)">${block.content||''}</textarea><button onclick="delWikiBlock('${pageId}','${block.id}')" style="position:absolute;top:6px;right:6px;background:none;border:none;cursor:pointer;color:var(--text4)">×</button></div>`;
    case 'callout': return `<div style="margin:6px 0;padding:10px 12px;background:var(--amber-lt);border-radius:var(--r);display:flex;gap:8px;align-items:flex-start"><span style="font-size:18px">${block.icon||'💡'}</span><input id="wb-${block.id}" value="${block.content||''}" placeholder="提示文字..." style="${commonStyle};font-size:13px" oninput="wikiBlockUpdate('${pageId}','${block.id}','content',this.value)"><button onclick="delWikiBlock('${pageId}','${block.id}')" style="background:none;border:none;cursor:pointer;color:var(--text4)">×</button></div>`;
    default: return `<div style="display:flex;align-items:flex-start;gap:6px;margin:2px 0">
      <span style="font-size:12px;color:var(--text4);width:16px;flex-shrink:0;padding-top:6px">${block.type==='bullet'?'•':block.type==='numbered'?'1.':block.type==='check'?'☐':''}</span>
      <textarea id="wb-${block.id}" rows="1" placeholder="輸入文字... (Markdown 支援 **粗體** *斜體** \`程式碼\`)" style="${commonStyle};font-size:14px;min-height:28px" oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px';wikiBlockUpdate('${pageId}','${block.id}','content',this.value)">${block.content||''}</textarea>
      <button onclick="delWikiBlock('${pageId}','${block.id}')" style="background:none;border:none;cursor:pointer;color:var(--text4);opacity:0.3;padding-top:4px" onmouseenter="this.style.opacity='1'" onmouseleave="this.style.opacity='.3'">×</button>
    </div>`;
  }
}

// Wiki 動作函數
function newWikiPage(parentId) {
  const page = { id:'wp_'+Date.now(), title:'', icon:'📄', parentId:parentId||null, blocks:[{id:'b1',type:'text',content:''}], tags:[], createdBy:S.currentUser.name, createdAt:now(), updatedAt:now() };
  WikiDB.save(page);
  S.wikiPageId = page.id; S.wikiEditing = page.id;
  renderAll();
}

function saveWikiPage(pageId) {
  const page = WikiDB.get(pageId); if(!page) return;
  page.title = document.getElementById('wiki-title')?.value || '未命名頁面';
  page.tags = (document.getElementById('wiki-tags')?.value||'').split(',').map(t=>t.trim()).filter(Boolean);
  // 收集區塊內容
  if (page.blocks) {
    page.blocks.forEach(b => {
      const el = document.getElementById('wb-'+b.id);
      if (el) b.content = el.value;
    });
  }
  page.updatedBy = S.currentUser.name; page.updatedAt = now();
  WikiDB.save(page);
  S.wikiEditing = null;
  AuditLog?.record('wiki_save', `儲存知識庫頁面：${page.title}`, pageId);
  toast('✅ 頁面已儲存'); renderAll();
}

function addWikiBlock(pageId, type) {
  const page = WikiDB.get(pageId); if(!page) return;
  if (!page.blocks) page.blocks = [];
  page.blocks.push({ id:'b'+Date.now(), type, content:'' });
  WikiDB.save(page); renderAll();
  setTimeout(()=>{const els=document.querySelectorAll('[id^="wb-"]');els[els.length-1]?.focus()},50);
}

function delWikiBlock(pageId, blockId) {
  const page = WikiDB.get(pageId); if(!page) return;
  page.blocks = (page.blocks||[]).filter(b=>b.id!==blockId);
  WikiDB.save(page); renderAll();
}

function wikiBlockUpdate(pageId, blockId, key, val) {
  const page = WikiDB.get(pageId); if(!page) return;
  const block = (page.blocks||[]).find(b=>b.id===blockId);
  if (block) { block[key]=val; WikiDB.save(page); }
}

function wikiImageUpload(inp, pageId, blockId) {
  const file=inp.files[0]; if(!file) return;
  fileToDataURL(file).then(url=>{
    wikiBlockUpdate(pageId, blockId, 'src', url);
    renderAll(); toast('✅ 圖片已插入');
  });
}

function importMarkdownToPage(pageId) {
  const md = document.getElementById('wiki-md-input')?.value?.trim();
  if(!md) return;
  const newBlocks = WikiEditor.markdownToBlocks(md);
  const page = WikiDB.get(pageId); if(!page) return;
  page.blocks = [...(page.blocks||[]), ...newBlocks];
  WikiDB.save(page);
  toast(`✅ 已轉換 ${newBlocks.length} 個區塊`); renderAll();
}

function pickWikiIcon(pageId) {
  const icons = ['📄','📝','📚','📖','🗂️','📋','📊','📈','💡','🔧','🏭','👥','🎯','⚙️','🔍','💼','🌐','📌','🗒️','📑'];
  const icon = icons[Math.floor(Math.random()*icons.length)];
  const page = WikiDB.get(pageId); if(page){page.icon=icon;WikiDB.save(page);renderAll();}
}

function exportWikiPage(pageId) {
  const page = WikiDB.get(pageId); if(!page) return;
  const md = (page.blocks||[]).map(b=>{
    switch(b.type){
      case 'h1': return `# ${b.content}`;
      case 'h2': return `## ${b.content}`;
      case 'h3': return `### ${b.content}`;
      case 'bullet': return `- ${b.content}`;
      case 'check': return `- [${b.checked?'x':' '}] ${b.content}`;
      case 'quote': return `> ${b.content}`;
      case 'divider': return `---`;
      case 'code': return `\`\`\`\n${b.content}\n\`\`\``;
      default: return b.content||'';
    }
  }).join('\n');
  const blob=new Blob([md],{type:'text/markdown'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`${page.title||'wiki'}.md`;a.click();
  toast('✅ 已匯出為 Markdown');
}

const ISODB = {
  getAll()  { return L.get('iso_docs') || []; },
  get(id)   { return this.getAll().find(d => d.id === id); },
  save(d) {
    const all = this.getAll();
    const i = all.findIndex(x => x.id === d.id);
    if (i >= 0) all[i] = d; else all.unshift(d);
    L.set('iso_docs', all);
    if (fbReady) fsSet(fsDoc(db,'iso_docs',d.id), d).catch(()=>{});
    return d;
  },
  getVersions(docNo) {
    return this.getAll().filter(d => d.docNo === docNo).sort((a,b)=>b.ver.localeCompare(a.ver));
  },
  latest(docNo) { return this.getVersions(docNo)[0]; }
};

function renderMESReports(orders) {
  const done = orders.filter(o=>o.status==='done'||o.status==='closed');
  const totalPlan = orders.reduce((s,o)=>s+(+o.planQty||0),0);
  const totalDone = orders.reduce((s,o)=>s+(+o.doneQty||0),0);
  const achieveRate = totalPlan>0?Math.round(totalDone/totalPlan*100):0;
  const late = orders.filter(o=>o.dueDate&&o.dueDate<today()&&o.status!=='done'&&o.status!=='closed').length;

  return `
  <div class="stats">
    <div class="stat" style="border-left:3px solid var(--blue)"><div class="stat-v" style="color:var(--blue)">${totalPlan.toLocaleString()}</div><div class="stat-l">計畫總量</div></div>
    <div class="stat" style="border-left:3px solid var(--green)"><div class="stat-v" style="color:var(--green)">${totalDone.toLocaleString()}</div><div class="stat-l">完成數量</div></div>
    <div class="stat" style="border-left:3px solid var(--purple)"><div class="stat-v" style="color:var(--purple)">${achieveRate}%</div><div class="stat-l">達成率</div></div>
    <div class="stat" style="border-left:3px solid var(--red)"><div class="stat-v" style="color:var(--red)">${late}</div><div class="stat-l">逾期工單</div></div>

      ${orders.slice(0,10).map(o=>{

        return `<div style="margin-bottom:10px">
          <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px">
            <span class="mono" style="color:var(--blue)">${o.orderNo}</span>

function mesStartOrder(id) {
  const o=MESDB.getOrder(id);if(!o)return;
  o.status='running';o.actualStart=today();
  o.history=[...(o.history||[]),{time:now(),who:S.currentUser.name,action:'開工'}];
  MESDB.saveOrder(o);AuditLog?.record('mes_start',`開工：${o.orderNo}`,id);
  toast('▶ 已開工');renderAll();
}
function mesPauseOrder(id) {
  const o=MESDB.getOrder(id);if(!o)return;
  o.status='released';
  o.history=[...(o.history||[]),{time:now(),who:S.currentUser.name,action:'暫停'}];
  MESDB.saveOrder(o);toast('⏸ 已暫停');renderAll();
}
function mesCompleteOrder(id) {
  if(!confirm('確定完工？'))return;
  const o=MESDB.getOrder(id);if(!o)return;
  o.status='done';o.actualEnd=today();
  o.history=[...(o.history||[]),{time:now(),who:S.currentUser.name,action:'完工'}];
  MESDB.saveOrder(o);
  NotifyDB?.add({type:'approved',icon:'✅',title:`工單 ${o.orderNo} 完工`,body:`${o.productName} 完成 ${o.doneQty||0}/${o.planQty}`,page:'mes'});
  AuditLog?.record('mes_done',`完工：${o.orderNo}`,id);
  toast('✅ 工單完工');renderAll();
}
function mesToggleProcess(orderId, stepIdx) {
  const o=MESDB.getOrder(orderId);if(!o)return;
  if(!o.processes)o.processes=[];
  while(o.processes.length<=stepIdx)o.processes.push({status:'pending'});
  const p=o.processes[stepIdx];
  if(p.status==='pending'){p.status='running';p.startTime=now();}
  else if(p.status==='running'){p.status='done';p.endTime=now();}
  else{p.status='pending';}
  MESDB.saveOrder(o);renderAll();
}

function exportMESReport() {
  const orders=MESDB.getOrders();
  const rows=[['工單號','產品','料號','計畫量','完成量','不良量','達成率','狀態','開始日','預交日']];
  orders.forEach(o=>rows.push([o.orderNo,o.productName,o.partNo||'',o.planQty,o.doneQty||0,o.defectQty||0,o.planQty>0?Math.round((o.doneQty||0)/o.planQty*100)+'%':'',MES_ORDER_STATUS[o.status]||o.status,o.startDate||'',o.dueDate||'']));
  const csv=rows.map(r=>r.map(v=>`"${v}"`).join(',')).join('\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv'}));
  a.download=`MES_Report_${today()}.csv`;a.click();toast('✅ 報表已匯出');
}

function saveMESOrder() {
  const orderNo=document.getElementById('mo-no')?.value?.trim();
  const productName=document.getElementById('mo-prod')?.value?.trim();
  const planQty=+document.getElementById('mo-qty')?.value||0;
  if(!orderNo||!productName||!planQty){toast('請填寫工單號、產品名稱和計畫數量');return;}
  const o={
    id:'mo_'+Date.now(),orderNo,productName,
    partNo:document.getElementById('mo-part')?.value||'',
    planQty,doneQty:0,defectQty:0,
    routeId:document.getElementById('mo-route')?.value||'',
    dueDate:document.getElementById('mo-due')?.value||'',
    startDate:document.getElementById('mo-start')?.value||today(),
    assignee:document.getElementById('mo-assignee')?.value||S.currentUser.name,
    note:document.getElementById('mo-note')?.value||'',
    status:'planned',createdBy:S.currentUser.name,createdAt:now(),

// ── 欄位修訂紀錄查詢工具 ──
const FieldHistory = {
  // 取得特定欄位的所有修改記錄
  getFieldLogs(form, fieldId) {
    const logs = [];
    const history = form.history || [];
    history.forEach(h => {
      const change = (h.changes || []).find(c => c.fieldId === fieldId || c.field === fieldId);
      if (change) {
        logs.push({
          ver:    h.ver,
          who:    h.who,
          time:   h.time,
          reason: h.reason,
          old:    change.old,
          new:    change.new,
          field:  change.field
        });
      }
    });
    return logs.reverse(); // 最新在前
  },

  // 取得某欄位在某個版本的值
  getValueAtVer(form, fieldId, ver) {
    const logs = this.getFieldLogs(form, fieldId);
    const before = logs.filter(l => l.ver <= ver);
    return before.length > 0 ? before[0].new : null;
  },

  // 取得所有有修改記錄的欄位清單
  getModifiedFields(form) {
    const fields = new Set();
    (form.history || []).forEach(h => {
      (h.changes || []).forEach(c => fields.add(c.fieldId || c.field));
    });
    return [...fields];
  },

  // 計算某欄位被修改幾次
  countChanges(form, fieldId) {
    return this.getFieldLogs(form, fieldId).length;
  }
};

// ── doEdit 強化：記錄 fieldId（確保每個欄位都有 ID） ──
const __doEditFieldHistory = doEdit;
async function doEdit(id) {
  const who    = document.getElementById('ed-who')?.value?.trim();
  const reason = document.getElementById('ed-reason')?.value?.trim();
  if (!who || !reason) { toast('請填寫修改人與修改原因'); return; }

  const f    = { ...S.forms.find(x => x.id === id) };
  f.fields   = { ...f.fields };
  const dept = S.depts.find(d => d.id === f.deptId) || {};
  const changes = [];

  for (const fd of dept.fields || []) {
    const el = document.getElementById('ef-' + fd.id);
    const oldVal = f.fields?.[fd.id] || '';
    const newVal = el?.value || '';
    if (el && newVal !== oldVal) {
      changes.push({
        fieldId: fd.id,          // ← 新增：欄位 ID
        field:   fd.label,        // 欄位名稱（顯示用）
        old:     oldVal || '（空）',
        new:     newVal
      });
      f.fields[fd.id] = newVal;
    }
  }

  // 品項變更
  const ni = collectRows?.() ?? [];
  if (JSON.stringify(ni) !== JSON.stringify(f.items || [])) {
    const oldSummary = (f.items || []).map(i => `${i.name}×${i.qty}@${i.price}`).join('、') || '（空）';
    const newSummary = ni.map(i => `${i.name}×${i.qty}@${i.price}`).join('、') || '（空）';
    changes.push({
      fieldId: '__items__',
      field:   '品項明細',
      old:     oldSummary,
      new:     newSummary
    });
    f.items = ni;
  }

  f.ver     = (f.ver || 1) + 1;
  f.history = [...(f.history || []), {
    ver:     'v' + f.ver,
    who,
    time:    now(),
    reason,
    changes
  }];

  toast('儲存中...', 8000);
  try {
    await DB.saveForm(f);
    S.forms = await DB.getForms();
    AuditLog?.record('edit_form', `修訂 ${f.seq} → v${f.ver}（${changes.length}個欄位）`, id);
    toast(`✓ 修訂已儲存 (v${f.ver}，${changes.length} 個欄位變更)`);
    goView(id);
  } catch(e) { toast('儲存失敗'); }
}

const __doSaveFieldHistory = doSave;
async function doSave(status) {
  const deptId    = document.getElementById('sel-dept')?.value;
  const formType  = document.getElementById('sel-type')?.value;
  const applicant = document.getElementById('inp-applicant')?.value?.trim();
  if (!applicant) { toast('請填寫申請人'); return; }
  if (!formType)  { toast('請選擇表單類型'); return; }
  const dept = S.depts.find(d => d.id === deptId);
  if (!dept) return;
  const fields = {};
  for (const fd of dept.fields || []) {
    const el = document.getElementById('nf-' + fd.id);
    if (fd.req && (!el || !el.value.trim())) { toast(`請填寫「${fd.label}」`); return; }
    if (el) fields[fd.id] = el.value;
  }
  const flowDef = S.flows[deptId] || [];
  const seq = await genSeq(deptId);
  const form = {
    id: 'loc_' + Date.now(), deptId, formType, seq, ver: 1, applicant,
    date: today(), status, fields, items: collectRows?.() ?? [], photos: [...(typeof photoBuf !== 'undefined' ? photoBuf : [])],
    approvals: status === 'pending'
      ? flowDef.map((s, i) => ({ step: i, role: s.role, uid: s.uid, name: '', status: i === 0 ? 'pending' : 'waiting', time: null, comment: '' }))
      : [],
    history: [{
      ver: 'v1', who: applicant, time: now(), reason: '初次建立',
      // 初始值也記錄，方便查詢第一次的值
      changes: Object.entries(fields).map(([fieldId, val]) => {
        const fd = dept.fields?.find(f => f.id === fieldId);
        return { fieldId, field: fd?.label || fieldId, old: '（空）', new: val };
      }).filter(c => c.new)
    }]
  };
  toast('儲存中...', 8000);
  try {
    const saved = await DB.saveForm(form);
    S.forms = await DB.getForms();
    if (typeof S.aiParsed !== 'undefined') { S.aiParsed = null; S.aiDept = null; S.lineText = ''; }
    if (typeof photoBuf !== 'undefined') photoBuf.length = 0;
    if (typeof triggerWebhooks === 'function') await triggerWebhooks(status === 'pending' ? 'on_submit' : 'on_create', saved);
    toast(status === 'draft' ? '✓ 已儲存草稿' : '✓ 已送出審核');
    goView(saved.id);
  } catch(e) { console.error(e); toast('儲存失敗：' + e.message); }
}

// 1. 敏感數值修改審核機制
// ══════════════════════════════════════════
const SensitiveRules = {
  // 設定哪些欄位/條件需要額外審核
  get() {
    return L.get('sensitive_rules') || [
      { deptId:'PUR', fieldId:'f5', label:'預算金額',    type:'amount',  threshold:50000,  approver:'財務長' },
      { deptId:'SAL', fieldId:'f4', label:'報價金額',    type:'amount',  threshold:100000, approver:'業務總監' },
      { deptId:'MKT', fieldId:'f3', label:'行銷預算',    type:'amount',  threshold:30000,  approver:'行銷總監' },
      { deptId:'HR',  fieldId:'f1', label:'薪資資料',    type:'sensitive',threshold:0,     approver:'人資主管' },
      { deptId:'ALL', fieldId:'ALL',label:'任何金額欄位', type:'percent', threshold:20,    approver:'部門主管', desc:'超過原值20%' }
    ];
  },
  set(rules) { L.set('sensitive_rules', rules); },

  // 檢查某次修改是否需要審核
  checkChange(deptId, fieldId, fieldLabel, oldVal, newVal) {
    const rules = this.get();
    const alerts = [];
    for (const rule of rules) {
      if (rule.deptId !== 'ALL' && rule.deptId !== deptId) continue;
      if (rule.fieldId !== 'ALL' && rule.fieldId !== fieldId) continue;
      const oldNum = parseFloat(String(oldVal).replace(/[^0-9.-]/g,'')) || 0;
      const newNum = parseFloat(String(newVal).replace(/[^0-9.-]/g,'')) || 0;
      if (rule.type === 'amount' && newNum > rule.threshold) {
        alerts.push({ rule, msg:`「${fieldLabel}」金額 NT$${newNum.toLocaleString()} 超過審核門檻 NT$${rule.threshold.toLocaleString()}，需要 ${rule.approver} 審核` });
      }
      if (rule.type === 'percent' && oldNum > 0 && Math.abs((newNum-oldNum)/oldNum*100) > rule.threshold) {
        alerts.push({ rule, msg:`「${fieldLabel}」變動幅度 ${Math.round(Math.abs((newNum-oldNum)/oldNum*100))}% 超過 ${rule.threshold}%，需要 ${rule.approver} 審核` });
      }
      if (rule.type === 'sensitive') {
        alerts.push({ rule, msg:`「${fieldLabel}」為敏感資料，修改需要 ${rule.approver} 審核` });
      }
    }
    return alerts;
  }
};

// 敏感審核申請 DB
const SensitiveApprovalDB = {
  getAll() { return L.get('sensitive_approvals') || []; },
  save(a) {
    const all = this.getAll();
    const i = all.findIndex(x=>x.id===a.id);
    if (i>=0) all[i]=a; else all.unshift(a);
    L.set('sensitive_approvals', all);
    if (fbReady) fsSet(fsDoc(db,'sensitive_approvals',a.id), a).catch(()=>{});
    return a;
  },
  get(id) { return this.getAll().find(x=>x.id===id); },
  pending() { return this.getAll().filter(a=>a.status==='pending'); }
};

// 強化 doEdit：修改前先檢查敏感規則
const __doEditSensitive = doEdit;
async function doEdit(id) {
  const f = S.forms.find(x=>x.id===id); if(!f) return;
  const dept = S.depts.find(d=>d.id===f.deptId)||{};
  const sensitiveAlerts = [];
  for (const fd of dept.fields||[]) {
    const el = document.getElementById('ef-'+fd.id);
    if (!el) continue;
    const oldVal = f.fields?.[fd.id]||'';
    const newVal = el.value;
    if (newVal !== oldVal) {
      const alerts = SensitiveRules.checkChange(f.deptId, fd.id, fd.label, oldVal, newVal);
      sensitiveAlerts.push(...alerts.map(a=>({...a, fieldId:fd.id, fieldLabel:fd.label, oldVal, newVal})));
    }
  }
  if (sensitiveAlerts.length > 0) {
    S._sensitiveAlerts = sensitiveAlerts;
    S._sensitiveFormId = id;
    S.modal = 'sensitive-confirm';
    renderAll();
    return;
  }
  await __doEditSensitive(id);
}

async function proceedSensitiveEdit() {
  const id = S._sensitiveFormId;

  // 建立敏感審核申請
  for (const alert of alerts) {

      id: 'sa_'+Date.now()+Math.random().toString(36).slice(2),
      formId: id, formSeq: S.forms.find(x=>x.id===id)?.seq,
      fieldId: alert.fieldId, fieldLabel: alert.fieldLabel,
      oldVal: alert.oldVal, newVal: alert.newVal,
      requiredApprover: alert.rule.approver,
      requestedBy: S.currentUser.name, requestedAt: now(),
      status: 'pending', msg: alert.msg
    };
    SensitiveApprovalDB.save(appr);
    NotifyDB?.add({ type:'system', icon:'⚠️', title:`敏感修改待審：${alert.fieldLabel}`, body:`${S.currentUser.name} 修改了 ${alert.fieldLabel}，需 ${alert.rule.approver} 審核`, page:'sensitive-approvals' });
  }
  S.modal = null;
  S._sensitiveAlerts = null;
  S._sensitiveFormId = null;
  await __doEditSensitive(id);
}
